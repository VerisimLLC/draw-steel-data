      name: Ferocity
      description: |-
        Within the heat of battle, your fierce bond with your companion fuels a Heroic Resource called ferocity.

        At the start of a combat encounter, you gain ferocity equal to your Victories. At the start of each of your turns, you gain 1d3 ferocity. Additionally, the first time each combat round that a creature adjacent to your companion takes damage, you gain 2 ferocity. You lose any remaining ferocity at the end of the encounter.
