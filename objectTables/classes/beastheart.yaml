  A beastheart travels with a ferocious beast companion -- not a trained pet, but an untamed creature bound by a primordial connection. As battle rages, the companion may succumb to a blood-soaked rampage, lashing out at enemies and allies alike.

  The beastheart is a master class, intended for players familiar with the game.
