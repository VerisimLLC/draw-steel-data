        description: |-
          You have an epic resource called ferox. Each time you finish a respite, you gain ferox equal to the XP you gain. You can spend ferox on your abilities as if it were Ferocity.
          Additionally, you can spend 1 ferox as a free maneuver to allow you and your companion to each take a main action on your turn, instead of a main action and a maneuver. On that turn, the Ferocity cost of your heroic abilities is reduced by 1.
          Ferox remains until you spend it.
