      description: "You choose an elemental specialization from the following options: earth, fire, green, or void. Your elemental specialization is your subclass, and your choice of specialization determines many of the features you'll gain as you gain new levels, including one of the following benefits. (*Quick Build:* Fire.)"
      guid: 280a940e-4d71-4eda-acfd-9923aa3e80e7
