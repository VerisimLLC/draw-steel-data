        class:cb44d111-a4c0-4b4e-80cf-c6c08bb9d60e: true
      description: |-
        You gain each of the following benefits once per combat encounter and can only use one per turn by shouting commands to your allies:
        ● When an ally within 10 squares of you deals Damage, they deal extra Damage equal to your Victories.
        ● When an ally within 10 squares of you moves, they can move an extra number of squares equal to your Victories.
