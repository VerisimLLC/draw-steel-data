      classid: e0263246-c362-433a-9c1e-ee29c3b63b2c
      description: |-
        At the start of a combat encounter you gain Piety equal to your Victories. At the start of each of your turns during combat, you gain 1d3 piety.

        Before you roll to gain 1d3 piety at the start of your turn, decide if you want to pray. If you do, your roll gains the following additional effects (no action required):
        If the roll is a 2, you gain 1 additional piety.
        If the roll is a 3, you gain 2 additional piety and can activate a domain effect of your choice (see below).
        If the roll is a 1, you gain 1 additional piety but anger the gods! You take psychic damage equal to 1d6 + your level, which can’t be reduced in any way.

        You lose any remaining piety at the end of the encounter.
