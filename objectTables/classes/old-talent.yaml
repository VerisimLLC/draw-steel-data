      domains:
        class:47fdd62e-27cf-4cdd-8be6-5624eef91c0d: true
      description: |-
        You gain each of the following benefits once per combat encounter and can only use one per turn:
        * When you deal Damage, you deal extra Damage equal to your Victories.
        * When you force move a target with a power, you can move them an extra number of squares equal to your Victories.
