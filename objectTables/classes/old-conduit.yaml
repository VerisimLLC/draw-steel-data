      domains:
        class:953b2e2b-6f38-4b10-87d3-5c382e07fc33: true
      description: |-
        You gain each of the following benefits <B>once per combat encounter and can only use one per turn:</B>
        ● When a hero within 10 regains Health by spending a Recovery, they regain extra Health equal to your Victories.
        ● When a hero within 10 makes a Resistance Roll, you can increase the result by a number equal to your Victories.
      modifiers: []
      source: Conduit Class Feature
      name: Victorious Faith
    - __typeName: CharacterFeature
