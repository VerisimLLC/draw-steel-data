      domains:
        class:953b2e2b-6f38-4b10-87d3-5c382e07fc33: true
      description: |-
        Keywords: Magic Time: Free
        Range: 10; 1 Hero
        Effect: The target can spend 1 Recovery for every 1 Virtue spent.
        Alternate Effect: Choose an effect for every 1 Virtue spent that ends at the end of their next turn or that regaining Health can end on the target. The effect ends.
      modifiers: []
      source: Conduit  Class Feature
      name: Healing Grace (Costs 1+ Virtue; 1/Turn Only)
