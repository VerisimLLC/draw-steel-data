          guid: db752233-0493-4884-879b-eb9f486927dc
        description: |-
          You have an epic resource called command. Each time you finish a respite, you gain command equal to the XP you gain. You can spend command on your abilities as if it were focus.
          Additionally, whenever you or any ally uses an ability to deal rolled damage to a creature marked by you, you can spend 1 command as a free triggered action to increase the power roll outcome for that target by one tier. Whenever an enemy marked by you makes an ability roll, you can spend 1 command as a free triggered action to decrease the power roll outcome by one tier.
          Command remains until you spend it.
        sourceguid: 0dfbce66-aacb-471d-8eed-306c53319581
        guid: 69eb3dbb-0912-4abd-b238-bd4d27f48d51
      implementation: 2
      name: Eidos
      canHavePrerequisites: true
      description: |-
        You gain an epic resource called eidos. When you take a respite, you gain eidos equal to the XP you gain. You can spend eidos as if it were essence on minions and abilities you have. When you do, you summon up to two bonus signature minions into unoccupied spaces within your Summoner's Range.
        You and your champion also have access to abilities that can be used by spending eidos (see Their Life for Mine and Portfolio Champion).
        Eidos remains until you spend it.
      guid: 537a732e-5b10-4ab7-877a-336aea5567b0
