              The push in the tier text is display-only; potency-gated command behaviors execute a horizontal push on a passed Might potency and a vertical push on a failed one.
              For each enemy reduced to 0 Stamina, the caster is prompted to choose an ally (within Summoner's Range, approximating "within distance") who then moves up to their speed.
