        behavior: triggerdisplay
        source: Summoner Class Feature
        sourceguid: 0843fd58-e590-43b5-9c76-2fcbde619be8
        ability:
          __typeName: TriggeredAbilityDisplay
          cost: All Essence
          keywords: []
          name: Their Life for Mine
          type: free
          trigger: You or Ally would die
          implementationNotes: Using Eidos to refresh the ability must be manually done by the directior
          distance: Summoner Range
          effect: |-
            If you or an ally within your Summoner’s Range would die from an effect that isn’t age related, you sacrifice all your active minions (minimum 1) and spend all your essence (minimum 1) as a free triggered action to bring the target back to life, reconstructing the
            damaged parts of their body with summoned material related to your portfolio. The target comes back with 0 Stamina plus 1 Stamina for each minion and essence used in the effect. You must have at least one fragment of the creature’s remains, and the creature’s soul must be
            willing to return to life for the effect to work.
          guid: e80df779-33f9-4b23-81b2-d2c2c67e5dcd
