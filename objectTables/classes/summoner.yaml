          rules: "If your minion is within your Summoner's Range when they take damage, you can choose to take damage in place of the minion. "
          type: passive
          guid: 239e4456-fc94-4b0a-823c-9372d4b6d4e1
          behavior: powertabletrigger
          targetType: ally
          name: Leader Formation
          description: |-
