    - __typeName: CharacterFeature
      domains:
        class:b41b7bcb-6246-4906-8115-831e55f62758: true
      source: Summoner Class Feature
      classid: b41b7bcb-6246-4906-8115-831e55f62758
      modifiers: []
      implementation: 0
      name: Minions Outside of Combat
      canHavePrerequisites: true
      description: |-
        While outside of combat, you can have up to 4 minions summoned without spending essence. You can freely summon your signature minions this way. For other minions, while you have a number of Victories equal to the minion’s essence cost or more, you can summon
        up to the set number of minions listed on their stat block.
        Each of your minions can be given a simple task and a destination you’ve previously visited and they’ll fulfill it to the best of their ability. Example tasks include sending messages, scouting, and carrying supplies. Your minions aren’t followers and can’t make project rolls until you can summon specialists.
        When combat begins, any of your minions who were summoned outside of combat finish their tasks and are then dismissed.
      guid: 819e4d95-0048-47b9-8f40-3c5dc661cbf9
