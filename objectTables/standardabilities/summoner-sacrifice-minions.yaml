description: Whenever you use a heroic ability or call forth a minion that costs essence, you can willingly sacrifice one or more of your minions within your Summoner's Range to reduce the cost by 1. You can't kill minions this way if they used a main action or maneuver during the turn. You can sacrifice more minions than you would reduce the cost by. At 10th level (No Matter the Cost), you instead reduce the cost by the number of minions sacrificed, to a minimum cost of 1.
