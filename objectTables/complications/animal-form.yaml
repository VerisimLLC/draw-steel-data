      source: Complications
      description: 'As a maneuver, you take the form of a specific animal of size 1T. You retain all your other statistics aside from your size, but you can’t talk or use main actions, and the only maneuvers you can use are Escape Grab, Hide, and Stand Up. Based on the animal you can turn into, you might be able to burrow or fly, or to automatically climb or swim at full speed while moving. If your animal form doesn’t provide such additional movement, you have a +2 bonus to speed. Unless you use this benefit again, you return to your true form at the start of your next turn. '
      suppressOthers: false
      name: Animal Form - Benefit
