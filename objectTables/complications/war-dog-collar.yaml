__typeName: CharacterComplication
id: 6d150697-ecb9-4300-8d15-6adb67fe6b1e
description: "You wear a loyalty collar from one of Ajax’s war dogs (see Draw Steel: Monsters). You’ve managed to rig the collar so it explodes outward while keeping you safe."
mtime: 1775395008633
benefit: |-
  Even if you are a war dog yourself, other war dogs can’t use their Posthumous Promotion ability on you while you wear your collar. Additionally, you have the following ability:

  Posthumous Retirement
ctime: 1755518283176
drawback: Each time you use your Posthumous Retirement ability, the Director can spend 3 Malice to make your collar malfunction and deal its damage to you in addition to the usual targets.
