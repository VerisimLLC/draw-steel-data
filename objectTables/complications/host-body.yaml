    guid: 17f942dc-f48b-4a8b-ae91-ffe2c1453613
    canHavePrerequisites: true
    description: You are a sapient fungus who inhabits a humanoid body. Your host body follows all the usual rules for a character and is considered to be alive. At any time while your host body is alive, or for 24 hours after it dies, you can use a main action to move to a dead humanoid within 10 squares of the body and use it as your new host body, provided the body belongs to a playable ancestry. When you do so, your original host body dies if it was alive. Your new host body gains all your statistics except size, ancestry traits, and other statistics related to your former host body's ancestry, which you instead gain from your new host body. When you inhabit a new host body, you start with 1 Stamina and can immediately spend a Recovery.
    modifiers: []
    source: Complications
    name: Host Body - Benefit
  - __typeName: CharacterFeature
    implementation: 4
    guid: e3416def-64aa-434f-a318-01ea1a6ee929
    canHavePrerequisites: true
    description: You have fire weakness 5. Additionally, you take a bane on any test made to read a humanoid creature's emotions or body language.
    modifiers:
