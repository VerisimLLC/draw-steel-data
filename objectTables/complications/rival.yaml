    source: Complications
    name: Rival - Benefit
  - __typeName: CharacterFeature
    implementation: 2
    guid: 706d5b94-b829-4854-9fbf-f52ee8bd70a3
    canHavePrerequisites: true
    description: |-
      Your rival has similar statistics to yours, but always had one skill they excelled at, as determined by the Director. Intimidated by their prowess, you take a bane on tests using that skill.

      DIRECTOR INSTRUCTIONS
      As we cannot determine what skill you will choose for the rival, we have provided a Modify Power Roll template below which will give the chosen skill a Bane.
      In the below 'Modify Power Rolls' behaviour, click the 'Add Skill' dropdown and select the skill you have nominated. Then scroll down and in the 'Activation' dropdown, select 'Always' and click Confirm. This will activate the Bane on all tests that use the skill you have chosen.
    modifiers:
    - __typeName: CharacterModifier
