    canHavePrerequisites: true
    description: |-
      Choose one of your skills. That skill grants a +3 bonus to tests instead of +2.

      DIRECTOR INSTRUCTIONS
      As we cannot determine what skill a player will choose, we have provided a Modify Power Roll template below which will turn the chosen skill into a +3 instead of a +2.
      In the below 'Modify Power Rolls 'behaviour, click the 'Add Skill' dropdown and select the skill the player has nominated. Then scroll down and in the 'Activation' dropdown, select 'Always' and click Confirm. This will activate the Edge on all tests that use the skill the player has chosen.
    modifiers:
    - __typeName: CharacterModifier
      modtype: plusone
      rollType: test_power_roll
