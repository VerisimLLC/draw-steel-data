__typeName: equipment
implementation: 2
level5: The shield’s bonus to Stamina increases to +5, and you can use the shield’s free triggered action against any enemy within 10 squares who uses an ability. Additionally, any enemy who uses the Escape Grab maneuver while grabbed this way takes a bane on the test.
flavor: An unseen force seems to draw this steel shield toward nearby creatures.
level9: The shield’s bonus to Stamina increases to +9. Additionally, you can use a maneuver to pull any number of targets the shield has grabbed up to 5 squares.
