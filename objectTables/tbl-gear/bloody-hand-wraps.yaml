level5: The damage bonus granted by the hand wraps increases to +2. Additionally, once per turn, you can take 10 damage that can’t be reduced in any way to make a melee free strike (no action required). On your turn, you can use the wraps’ melee free strike option or Grab maneuver option, but only one.
