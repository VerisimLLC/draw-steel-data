__typeName: equipment
level5: The weapon’s extra poison damage increases to 2. A signature ability made using the weapon that obtains a tier 3 outcome also makes the target weakened and slowed until the end of their next turn.
flavor: This mechanized bow is set with magical reservoirs that carry the faint tang of toxins.
level9: The weapon’s extra poison damage increases to 3. Additionally, if you use an ability using the weapon that targets one creature and you don’t have a bane or double bane on the ability, you can take a bane. Doing so lets you target another creature adjacent to the original target. Alternatively, you can have a double bane to target two creatures adjacent to the original target.
