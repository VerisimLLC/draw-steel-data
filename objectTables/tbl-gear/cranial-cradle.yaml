    name: Invisible Hands
    description: Once per turn, you can grab or manipulate the target objects with your mind, moving the objects up to 5 squares. You can use this ability to turn doorknobs, pull levers, and so forth. You can manipulate any small movable piece of a larger object as long as the piece is unattended and size 1S or smaller. You can’t use this ability to break a smaller piece off a larger object. If an object is force moved into a creature using this ability, it deals an extra 2 damage.
