flavor: |-
  A short iron wand shaped of interlocking segments leaks greasy black oil
  from its joints.
type: Gear
description: |-
  As a maneuver, you snap this wand in half, letting you vertically pull one object or creature of size 3 or less within your line of effect a number of squares based on that target’s size:
  - **Size 1L or smaller:** vertical pull 6
  - **Size 2:** vertical pull 3
  - **Size 3:** vertical pull 1
  If you pull a size 1T object adjacent to you, you can catch it.
