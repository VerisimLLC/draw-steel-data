level5: The ring’s bonus to Stamina increases to +12. Additionally, you have damage immunity 2.
flavor: This ring appears to be traced by dried blood, which returns each time it is rubbed away.
level9: The ring’s bonus to Stamina increases to +21. Additionally, if a creature bonded with you dies, you can choose to die in their place. Your sacrifice twists fate to remove the creature from danger, and they regain Stamina equal to their winded value. Your ring then teleports into their possession and ceases to be magic.
