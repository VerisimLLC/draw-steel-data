description: |-
  While wearing the Mirage Band, you automatically perceive illusions for what they are, you can see invisible creatures, and supernatural effects can’t conceal creatures and objects from you.Additionally, you have the following ability.
  Hallucination Field
  A blanket of illusion twists around you and your allies, making you seem as if you belong wherever you are.
  Psionic, Ranged Maneuver
  o Ranged 10 x Self and any ally
  Effect: Each target is covered by an illusion causing them to appear
  exactly as any creature (humanoid, animal, undead, and so forth)
  an observer most expects to see. The illusion ends for all targets if
  any creature under its effect harms or physically interacts with any
  creature not affected by the illusion, if you use this ability again, or
  if you choose to end the effect (no action required). The illusion also
  ends for any affected ally who moves more than the distance of this
  ability away from you.
