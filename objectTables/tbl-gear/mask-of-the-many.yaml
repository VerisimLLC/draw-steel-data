description: |-
  While you wear this mask, you can use a maneuver to transform into any humanoid of equivalent size that you have previously seen.

  The humanoid’s appearance reflects the last time you saw them, including whatever they were wearing. Your clothing and gear are transformed into the figure’s clothing and gear, absorbed into your body, or retain their original forms, as you determine. If the figure possessed any treasures when you last saw them, they are duplicated as mundane copies while you are transformed.
