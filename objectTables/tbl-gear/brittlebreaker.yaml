__typeName: equipment
level5: The implement’s extra psychic damage increases to 3. Additionally, once per round when you take more than 20 damage from a single source, the implement’s extra damage is doubled until the end of your next turn.
flavor: This crystal wand thrums with power, yet is so thin and brittle that it feels as if even a slight squeeze will shatter it.
level9: The implement’s extra psychic damage increases to 4. Additionally, whenever you use a damage-dealing magic or psionic ability, you can take half as much total damage as is dealt to all targets to immediately use the same ability again. The damage you take can’t be reduced in any way. You can’t use this benefit more than once a turn.
