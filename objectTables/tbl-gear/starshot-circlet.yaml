description: "Effect: Whenever you are outdoors and in a natural environment while wearing this circlet, you gain an edge on tests made using the Navigate or Nature skill, and you can't be surprised while you can see the night sky.\n \nAdditionally, when you make a ranged free strike using the Starshot Circlet, the target is bathed in silver light. You have a surge on the strike that deals fire damage and after the strike you and each of your allies gain an edge on abilities used against this target until the end of the target's next turn. Once you have used this feature, you must gain 2 victories or complete a respite before you may use it again."
