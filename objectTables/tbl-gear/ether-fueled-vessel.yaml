__typeName: equipment
level5: The implement’s damage bonus increases to +2. Additionally, when you move through a creature who is insubstantial to you, you can use a free triggered action to deal damage to them equal to your highest characteristic score. If you do, the insubstantial effect ends immediately after you pass through the creature and into an adjacent space outside them.
flavor: This bronze bottle has been shaped into the form of a ghostly figure.
level9: The implement’s damage bonus increases to +3. Additionally, any creature who is insubstantial to you and isn’t a leader or solo creature also can’t make opportunity attacks against your allies while they remain insubstantial.
