  name: Shadowmeld
  sourceguid: eb48d72b-3425-446b-a58b-dd965c79ec70
  description: |
    While in shadow form, you have full awareness of your surroundings, attacks against you and tests made to find you take a bane, and you can’t move or take actions or maneuvers except to exit this form. Any ability or effect that targets more than 1 square affects you in this form only if it explicitly affects the surface you are flattened against. You can exit this form as a maneuver.
