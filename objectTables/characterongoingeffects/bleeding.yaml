  description: |-
    While a creature is bleeding, whenever they make a test using Might or Agility, make a strike, or use an action, or a triggered action, they lose Stamina equal to 1d6 + their level after the test, strike, action, or triggered action is resolved. This Stamina loss can’t be prevented in any way.

    You take damage from this condition when you use a main action off your turn. For example, a signature ability used as a free triggered action with the assistance of the tactician’s Strike Now ability triggers the damage from the bleeding condition.
