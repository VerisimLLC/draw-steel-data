description: "This creature is engulfed in the shambling mound's sack. While engulfed, the creature is restrained, takes 3 poison damage at the start of each of their turns, and can't take damage from abilities used from outside the sack: damage from outside instead strikes the sack, represented by this effect's 30 temporary Stamina (the sack has damage immunity 5 and fire weakness 10). When the sack's temporary Stamina is destroyed, this effect ends and the creature is freed, appearing in an unoccupied space within 2 squares of the shambling mound. The engulfed creature moves with the shambling mound. If the shambling mound dies, the creature is freed."
