  description: |
    Area, Ranged, Weapon. Maneuver. 1 cube within 3. A gnoll acting this turn drops an iron-jawed snare into the area. The first time any enemy moves into a square with a snare, they make an Agility test. If they were unaware of the snare, the test takes a bane.
    - Tier 1 (<=11): 6 damage; bleeding (save ends)
    - Tier 2 (12-16): 4 damage; bleeding (EoT)
    - Tier 3 (17+): No effect.
    Effect: While an enemy is bleeding this way, each gnoll in the encounter gains an edge on strikes made against them.
