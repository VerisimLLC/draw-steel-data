  description: |
    Area, Ranged, Weapon. Maneuver. 1 cube within 3. A lizardfolk acting this turn sets up a net trap into the area. The first time an enemy steps into a square with a net trap, they make an Agility test. If the creature was unaware of the trap, they take a bane on the test.
    - Tier 1 (<=11): Restrained (save ends).
    - Tier 2 (12-16): Restrained (EoT).
    - Tier 3 (17+): No effect.
    Effect: Any creature not also restrained by a net trap who is adjacent to a creature restrained by the trap can free them as a maneuver.
  display:
    brightness: 1
    hueshift: 0
    bgcolor: "#ffffffff"
    saturation: 1
  range: "3"
  name: Net Trap
