  description: |
    The air across the encounter map is thick with dust until the end of the encounter. Each enemy in the dust is suffocating. Additionally, at the end of each round, each enemy in the dust makes a Might test.
    - Tier 1 (<=11): Until the end of the enemy's next turn, their stability is reduced to 0, and any forced movement effects targeting them gain a +2 bonus to the distance moved.
    - Tier 2 (12-16): The enemy's stability is halved (EoT).
    - Tier 3 (17+): No effect.
  repeatTargets: false
  range: 1
  name: Choking Dust
