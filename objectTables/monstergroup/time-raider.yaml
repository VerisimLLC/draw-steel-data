  description: |-
    10 Malice. All time raiders in the encounter collectively create a psionic field over the encounter map, which lasts until the first time raider with the highest Stamina maximum drops to 0 Stamina or chooses to end the field (no action required). While the field is up, each non-time raider on the map makes a Reason test against this psionic effect at the start of each round.
    - Tier 1 (<=11): 10 psychic damage; slowed (EoT)
    - Tier 2 (12-16): 7 psychic damage; slowed (EoT)
    - Tier 3 (17+): No effect.

    Cast this from the time raider with the highest Stamina maximum: that raider anchors the field.
