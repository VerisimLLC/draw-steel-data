rows:
- __typeName: RollTableRow
  id: 5c676e9e-eba8-4052-a7be-eaedce4171bf
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Blood Money:** When you entered adulthood, you heard unsavory whispers about your family’s fortune before learning that their wealth came at the cost of others’ suffering. Whether you shed light on the secret or not, you left to become a hero stripped of noble title."
- __typeName: RollTableRow
  id: fda5d0ca-8ff1-4fdf-9ea5-2f9a67066162
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Charmed Life:** Whether through some supernatural power or your innate persuasiveness, you were able to defraud other aristocrats. You did it for fun. And when you were found out, you lost your status. Whether you served time or escaped punishment, you decided to rehabilitate yourself and became a hero. "
- __typeName: RollTableRow
  id: 29364644-ba3f-462c-bfb2-93730849ba47
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Inheritance:** The guardians who instilled in you the virtues of doing the right thing were murdered in a senseless petty robbery. Though their wealth was bequeathed to you, it did little to assuage the guilt you felt for being unable to stop the deadly crime. You decided to use your riches to fund your life as a hero, whether publicly or using an alter ego."
- __typeName: RollTableRow
  id: 146b5f8e-829d-4b9d-9501-223dbfa5a9bc
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Privileged Position:** Life outside the manor never piqued your interest. You had everything you wanted. It thus came as a surprise when the peasants came to overthrow your family. You narrowly escaped, and for the first time witnessed the world. It caused you to become a hero for the people, fighting against inequities."
- __typeName: RollTableRow
  id: 0a2d5aea-98a3-4762-869a-7b5b822a88c0
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Royal Pauper:** Seeking a break from noble duties, you sought a lookalike to switch identities with. It went so well that you made a habit of switching whenever you were bored. Unfortunately, your counterpart became so good at imitating you that they convinced all those around you that you were an impostor. You lost contact with your family, but now pursue a heroic path free of the pomp of your old life."
- __typeName: RollTableRow
  id: 6ce5f2b1-3982-4fc3-b840-599df0da52d4
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Wicked Secret:** One parent passed away when you were a baby and the other remarried years later. Then that parent died under suspicious circumstances. Their spouse ousted you, and you were banished (and possibly hunted). Rising from tragedy, you now seek to right the wrongs of the world."
