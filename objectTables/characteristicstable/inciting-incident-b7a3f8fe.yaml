- __typeName: RollTableRow
  id: 448d2000-5379-4952-9f2e-6689934bac36
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Betrayed:** A local crime lord offered you money to throw your last bout, promising that you’d live through the ordeal and get a cut of all the wagers placed on the match. You upheld your end of the deal—which made the knife in your back after the bout so surprising. You woke in a shallow grave, barely alive, and ready to mete out justice."
- __typeName: RollTableRow
  id: c96020a8-a03a-4b18-b67a-aa6a2091babd
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Heckler:** As you stood victorious on the arena sands, a voice cried out among the cheering. “This violence is only for show. You should be ashamed. There are people who need you—who need your skills!” Why did that voice ring so clear? And why did it sound so familiar? You never saw the face of the person who uttered those words, but they weighed heavy on you. The next day, you fled the arena to begin a hero’s life. "
- __typeName: RollTableRow
  id: 0262d71c-747f-4add-a75a-3be5efeec6aa
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Joined the Arena:** As a child, you loved gladiatorial matches, captivated by the fierce displays of bravery and bravado, never giving much thought to how the competitors ended up in the ring. Then your friend was wrongly accused of a crime and sentenced to compete. You went in their place. After viewing what life was like for those forced to fight, you survived your sentence and resolved to protect the unfairly condemned. "
- __typeName: RollTableRow
  id: 5dfbd381-85f2-4af4-96b3-ccf6eb00ced4
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**New Challenges:** You earned every title you could. You beat every opponent willing to face you in the arena. Your final battle with your rival ended with you victorious—and still you were unsatisfied. Other, greater foes are out there. And you mean to find them."
- __typeName: RollTableRow
  id: 5c735340-5ec4-4ca9-a33d-9944a2f2d968
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Scion’s Compassion:** You were born a noble, but the duplicitous and power-hungry nature of your family had you seeking your own fortune in the arena. You saw that competitors brought there by circumstance and not choice suffered. You gave all you could of your family money to those less-fortunate folk, and then set out to make a real difference in this cruel world."
- __typeName: RollTableRow
  id: 61aa6376-2e23-4833-b477-c1b6622af0ab
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Warriors’ Home:** The orphanage you grew up in secretly supplied gladiators to the arena. Forced to fight against many childhood friends as an adult, you vowed to dismantle the arena and free other victims. You became a liberator, dedicated to ending the oppression of others until your dying breath."
