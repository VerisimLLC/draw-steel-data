rows:
- __typeName: RollTableRow
  id: 912cd334-5c39-4045-aefc-45a83f07d938
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Awakening:** In an uncharted area, you awakened some fell horror. You subsequently turned to the life of a hero to put an end to the dread you unleashed and keep other hidden dangers at bay."
- __typeName: RollTableRow
  id: 615ee7b2-df7a-424b-be4b-d69e6149ca96
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Missing Piece:** You made an important but dangerous discovery about a treasure or ancient ritual that could spell mass destruction. Then the unthinkable happened when an unscrupulous colleague, spy, or treasure hunter stole your research notes. You’re looking for the thief now, and anyone else who might use such discoveries for ill."
- __typeName: RollTableRow
  id: a930203c-f044-4139-ab7b-e87bac138529
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Nothing Belongs in a Museum:** Exploring distant lands to collect valuable artifacts for cultural institutions was once your way of life. But when people died trying to reclaim one of the objects you took, you realized the truth. Your work was part of a larger problem of cultural theft, and the best place for these significant objects wasn’t in a museum but with the people who created them. Setting out to return what had been taken and to protect others from theft set you on the path to become a hero. "
- __typeName: RollTableRow
  id: 95b45746-053b-4313-9c45-0fc311806f8e
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Unschooled:** You delved into dungeons and far-off places by studying them in books. You were an explorer who never felt the need to experience the dangers your peers did. Then your theory about a lost world cost you your reputation, and gave you the impetus to go on adventures and stand up for those with different ideas."
- __typeName: RollTableRow
  id: 4317437e-a88e-4d1f-9bb4-39f04a6a9d15
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Wanderlust:** You saw yourself as an observer and operated within a code of conduct. You swore to never interfere with a group by exposing them to your technology, knowledge, or values. But when faced with a moral conundrum, you either broke your code or stood idly by—and suffered the consequences. During this incident, you lost your observation journal but became a hero who refuses to let evil stand unchecked."
- __typeName: RollTableRow
  id: 94a5e908-8dfd-4d0e-8bf4-66db02e562b1
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Wind in Your Sails:** As a seafaring explorer, you lived to chart unknown courses. Though travel on the high seas was fraught with danger, the destination was always rewarding in riches, knowledge, or some other meaningful benefit. But your luck ran out when your ship was destroyed by pirates or other enemy forces. Now you’ve taken to protecting those who seek safe passage while also hoping to avenge your crew."
