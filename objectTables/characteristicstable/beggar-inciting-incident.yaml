rows:
- __typeName: RollTableRow
  id: 4efcd658-0a5a-4f02-a1dd-917dd87612cd
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Champion:** You were never content with your lot. Watching yet another friend fall to preventable circumstances was your last straw. You gathered up what little you had and set off to become a hero, determined to make real change for those society forgot."
- __typeName: RollTableRow
  id: 4e98373a-7b3d-487e-bdd2-311fd5f271bc
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Night Terrors:** Something killed the other beggars. It came in the night. You barely saw it, but what you did see of it wasn’t natural. You survived by hiding, or perhaps it simply passed you over for reasons unknown to you. It still haunts your nightmares, and you kill monsters so no one else has to experience such horrors."
- __typeName: RollTableRow
  id: 5eb7d046-39cf-48cb-bc91-d8887007e8c5
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**One Good Deed:** You ran afoul of the local watch by being in the wrong place when they were in a bad mood. A passing hero intervened on your behalf, shaming the guards into moving on, then gave you enough gold to get you back on your feet. Their kindness kindled a spark in you. You took the gold, bought some secondhand gear, and went to pay that hero’s kindness forward."
- __typeName: RollTableRow
  id: 36c932d8-5b2b-480b-a123-bebf549f9034
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Precious:** No matter how far you’d fallen, there was one belonging you would never part with, no matter how much money it would bring you. When a pickpocket stole that object, you chased them until you were in a part of the city you no longer recognized. With a jolt, you realized you had no desire to return to your previous stomping grounds. You kept going, and you haven’t looked back."
- __typeName: RollTableRow
  id: d877950c-0b98-47f9-9159-5e0f661ad286
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Strange Charity:** A passerby dropped something in your cup. When you counted your day’s collections, you found a magic coin among the coppers. You knew immediately that it was special. When the other beggars—your friends, you thought—showed that they were ready to murder you for it, you killed several of them in self-defense before you fled, leaving behind the only semblance of community you had."
- __typeName: RollTableRow
  id: 15af583d-9308-4f98-baef-d1907c63cb65
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Witness:** You witnessed something you weren’t meant to. Others would kill you if they knew, and they might be searching for you even now. You remain on the move, terrified of remaining in one place too long lest it all catch up to you. Perhaps if you make a big enough name for yourself, you can become untouchable and finally speak of what happened without fear."
