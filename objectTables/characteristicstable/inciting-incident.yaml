rows:
- __typeName: RollTableRow
  id: 597e8245-13bf-4ea2-85e3-9410ef07160b
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Blight:** A horrible blight swept over your homeland, sickening the livestock and causing crops to rot. No one knows whether the blight is of natural origin or something more malevolent, but you set out in search of a way to cleanse the land of this affliction."
- __typeName: RollTableRow
  weight: 1
  id: d425e73a-d543-486a-bbc9-b1a8b911aa2b
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Bored:** You’ve always wanted so much more than gathering eggs and milking cows. You kept a secret journal of your dreams, filled with all the things you wanted. When your parent found the journal, they burned it and told you to keep your head out of the clouds. In response, you gathered what you could in a pack and left everything else behind, seeking a life of adventure. "
- __typeName: RollTableRow
  weight: 1
  id: 21d2efc4-f6f0-46d0-b29d-cbc8c5bbd744
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Cursed:** While tilling your fields, you found something in the dirt. Perhaps it was a chipped and dented weapon, a piece of ancient jewelry, or something altogether unique. Excited by your find, you showed it to a loved one, but when they touched it, something happened. You now know it was a curse conveyed by the item, though you don’t know why it affected them and not you. You left your old life in search of answers. "
- __typeName: RollTableRow
  weight: 1
  id: c0d6ed26-5768-4c6d-9f0b-9902670cb131
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Hard Times:** Your farm had always been prosperous, until the last few years. Changes in the weather caused smaller yields until you could no longer pay your tithe to the local noble. Her soldiers took what items of value they found, including a precious family heirloom. You left the struggling farm behind to find a better life. "
- __typeName: RollTableRow
  weight: 1
  id: 31d63ecf-4f21-40c2-91f1-7e41e4238704
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Razed:** Your animals were killed, your crops and home set ablaze. The culprits might have been wandering bandits, raiders from a nearby kingdom, or hired thugs sent by a rival farm. Whoever they were, they left you with nothing. You couldn’t face the thought of starting again from scratch, so you took up a life of heroism to protect others from such villainy. "
- __typeName: RollTableRow
  weight: 1
  id: accb63b1-ffb2-413e-bfe5-bd4578c77b63
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Stolen:** Your family bred horses—beautiful creatures with few rivals on the track and in the jousting lists. When a local noble arrived with an offer to buy your prized stallion, your father refused. The noble struck him down where he stood and stole the horse. Without that stallion, the renowned bloodline would end. You intend to get them back—and get revenge. "
