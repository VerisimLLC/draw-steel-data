rows:
- __typeName: RollTableRow
  id: 5ac9d1b1-da51-450e-89c7-f71be786d3de
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Bookish Ideas:** You were always content to live a peaceful life in your library, until you found that one book—the one that told the tale of heroes who had saved the timescape. They didn’t spend their days behind a desk. They made a real difference. It was time for you to do the same. "
- __typeName: RollTableRow
  id: e6397847-d06f-4949-9c3a-52b71229a870
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Cure the Curse:** You used to think knowledge could fix everything. You were wrong. When someone you loved fell under a curse, the means to cure them couldn’t be found in any of the books you owned. But that wasn’t going to stop you. The answers are out there, and you’ll find them even if you need to face down death to do so. "
- __typeName: RollTableRow
  id: 459e2b78-2b94-47fe-8e70-e610170a584f
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Lost Library:** An evil mage took all your books for themself, cackling at your impotence as they raided your shelves. Now you’re off to search through ancient ruins and secret libraries to rebuild your collection of rare tomes—and to find the mage who stole from you. "
- __typeName: RollTableRow
  id: 39effcfa-7df8-44d0-b1be-e9053680d283
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Paper Guilt:** While transcribing ancient texts, you and another scribe discovered a shelf of long-forgotten books. At your suggestion, your companion got to work on one and vanished along with the tome. Your guilt drove you to seek out your friend and prevent others from falling into similar dangers. "
- __typeName: RollTableRow
  id: 14054b5c-0105-4325-968f-cd4d847a08f8
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Unforseen Futures:** In your pursuit of ancient knowledge, you discovered a prophecy that has yet to come to pass. It involves someone that might be … you. After your discovery, strange dreams plagued you, driving you to seek out your destiny. "
- __typeName: RollTableRow
  id: 399caabe-0840-4e66-9399-b3fb1c41d339
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Vanishing:** At first you thought that it was your imagination, and you brushed off the disappearance of random sentences in historical books off. As the books changed to entirely blank pages, they became difficult to ignore, particularly those involving ancient or critical text. Driven by the desire to preserve knowledge, you have made it your purpose to restore and reverse these vanishing texts before they forever disappear. "
