__typeName: RollTable
rows:
- __typeName: RollTableRow
  id: a93eedf1-153f-4efd-8cce-c8c6b427fe81
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Diplomatic Immunity:** Your political power allowed you to be foolish without consequence. Through sheer carelessness or on a dare, you accidentally harmed or killed an innocent bystander. Due to your position as an official, you faced no consequences. But this event was the final straw for the person you loved or respected most, and they turned away from you. You left the world of political machinations behind to earn back their trust."
- __typeName: RollTableRow
  id: 0e44dfe0-b3b9-4d70-859d-7bf54f88825f
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Insurrectionist:** You secretly funded a rebel organization intent on overthrowing the corrupt establishment. Someone discovered your treason, and you were forced to flee or risk execution. You became a hero to live and fight another day on behalf of those who have no power."
- __typeName: RollTableRow
  id: 615df076-e944-427c-8acb-c0fd304fc4f8
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Respected Consul:** You were a seneschal to a leader, able to sway their opinions. But gossip convinced the leader you were plotting a coup, and you were ousted from their circle of influence. You became a hero to continue your work making meaningful change in the world. "
- __typeName: RollTableRow
  weight: 1
  id: e605cb0a-fce9-42f8-8a39-f35d007e1e7a
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Right Side of History:** You tried to work on policy change from the inside of a bureaucratic organization. There were others like you who were more vocal. You started to notice those colleagues were disappearing overnight. Not wanting to find out if you were next on the list, you left to enact change in more direct ways. "
- __typeName: RollTableRow
  id: 38c32bb2-cdab-4cd8-99a3-db589e51a65e
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Self-Serving:** You used your skills to collect incriminating or scandalous information about your opponents to blackmail them. A rival got one step ahead of you and stole your book of dirty secrets. But instead of using it against you, they gave you an opportunity to leave the world of politics behind. Saved from public humiliation, you now use your skills for the greater good. "
- __typeName: RollTableRow
  id: fd51c191-bc44-4045-a0f8-cedf7a8fb4b6
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Unbound:**  The red tape required to achieve anything through your political position resulted in a crisis being mishandled and countless people harmed or killed. After that unfortunate event, you resolved to live unfettered by bureaucratic interference, seeking to do good through action, not paperwork. "
