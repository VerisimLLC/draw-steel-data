- __typeName: RollTableRow
  id: c847a1c4-f7a1-4cd9-ba83-f9fb735db53f
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Forgotten Memories:** While practicing a spell, your inexperience caused the magic to backfire and your memories were wiped away, leaving you only fragments of who you once were. Determined to recall your past, you dedicate yourself to helping others, hoping that your actions spark some remembrance or lead you to a way to reverse the magic."
- __typeName: RollTableRow
  id: 4b62ac45-0b13-4675-937b-d5f74088d3b8
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**The Magic of Friendship:** As a sign of your status as star pupil, your mentor gifted you a familiar, a magic pet. Another jealous apprentice captured your companion and slipped away in the night. Haunted by your pet’s absence, you adventure to find your kidnapped friend and prevent others from feeling your loss."
- __typeName: RollTableRow
  id: e0b8236e-3636-483b-98ed-4abab504d92a
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Missing Mage:** One day you woke up and the mage you worked for was just gone. They didn’t take any of their belongings, and there was no sign of any foul play—just the scent of sulfur in their bedchamber. You set out on your heroic journey in the aftermath and have been looking for them ever since."
- __typeName: RollTableRow
  id: 6d862506-7caf-46d6-b009-c588780985b8
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Nightmares Made Flesh:** Your attempts at magic have always been unpredictable. A powerful mage promised to help you gain control. During your training, a terrible nightmare caused your body to flare with magic pull the monster of your nightmare into the waking world. The horror escaped. You left, seeking to vanquish its terrible vileness.   "
- __typeName: RollTableRow
  id: 231057cf-08b2-40ce-ae1d-6f68a96297a7
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: |+
        **Otherworldly:** While studying magic, you accidentally sent yourself from your original world to this one. Now you’re stranded here, hoping to find ancient texts or powerful magic treasures that might transport you back home. A life of adventure it is!
- __typeName: RollTableRow
  id: 185df9ff-a253-402b-b4f2-2778f5ea4711
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Ultimate Power:** The mage you worked for was a kindly old soul, but the basic magic they taught you always seemed like a small part of something bigger. It wasn’t until you met an adventuring elementalist that you realized hitting the road as a hero was the only way to truly improve and hone your skills. You resigned your apprenticeship and found yourself walking the path of a hero the next day."
