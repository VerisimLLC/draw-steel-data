__typeName: RollTable
rows:
- __typeName: RollTableRow
  id: 50f2325c-ce6a-44c3-bdf9-a506df7f2448
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Betrayed:** When outsiders arrived in your lands with the intent to exploit the wilds for their resources, you spoke out against them. However, several other wardens spoke in favor of these outsiders, and allowed them in to despoil nature. Refusing to watch your homeland destroyed, you left. Now you help others avoid such a fate."
- __typeName: RollTableRow
  weight: 1
  id: 211e27e4-c6d6-487e-a30e-0efef3ce821a
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Corruption:** A disease has infected the lands you protect, causing animals to become violent and twisting plants into something sinister. You’ve tried everything, magical and mundane, to stop the scourge, but it continues to spread. As such, you’ve set out in search of a cure or an unblighted land to protect."
- __typeName: RollTableRow
  id: f2272791-4cd2-4301-8715-c31a3ab73a0a
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Exiled:** You made a mistake that could not be forgiven. The other wardens of the region decided your fate, exiling you from your lands with an order never to return."
- __typeName: RollTableRow
  id: 3c9e6ff2-3126-4ad5-8180-ddc03fdaaf1b
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Honor the Fallen:** A group of heroes arrived in your territory with trouble close on their heels. You fought alongside them to turn back the evil, but it was too much. The heroes fell, and your wilderness was forever altered. Though your lands are beyond saving, there are other lands you can help. "
- __typeName: RollTableRow
  id: 219fb426-b510-4d2a-9ebd-45a93d2d7305
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Portents:** There were signs. You tried to ignore them, but when a great beast died at your feet, you had to recognize the truth. You were meant to leave your home territory, meant to fight a battle for the fate of all lands—and so you gave up the only life you’ve ever known."
- __typeName: RollTableRow
  id: c2fc2490-cacc-4946-9e1f-773cab3c8c64
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Theft:** You were responsible for guarding something precious, something vital to your region’s survival. But you let someone in, and they betrayed your trust by stealing the thing you were meant to guard. You left your chosen territory to atone for your mistake."
