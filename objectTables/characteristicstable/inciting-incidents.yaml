- __typeName: RollTableRow
  id: db10b06e-9135-4f68-90a3-0ebc9e6b93e6
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Dishonorable Discharge:** You enlisted in the military to protect others, but your commander ordered you to beat and kill civilians. When you refused, things got violent. You barely escaped the brawl that ensued, but now you vow to help people on your own terms."
- __typeName: RollTableRow
  id: 2dd14043-e103-43d6-afe4-2f6ba13fd898
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Out of Retirement:** You had a long and storied career as a soldier before deciding to retire to a simpler life. But when you returned to your old home, you found that your enemies had laid waste to it. Now the skills you earned on the battlefield are helping you as you become a different kind of warrior, seeking to save others from the fate you suffered. "
- __typeName: RollTableRow
  id: e8f86581-13ed-412d-ac45-7f44a73b8ce6
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Peace Through Healing:** The sight of constant bloodshed took its toll on you. You seek peace through healing and dedicated yourself to ending wars before they begin to spare those around you from the horror. "
- __typeName: RollTableRow
  id: 74bf027d-8bcc-4779-9ec3-0f2a8a099178
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Sole Survivor:** You were the last surviving member of your unit after an arduous battle or monstrous assault, surviving only because of your luck. You turned away from the life of a soldier then, seeking to become a hero who could stand against such threats. "
- __typeName: RollTableRow
  id: c3509226-0400-4bea-b460-0b0078743c7b
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Stolen Valor:** Tired of eking out your existence on the street, you enrolled in the military. Somehow, you were unable to escape your lower status background until another soldier in your unit fell in battle. In the chaos that ensued, you assumed their identity and returned home a hero. To avoid suspicion, you took on the life of an adventurer, always on the move. "
- __typeName: RollTableRow
  id: 742158d4-caa7-474a-8ed5-29ffe5a4b887
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Vow of Sacrifice:** You promised a fellow soldier that you’d protect his family if he ever fell in battle. When he did, you found his village and people destroyed by war and fire. Driven by your vow, you have dedicated your life to finding any survivors that may have scattered and protecting others from a similar fate. "
