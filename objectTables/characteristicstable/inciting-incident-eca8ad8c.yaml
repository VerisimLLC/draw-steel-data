rows:
- __typeName: RollTableRow
  id: f2432479-897c-4ff2-b1fe-5ce07380bf17
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Disavowed**: While on a dangerous espionage assignment, things went sideways. Although you escaped with your life, the mission was a public failure thanks to bad information your agency gave you. They denied you work for them, and you went on the run. Hero work will let you survive and clear your name."
- __typeName: RollTableRow
  id: 9e7286c3-5be0-485d-b7e5-221b432115c7
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Faceless**: Your identity was always hidden. It was your way of protecting those around you because the work you did spying on powerful entities came with dangers. Then your world came crashing down when an enemy agent unmasked you, causing you to lose everything—your privacy, livelihood, loved ones, all gone in the blink of an eye. Instead of going into hiding, you became a public hero to protect the innocent in the name of those you lost."
- __typeName: RollTableRow
  id: d238b658-c453-4f19-9d3c-96ebc6f6795d
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Free Agent**: There was a time in your life when you used to sell information to the highest bidder. Your acts were unsanctioned by any one organization, but you were well-connected enough to trade in secrets. Politics never mattered much to you until the information you sold wound up causing a ripple effect of harm that eventually destroyed the place you once called home. You became a hero to make up for your past."
- __typeName: RollTableRow
  id: 928033bd-3b4b-49c0-8426-8a599069ad32
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Informed**: After years of cultivating a rich list of informants, one of those informants risked everything to expose the heinous plans of powerful individuals. You promised to protect your informant, but your agency left them hanging—literally. You cut ties with your employer and swore to always make good on your word as a hero."
- __typeName: RollTableRow
  id: 5502809d-0d9a-4e28-909e-46293897f775
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Spies and Lovers**: While embedded in an undercover assignment, you fell for someone on the other side. They discovered you were a double agent, and though you insisted your feelings were real, the deceit cut too deep for your love interest to ignore. They exposed you, spurned you, or died because of their closeness to you. You left the espionage business to become a hero with nothing to hide."
- __typeName: RollTableRow
  id: 724727af-fbd1-4124-895a-58c4bca64b3e
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Turncoat**: You spent your life in service of your country or an organization that upheld your values. During your undercover operations, you discovered that everything you had been told was a lie. Whether you confronted your superiors or were exposed, you were stripped of your service medals before you left to become a true hero.."
