__typeName: RollTable
rows:
- __typeName: RollTableRow
  id: 139a717d-2cac-4f3a-a22d-5c86b11bdb98
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Cursed Audience:** During a performance, you watched in horror as the audience was suddenly overcome by a curse that caused them to disintegrate before your eyes. You aren’t sure what happened, but seeking an answer quickly led you to places where only heroes dare to go. "
- __typeName: RollTableRow
  weight: 1
  id: 8aee5b06-f02e-443c-8d1f-9b0dc8845c2a
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**False Accolades:** After a poor performance, you found a script to a well-written play left in your dressing room. The accompanying note asked that if you performed the play, you should give the author credit. But after a commanding performance, you claimed to be star and playwright both—and the curse hidden on those pages activated. A small portion of your skin has begun to transform into undead flesh, and the only cure is to prove you have become selfless. "
- __typeName: RollTableRow
  weight: 1
  id: be99c2ac-c039-4fea-898c-1883834753ab
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Fame and Fortune:** You thought you were famous—then that hero came to your show. Suddenly, all eyes were on the dragon-slaying brute instead of on the stage where they belonged. The audience even gave them a standing ovation when they entered the room. All you got was polite applause. Fine. If people want a hero so much, then a hero you shall be. "
- __typeName: RollTableRow
  weight: 1
  id: a892c443-55c0-4517-924d-00d99e9b74e4
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Songs to the Dead:** Your performances have always been tinged with a bit of melancholy. During a particularly soulful performance, spirits disturbed the living audience and sat in their chairs. They begged you to prevent their demise, providing no other details before disappearing. You set out to determine if you could help your most dedicated fans. "
- __typeName: RollTableRow
  weight: 1
  id: 5cbd320a-a98d-4d7e-97a0-f67fe8c31c8e
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Speechless:** A heckler’s mocking words left you utterly speechless during a performance, stinging your pride and stirring your arrogance. The incident strained your legendary voice, and you could speak only in soft whispers. The heckler was a fey trickster who stole your voice, promising to give it back after you accomplished real good in the world. "
- __typeName: RollTableRow
  weight: 1
  id: 867130ec-c43a-4c3a-8bfc-8931439def32
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Tragic Lesson:** When a producer who once shortchanged you shouted out on the street for you to stop a thief who had picked their pocket, your spite toward them inspired you to let the thief run right on by. But that decision led to tragedy when the thief later harmed someone you loved. From that moment on, you made it your responsibility to protect others."
