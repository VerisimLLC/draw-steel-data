- __typeName: RollTableRow
  id: 580a721c-2a5c-4976-8480-b3637418e542
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Antiquity Procurement:** You stole, smuggled, and sold antiquities. In your haste to make a quick sale, you didn’t fully vet a client and they subsequently robbed your warehouse. When the items you stole were taken from you, you realized the harm you caused. Now you’re adventuring to find those items you lost and return them where they belong."
- __typeName: RollTableRow
  id: 91e82821-4f2f-48d4-a723-9a2f01ca409b
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Atonement:** The last criminal job you pulled led to the death of someone or the destruction of something you love. In order to make up for the loss you caused, you left your criminal ways behind and became a hero. "
- __typeName: RollTableRow
  id: 062707bc-36e3-4711-bc48-5f2bac2fd374
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Friendly Priest:** You went to prison for your crimes and eventually escaped. An elderly priest took you in and shielded you from the law, convinced that your soul wasn’t corrupt. They never judged you for your past, speaking only of the future. Eventually, the priest died, imparting final words that inspired you to become a hero. "
- __typeName: RollTableRow
  id: 8ee8f16a-0f36-4131-8ee1-f5a6545d8dec
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Shadowed Influence:** You spent years blackmailing manipulating nobles for influence and wealth until a scheme went wrong. You were publicly exposed, and after a narrow escape, you reevaluated your life. Under a new identity, you work as a hero and hope no one looks at your past too closely."
- __typeName: RollTableRow
  id: 43552260-8895-4ae4-806c-6cc2d9ff6138
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Simply Survival:** Stealing was a matter of survival for you and not what defined you–at least in your mind. But when your thieving actions lead to innocent folks being harmed, you knew you could be better. You turned your back on your old life, though your old skills come in handy."
- __typeName: RollTableRow
  id: 73dac7b2-d9f7-4d01-b443-8cc4a8397cbc
  value:
    __typeName: VariantCollection
    items:
    - __typeName: Variant
      type: text
      value: "**Stand Against Tyranny:** When a tyrant rose to power in your homeland, they began cracking down on all criminals with deadly raids and public executions. The nature of the crime didn’t matter—pickpockets and beggars were made to kneel before the axe alongside murderers. After losing enough friends, you stood up and joined the resistance—not just against this tyrant, but against authoritarians anywhere."
