    description: A retainer’s signature ability is unique in that it grows stronger as the retainer advances in level. Only the retainer’s signature ability improves this way! The table features two columns for a retainer’s signature ability damage bonus—one for a tier 1 power roll outcome and one for a tier 2 or tier 3 outcome. A retainer’s signature ability gains a +1 damage bonus every second level for a tier 1 outcome, and every level for a tier 2 or tier 3 outcome.
