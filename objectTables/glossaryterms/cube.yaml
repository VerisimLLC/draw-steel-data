__typeName: GlossaryTerm
definition: When an ability or other effect creates a cube, that area is expressed as "X cube." The number X is the length of each of the area's sides. A cube effect might last only as long as it takes to affect its targets, or it might have a duration specified by the effect.
name: Cube
