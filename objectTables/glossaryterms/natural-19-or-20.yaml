__typeName: GlossaryTerm
definition: When the result of a power roll is 19 or 20 before adding any modifiers. A natural 19 or 20 always achieves a tier 3 outcome on a power roll. On an ability roll with an ability that uses a main action, it is also a critical hit.
name: Natural 19 or 20
