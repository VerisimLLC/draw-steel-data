__typeName: GlossaryTerm
definition: The simplest and most basic weapon attack any creature can make. A free strike is most often used on another creature's turn, when a rule gives a creature not taking their turn an opportunity to make a quick hit against a foe. A creature can also make a free strike as a main action, but it's not the best bang for buck.
name: Free Strike
