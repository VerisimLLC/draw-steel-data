      guid: cf5065c1-0393-48a6-932c-2c3f99f43a45
      canHavePrerequisites: true
      description: When you make a melee free strike against an adjacent creature, you can bite that creature. If you do so and obtain a tier 3 outcome, you gain temporary Stamina equal to the damage dealt. If not lost beforehand, this temporary Stamina lasts until the end of your next respite.
      source: Feat
      modifiers: []
      name: Ghoul or Vampire
    - __typeName: CharacterFeature
