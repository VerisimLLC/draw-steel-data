      guid: 230eaf61-42f3-4833-a9b4-4f05a53b2adb
      canHavePrerequisites: true
      description: You can move through other creatures and objects. The first time in a combat round that you pass through a creature, that creature takes corruption damage equal to half your level. You don’t take damage from being force moved into objects.
