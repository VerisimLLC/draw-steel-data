content: |-
  # Journal Styling Showcase

  A tour of the new journal stylesheet system. Everything you see here -- the
  typefaces, the rules under headings, the framed blocks, the themed quote -- is
  driven by a *stylesheet*, not hard-coded. Swap the stylesheet and the whole page
  re-skins.

  ## Typography

  Chapter titles, headings, and body each render in their own book typeface
  (display / Newzald / Berling), with bronze rules under the major headings. Body
  and list text share one readable ink color.

  ### A Sub-Heading
  Body paragraph set in the book serif. The measure, color, and spacing all come
  from the stylesheet, so a single sheet restyles every journal that uses it.

  - A bulleted item -- the bullet is bronze and the text matches the body face
  - Another bulleted item, also inheriting the body color and font

  1. A numbered item
  2. Another numbered item

  ## Callouts and Quotes

  > A blockquote now sits in a themed box with a bronze accent bar. Previously it
  > was a fixed dark panel that ignored the page; now the stylesheet owns it.

  ::: read-aloud
  A read-aloud block: a fully bordered callout box defined by a named class. Authors
  fence a run of text with ::: and the class paints the frame.
  :::

  A run of body text can highlight a {.emphasis key term} inline with a named class.

  ## Game Blocks

  ##### Might Test
  |Might Test: Might
  | You fail.
  | You succeed at a cost.
  | You succeed.

  |Column A|Column B|
  |---|---|
  |a1|b1|
  |a2|b2|

  + A Collapsible Section
  Content tucked inside a themed collapse block, with its own frame and inner tint.

  ## Interactive

  A themeable command button: [[/roll 1d20|Roll d20]]

  ## What shipped

  - **Vertical rhythm** -- line-height, paragraph spacing, heading space before/after
  - **Heading rules** -- bronze accent lines under headings (per level)
  - **Alignment** -- left / center / right / justify, per element
  - **Embed framing** -- bordered / parchment boxes around embedded docs and widgets
  - **Macro buttons** -- themeable command buttons (the d20 button above)
  - **Per-element fonts** -- display / Newzald / Berling, the book faces
  - **Blockquote theming** -- background and accent-bar color
  - **Plus** -- block frames (power roll / table / collapse), inner row tints, named
    inline and block classes, readable list text, and a live-preview editor
