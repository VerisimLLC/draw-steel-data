content: |
  Ajax the Invincible, also known as the Iron Saint, is the human leader of Vasloria—and a vainglorious conqueror who intends to subjugate the world and gain true sainthood. With the help of his lieutenant, a powerful mage named Mortum, he has waged war across Orden from a floating fortress known as the Chrysopolis, conquering the world piece by piece.

  Two groups rose up in an attempt to stop him: the Lady of Brass and the Iron Tower of Dis. Both those factions’ own flying fortresses were readily struck from the heavens, with the Lady of Brass crashing in the barony of Oll and the Iron Tower of Dis’s flying pyramid smashing into the endless marsh of the Grey Wastes. On the heels of victory, Ajax waged a years-long war against Khemhara, the Infinite Desert to the East of Vasloria—until a conspiracy drew his attention to Blackbottom, Vasloria’s largest city.

  The mercenary company known as the Chain of Acheron shaped a plan to assassinate Mortum in Blackbottom. When Ajax learned of this plot, he teleported the Chrysopolis there and used the Jade Hand to summon the demon lord Relg. After slaying Red, the commander of the Chain, Relg now leads the fiendish invasion of Blackbottom. Ajax’s Hawklords, elite human enforcers mounted atop giant hawks, bomb sites across the city while a horde of demons tears through Blackbottom and its people.

  This demonic invasion cannot be defeated. It cannot be stopped. It cannot be delayed. Ajax’s wrath is inevitable, and the fall of Blackbottom with it. But a small group of heroes might be a ripple in a raging tide, saving as many innocent civilians as they can while fleeing Blackbottom with their lives.
