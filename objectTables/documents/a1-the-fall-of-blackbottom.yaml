  # THE FALL OF BLACKBOTTOM

  *The Fall of Blackbottom* is an adventure for the Draw Steel roleplaying game. It’s intended for four to six players, including the Director. This fast-paced, high-stakes adventure assumes that players have moderate experience with the Draw Steel system. These pages are intended for the Director’s eyes only. If you don’t plan on being the Director for this game, **stop reading now!**

  [[image]]

  # CONTENT WARNINGS
  *The Fall of Blackbottom* tasks the heroes with leading a group of civilians to safety during a violent and merciless attack on the city of Blackbottom. This adventure touches on a number of potentially sensitive themes, tropes, and challenges that should be discussed with everyone involved before you play:

  •	An “unwinnable” scenario 
  •	Scenes of urban destruction
  •	Dead, dying, and trapped civilians
  •	Depictions of torture
  •	Body and organ harvesting
  •	Violent occupation of a city
