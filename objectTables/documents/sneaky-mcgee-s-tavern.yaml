  __typeName: TextStorage
  sections:
    B: |+
      # Montage Test: Enter the name of the montage test here.

    C: |+
      {Describe an outline of your montage test here.}

    D: |+
      *(see Montage Tests in [Draw Steel Heroes](pdf:Draw Steel Heroes:261))*

    E: |+
      [[reminder:test]]

    F: |+
      ## Setting the Scene

    G: |
      * Describe the scene to your players. This will be shown to them when you present the document. 
    H: |
      * You can add as much detail you you like. 
    I: |
      * Really get them inspired. 

      {
    J: |
      The narrow street spills out into what must have once been a respectable row of taverns. Not anymore. Roughshod barricades and makeshift fences close off both ends of the street, strung with lanterns and bones and the occasional severed hand. Bridges of rope and plank connect the rooftops. Below, the mud-slick street is alive — dozens of rough figures, armed and tattooed and loud, drinking and gambling and occasionally shoving each other into the gutter. Sharpshooters lean from windows. Bugbear sentinels the size of wardrobes stand at the barricade entrance, arms folded, watching you and the wagon without any particular expression. They let you through without a word. Nobody here asks questions.
    Tf: |+
      :<>[[scene:image]]

    Yi: |
      :<>[[scene:image]]
    em: |-
      :<>[[scene:image]]
      }
    JZ: |2

