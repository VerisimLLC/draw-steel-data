  The major deepwater port city of western Vasloria, the Free City of Blackbottom has been a city of trade outside the feudal structure of Vasloria since even before the coming of the Caelian Empire three thousand years ago. The city is situated in western Aendrim between the baronies of Tor and Bedegar, and no duke, baron, or count of Aendrim rules or has any sway over the city. Instead, a small coalition of local nobles and merchant leaders make up the city council, the head of which is the lord mayor. The lord marshal of Blackbottom is the city’s ranking law enforcement official, known locally as the chief thieftaker.

  Blackbottom gets its name from the massive black flagstones that tile the entire floor of the city’s harbor estuary. No one knows who laid these stones, never mind how or why, but many fantastical candidates can be found in local folklore—none of them human.

  Before Ajax’s assault on the city (as detailed in this adventure), Blackbottom was known as the City of Smugglers. This was not a wholly pejorative term, however—everyone, from thieves and merchants to the barons and dukes, benefits from having one place where everyone can do business without fear of taxation or regulation. Getting things out of the city into Aendrim and beyond involves paying tariffs at the toll bridges along the roads leading to Tor and Bedegar. But there are always ways for an intrepid merchant to avoid the tariffs—especially if they don’t fear the law or the threat of prison. 

  Blackbottom’s closest trading neighbor has always been the legendary city of Capital. However, the people of Vasloria don’t have or spend as much money as folk of the more advanced regions of Khemhara and Higara, and so most technological innovations come to Vasloria slowly, if ever. The people of Blackbottom know all about clocks and timepieces. They just can’t afford them.


  # THE CHAIN OF ACHERON
  This adventure presents the events covered in “Red Sky at Morning,” the first episode of Matt Colville’s 2019 weekly web series The Chain. The players take on the role of heroes present in Blackbottom, the largest city in Vasloria, when the Hawklords bomb it as part of Ajax the Invincible’s siege of the city. (See Adventure Background for more details.)


  # NOTABLE NPCS
  Many of the NPCs the heroes might save can play a large role in shaping the events of this adventure. They can provide advice or information, though they will almost certainly contradict each other at times. Familiarize yourself with these NPCs (listed in order of appearance) before running the adventure.

  **CAPTAIN ORIOLE**
  Oriole (human civilian; she/her) is a human smuggler who captains a ship known as the Revelation. She runs her crew with a great deal of mutual trust, although that trust is tested in the wake of Ajax’s siege. She’s forceful, daring, and level-headed.

  **ARTISTOXILATH**
  An ex-foot soldier in King Omund’s Dragon Phalanx, the dragon knight Artistoxilath (Art-i-STOCKS-i-lath; dragon knight civilian; they/them) has spent these last fifteen years looking for odd jobs and avoiding the trouble that comes with being a dragon knight in Vasloria. They’re quiet, imposing, and attentive. 

  **COLM**
  Colm (human civilian; he/him) is a bureaucrat who has served in Ajax’s regime for the last ten years. When he got word of Ajax’s surprise attack on Blackbottom, he attempted to warn his family and friends in the city. As a reward for his valor, Ajax’s priests arrested him and used him as a human sacrifice in the ritual to bring demons to Blackbottom. He’s repentant, logical, and weak-willed.

  **HUNT**
  Hunt (human; he/him) is a human high-ranking official of the Chain of Acheron. When the heroes meet him, he pledges to help get them to safety. A no-nonsense heroic figure, Hunt feels responsibility for the people of Blackbottom, because he knows this siege is a retaliation against the Chain. He has vowed to do what it takes to get people to safety, even at the cost of his own life. Hunt entrusts the heroes with a mission during the section To Safety: get the civilians to his safehouse in the city center.

  # ENDANGERED CIVILIANS
  There are other minor named characters who are part of the contingent of civilians the heroes protect throughout the adventure. They are as follows (listed in approximate order of appearance):

  **Dwinn** (human; he/him): The owner of the Drunken Fool. Quiet, observant, and resolute.

  **Lorelei** (human; she/her): A woman on her honeymoon with Waves of Moonlight on a Shore of Glass. Impulsive, boisterous, and bold.

  **Waves of Moonlight on a Shore of Glass** (high elf; she/her): A woman on her honeymoon with Lorelei. Goes by “Moonlight.” Reserved, shrewd, and loyal.

  **Percival** (human; he/him): A noble on vacation. Foppish, self-important, and demanding.

  **Dinah** (human; she/her): A waitress at the Drunken Fool. Sarcastic, witty, and resourceful.

  **Vonder** (wode elf; he/him): A member of the Road, a thieves’ guild, found in the alleyways. Shifty, suspicious, and standoffish.

  **Bora** (human; she/her): A merchant found on the rooftops who deals in exotic animals. Sentimental, oblivious, and nurturing.

  **Tch’dorit** (radenwight; he/him): The aging leader of a group of mercenaries called the Blackenblues who are using the safehouse. His love of pyrotechnics is dwarfed by the responsibility he feels towards his family. Protective, wise, inquisitive.






