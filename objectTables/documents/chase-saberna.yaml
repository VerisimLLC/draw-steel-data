outcomes:
  success:
    __typeName: MontageOutcome
    victories: 1
    text: The heroes catch up to Saberna before she reaches her destination. Once caught, she tells them that Brune the butcher has been stealing food occasionally from the smokehouse. She doesn’t know why, but she says the butcher threatened to kill her if she told anyone. The heroes earn 1 Victory each.
  failure:
    __typeName: MontageOutcome
    text: The heroes notice Saberna enter the butcher. Moments later, Brune emerges on the street with a knife in one hand and the girl in the other, threatening to harm her if the heroes don’t let him leave.
  partial:
    __typeName: MontageOutcome
    text: The heroes catch up to Saberna just as she reaches the door of the butcher. She tells them nothing, but calls out for Brune to help her. Brune opens the door and hurls a knife at a hero, dealing 1d6 damage to them.
