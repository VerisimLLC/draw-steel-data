  sections:
    b: |+
      * Consequence: The hero’s actions impose a bane on the next hero to make a test in the montage.

    K: |
      Montage tests require you to come up with consequences and rewards for individual tests as they occur. 
    t: |+
      * Reward: The hero grants an edge to the next hero to make a test in the montage.

    n: |+
      * Reward: The hero gains a hero token for the group.

    F: |+
      # Consequences and Rewards

    P: |+
      You can absolutely create your own unique consequences and rewards, but here are some good standbys to use in a montage test:


    h: |+
      * Consequence: You gain an additional 1 Malice at the start of the next encounter.

    V: |+
      * Consequence: The hero takes 1d6 damage which can’t be prevented in any way, or they deal this damage to an ally by accident.

