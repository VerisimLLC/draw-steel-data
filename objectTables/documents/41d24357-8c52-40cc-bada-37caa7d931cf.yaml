  # The speeches of Cicero

  Cicero made many great speeches over the years as an **orator** in the Roman forum. There are also many of his other surviving letters to Atticus and other documents he wrote. However, if we read these documents closely we can see a profile of Cicero's personality:

  [Monster]

  * He appears highly narcissistic in his missives, being egotistical.
  * He also seems insecure and emotionally fragile.
  * He often uses **guilt tripping**.



