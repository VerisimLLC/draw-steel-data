content: |-
  # Combat

  ## Leadup

  Write an overview of the leadup to the battle, including conditions under which combat begins. Who wins initiative under which conditions?

  An example test you might include to determine who wins initiative:

  |Spot the Enemy: Intuition Test (Alertness, Survival)
  |Medium

  ## Objectives

  The heroes must defeat all the goblins to win this encounter. They lose if at least four goblins breach the wall.

  ## Combat

  Allow easy adjustment of the number of heroes to balance for:

  [[setting:Number of Heroes]]

  [[encounter]]

  When you are ready, [Draw Steel!]

  ## Tactics

  Describe the tactics used by the monsters in the battle here.

  ## Aftermath and Rewards

  [End Combat] once the battle is over.

  The heroes gain 1 VP if they win the battle.

  [[/awardvp 1|Award Victories]]

  If the heroes search their enemy's bodies they also find a [Healing Potion].
