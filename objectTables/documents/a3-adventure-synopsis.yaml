content: |
  *The Fall of Blackbottom* begins on a calm morning at the Drunken Fool, a three-story inn renowned for its baths and jaunty atmosphere. When Ajax’s siege plunges the city into chaos, the heroes are instructed by a member of the Chain of Acheron to lead civilians to a safehouse where the Chain will regroup and help the helpless flee the city. When the heroes arrive at the safehouse, however, it becomes clear that no one is coming to help. What’s more, one or more of them are wanted by Ajax, known to the Overlord by name. Their lives—and the lives of everyone they’ve saved—now rest solely on their shoulders.
   This adventure is broken into three chapters:

  •	**Chapter 1**: Caught in Ajax’s initial siege of Blackbottom, the heroes must escape from a burning tavern, save anyone they can find in the wake of this immediate crisis, and reach a safehouse where they can take shelter and plot their next move.

  •	**Chapter 2**: After Ajax’s initial attack, the occupation begins. The heroes must search for safe passage out of the city, but they’ll have plenty of chances to disrupt Ajax’s occupation in the process. Their actions in this section directly impact their standing in Chapter 3.

  •	**Chapter 3**: The heroes mount their escape through one of four routes they could have discovered in the previous chapter. A final confrontation with Ajax’s forces stands between them (and their refugees) and freedom.
