  # Judgement Free Trigger Holy Damage on Action

  When a judged creature uses a main action (or free strike opportunity atack / main action as a triggered action) the censor can use a free triggered action to deal 2*P holy dmage to the creature

  Use [Censor 1] to spawn a censor and enemies.

  **Confirmed working by Faan on 16 Nov 2025**
