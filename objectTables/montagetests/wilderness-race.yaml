description: Wilderness Race
id: fbf80802-2426-4d0e-9230-d2e881021205
scene: The wilds hold unknown dangers. Characters need to figure out the best route while maintaining a good pace, watching out for hazards, and avoiding predatory monsters.
ctime: 1783886076891
outcomes:
  success:
    __typeName: MontageOutcome
    victoriesHard: 2
    text: The heroes reach their goal in time. Each character earns 2 Victories if the montage test was hard, or 1 Victory if it was easy or moderate, in addition to any Victories earned from combat during the montage test.
    victoriesMedium: 1
  failure:
    __typeName: MontageOutcome
    text: The heroes don’t arrive in time to avert catastrophe. Characters earn no Victories from the montage test, but might earn Victories from combat undertaken during the montage test.
  partial:
    __typeName: MontageOutcome
    victoriesHard: 1
    text: To reach their goal in time, the heroes must sprint over the last leg of the journey, with each character spending 2 Recoveries to do so. (If even one character doesn’t have 2 Recoveries remaining, the characters instead earn a total failure for the montage test.) Each character earns 1 Victory if the montage test was moderate or hard, in addition to any Victories earned from combat during the montage test.
    victoriesMedium: 1
rewards: []
consequences: []
twist: |-
  At the end of the first round of the montage test, the characters’ journey is interrupted by one of the following threats:

  Predatory Monster: The characters stumble into or are stalked by a monstrous predator, and must engage in a standard combat encounter to overcome the threat or drive it off. If any character has obtained a success on the Scout Ahead challenge, you can let the characters make a group test to sneak past or set an ambush for the monster.

  Unexpected Hazard: A natural hazard such as an avalanche, rockslide, or wildfire interrupts the journey. Each hero must make a test of your choice to avoid the hazard, losing a Recovery on a failure.
