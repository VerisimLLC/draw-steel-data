twist: At the end of the first round of the montage test, the heroes stumble upon a trap set by the quarry or a problem they left behind. This might include such things as a pit trap set with poison spikes, a mob of angry locals who’ve been told the characters are criminals, or an intentionally set fire. The heroes must deal with the trap or problem before they continue the montage test.
