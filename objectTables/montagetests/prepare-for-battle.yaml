description: Prepare For Battle
id: b2a99f46-9df4-4896-8e25-c3fa123683a0
scene: The walls or palisades around the settlement (if any) are in poor shape. Roads or rivers through the area give the invaders free access to the settlement unless barricades, traps, or ambushes can be set up. Supplies of food, weapons, and ammunition are too low to survive a long siege. The area is home to few experienced fighters compared to the numbers of the invaders, and the local militia is poorly equipped and untrained.
ctime: 1783886075002
outcomes:
  success:
    __typeName: MontageOutcome
    victoriesHard: 2
    text: The settlement is fully fortified, and even if the heroes don’t fight in its defense, the settlement and its people survive. If the heroes wish, they can leave the settlement and fight a standard combat encounter against the leader of the invaders and their lackeys, possibly killing or capturing the leader. Each character earns 2 Victories if the montage test was hard, or 1 Victory if it was easy or moderate, in addition to any Victories earned from combat during the montage test.
    victoriesMedium: 1
  failure:
    __typeName: MontageOutcome
    text: The heroes each lose a Recovery from their failed efforts to defend the settlement, which is taken over by the invaders. If the players wish, the characters can fight two hard combat encounters against waves of invaders to allow some of the settlement’s inhabitants to retreat to safety. Characters earn no Victories from the montage test, but might earn Victories from combat undertaken during the montage test.
  partial:
    __typeName: MontageOutcome
    victoriesHard: 1
    text: The settlement’s fortifications are improved, but the settlement will still fall unless the heroes fight in its defense. To save the settlement, the heroes must triumph in a hard combat encounter against the leader of the invaders and their lackeys. If the heroes lose the encounter, the settlement falls. Each character earns 1 Victory if the montage test was moderate or hard, in addition to any Victories earned from combat during the montage test.
    victoriesMedium: 1
rewards: []
consequences: []
twist: At the end of the first round of the montage test, a fast-moving enemy vanguard attacks before the settlement’s defenders are ready. The heroes must engage in an easy combat encounter.
