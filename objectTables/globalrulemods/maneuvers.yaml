  - __typeName: CharacterFeature
    implementation: 4
    guid: 251abe3e-b761-48f3-9a47-1356aa71dad4
    description: "You attempt to shove an adjacent creature using a power roll.\n\nYou can normally only target creatures and objects up to your size category. If your Might score is 2 or higher, you can target creatures and objects with a size equal to your Might score or lower. "
    modifiers:
    - __typeName: CharacterModifier
      guid: d9b900b5-6594-46ef-9c20-4e41fae3d8dd
      behavior: activated
      name: Knockback
      description: "You attempt to shove an adjacent creature using a power roll.\n\nYou can normally only target creatures and objects up to your size category. If your Might score is 2 or higher, you can target creatures and objects with a size equal to your Might score or lower. "
      source: Maneuvers Global Rule Mod Feature
      sourceguid: 251abe3e-b761-48f3-9a47-1356aa71dad4
      activatedAbility:
        __typeName: ActivatedAbility
        implementation: 4
        strain: []
        targetType: target
        behaviors:
        - __typeName: ActivatedAbilityCustomTriggerBehavior
          triggerName: BeginKnockback
          applyto: caster
          value: ""
        - __typeName: ActivatedAbilityPowerRollBehavior
          filterTarget: ""
          tiers:
          - Push 1
          - Push 2
          - Push 3
          roll: 2d10 + Might
        categorization: Common Ability
        targetFilter: ""
        keywords:
          Melee: true
          Weapon: true
        persistence: []
        reasonedFilters:
        - reason: This creature is too large for you to knockback.
          formula: |-
            (Target.Knockback Target Size<= caster.Knockback Caster Size) or (Caster.Grab Characteristic >= 2 and (Target.Knockback Target Size-3) <= Caster.Grab Characteristic)

            {Note that we must either be equal to or bigger than the target, or have a Might ("Grab Characteristic") greater than or equal to size. Since size 1L is equal to size '4', we subtract 3 from the Knockback Target Size when making this calculation}
        - reason: Grabbed creatures cannot be force moved, except by the grabber.
          formula: (Not (target.conditions has "Grabbed")) or (ConditionCaster("Grabbed") = Caster)
        abilityType: none
        numTargets: Knockback Targets
        repeatTargets: false
        modifiers: []
        actionResourceId: a513b9a6-f311-4b0f-88b8-4e9c7bf92d0b
