  description: Your speed is 0. If you teleport while Grappled, the condition ends. If you are Grappled by another creature who is physically grappling you, when thecreature is force moved, you move with them. Whenyou are force moved, the creature moves with you.The speed of the creature grappling you is halved. When they move, they can bring you with them. Unless otherwise noted, a creature can only grappleone other creature at a time. If you teleport whileGrappled, the condition ends. If a creature ismentally grappling you, the condition ends if theydon’t have Line of Effect to you. You can use aManeuver when you are Grappled to make a Mightor Agility Resistance Roll (your choice). The TN isdetermined by the effect that has you Grappled. On a success, you break the Grapple and can shift 1 square.
