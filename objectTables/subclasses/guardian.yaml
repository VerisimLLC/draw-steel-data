      implementationDetails: "Part A: free strikes deal +Intuition (hero via modifyability; companion via applyToFreeStrikes with Summoner.Intuition, verified to resolve to the beastheart Intuition). The engine-invoked opportunity attack uses the standard free-strike path, so confirm in play whether +Intuition rides the OA damage (it does on action-bar/named free strikes). Part B: opportunity attacks now fire on shift, forced movement, and ability-driven teleport, via a core Creature.lua / AbilityRelocateCreature.lua broadening gated by the Opportunity Attack On Any Movement custom attribute (a no-op for any creature without it). Not covered: teleports via non-ability paths (position swaps, a few rule-behavior teleports) and same-column purely-vertical teleports."
