            description: |-
              Your companion attempts to swallow a grabbed creature of their size or smaller.

              A swallowed creature shares your companion's space, is grabbed and restrained, and has line of effect only to your companion. Nothing has line of effect to the swallowed creature. Once per round at the start of your turn, the swallowed creature takes acid damage equal to 1 + your companion's Might. If the swallowed creature escapes the grab, your companion immediately regurgitates the creature, who lands prone in an adjacent unoccupied square. Your companion can also regurgitate as a free maneuver. Your companion can have only one creature swallowed at a time.
