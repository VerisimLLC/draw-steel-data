        source: Circle of Storms Class Feature
        filterCondition: Ongoing Effects has not "Portfolio Champion"
        sourceguid: 447def87-6fd4-45cb-9a3b-b2de05b48b69
        attribute: 5cb887a0-4ae6-453e-9267-6bd6961ab1f6
        name: Elemental Portfolio Champion
        behavior: attribute
        value: filter:beast.name = "Dragon's Portent" and beast.Keywords has "Summoner"
        description: |-
          Your champion is a Portent of a dragon yet to manifest. Through defending the innocent, you have made yourself and your elementals a close neighbor to the malice that threatens them. The dragon desires you bring their creation about and lends you strength to see your
          justice through.
          As a harbinger of ruin, the dragon’s Portent has incredibly potent impact and control of the environment. Their final shape has yet to be determined; use this to your advantage and call upon the affinity that will end conflict the quickest.
        guid: 1c5f628b-061f-40d5-9697-013906bde638
