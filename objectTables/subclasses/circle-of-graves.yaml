        value: 1
        name: Kill the Pain
        attribute: 1593eab7-f4e5-41f6-a3d7-d7136df0e62a
        description: |-
          You aren’t affected by excess damage after all minions in a squad are dead.
          Additionally, you and each of your undead minions ignore damage rolled as a d3 or a d6 and damage from environmental effects while you are not winded.
          *Implementation Note:* The Codex does not automate ignoring d3, d6, or envirnomental effects.
        guid: 4bacf356-0eae-47f9-b39e-d401d6f2b7ce
      implementation: 2
      canHavePrerequisites: true
      name: Kill the Pain
      description: |-
        You aren’t affected by excess damage after all minions in a squad are dead.
        Additionally, you and each of your undead minions ignore damage rolled as a d3 or a d6 and damage from environmental effects while you are not winded.
        *Implementation Note:* The Codex does not automate ignoring d3, d6, or envirnomental effects.
      guid: 67c431dd-19bd-4229-9891-61e62be9dfc4
    - __typeName: CharacterFeature
      domains:
        class:b41b7bcb-6246-4906-8115-831e55f62758: true
        class:085c51f9-4646-41bb-91eb-0cb8e2bf359b: true
      name: Portfolio Champion
      canHavePrerequisites: true
      modifiers: []
      classid: 085c51f9-4646-41bb-91eb-0cb8e2bf359b
      source: Circle of Graves Class Feature
      description: |-
        Your circle now allows you to add a champion to your portfolio. Champions follow the same rules as your other minions, with the following exceptions:
        • You can only summon and command one instance of your champion.
        • Your champion is in their own squad that does not count toward your maximum number of squads.
        • Your champion can regain Stamina and gain temporary Stamina.
        • Your champion uses your Recoveries to regain Stamina.
        • Your champion can take the Heal and Defend Actions.
        • Your champion uses the normal rules for maneuvers.
        • You have an edge whenever you use an ability with the Champion keyword from your Champion’s space.
        • Your champion refuses to be referred to as a minion.

        After summoning a champion, you can’t summon them again until you earn a Victory. Your champion gains additional features at 10th level. This includes a special Champion Action ability that costs eidos to use (see Eidos). This ability can be activated once per encounter at the end of any other creature’s turn.
      guid: 7a9e9de5-b2f5-4281-92bd-da1b7491040f
    - __typeName: CharacterFeature
      domains:
        class:b41b7bcb-6246-4906-8115-831e55f62758: true
        class:085c51f9-4646-41bb-91eb-0cb8e2bf359b: true
      source: Circle of Graves Class Feature
      classid: 085c51f9-4646-41bb-91eb-0cb8e2bf359b
      modifiers:
      - __typeName: CharacterModifier
        domains:
          class:b41b7bcb-6246-4906-8115-831e55f62758: true
          class:085c51f9-4646-41bb-91eb-0cb8e2bf359b: true
        source: Circle of Graves Class Feature
        behavior: attribute
        sourceguid: 447def87-6fd4-45cb-9a3b-b2de05b48b69
        value: filter:beast.name = "Avatar of Death" and beast.Keywords has "Summoner"
        name: Undead Portfolio Champion
        filterCondition: not Ongoing Effects has "Portfolio Champion"
        attribute: 5cb887a0-4ae6-453e-9267-6bd6961ab1f6
        description: |-
          Your champion is an Avatar of death. The number of creatures you and your army have laid to rest now hangs above your head and threatens to crush your skull at any moment. You were unable to gain the power of the ultimate force of nature without a memento mori to
          keep you humble.
          The Avatar of death weighs down their foes with conditions so their army can take care of the rest. If an enemy can’t handle it, well then maybe they should just die
        guid: 1c5f628b-061f-40d5-9697-013906bde638
      implementation: 4
      name: Undead Portfolio Champion
