details: |
  <B>Insurgent (Asymmetric Warfare):</B> Doing your duty, playing fair, and dying honorably in battle is your opponent’s job. By contrast, you’ll do whatever it takes to keep your allies alive. You gain a skill from the intrigue skill group.
