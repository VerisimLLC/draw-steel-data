  level-9:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeature
      guid: fae6d79e-de89-42a5-9f15-ca157f547634
      name: Portfolio Champion
      description: |-
        Your circle now allows you to add a champion to your portfolio. Champions follow the same rules as your other minions, with the following exceptions:
        • You can only summon and command one instance of your champion.
        • Your champion is in their own squad that does not count toward your maximum number of squads.
        • Your champion can regain Stamina and gain temporary Stamina.
        • Your champion uses your Recoveries to regain Stamina.
        • Your champion can take the Heal and Defend Actions.
        • Your champion uses the normal rules for maneuvers.
        • You have an edge whenever you use an ability with the Champion keyword from your Champion’s space.
        • Your champion refuses to be referred to as a minion.

        After summoning a champion, you can’t summon them again until you earn a Victory. Your champion gains additional features at 10th level. This includes a special Champion Action ability that costs eidos to use (see Eidos). This ability can be activated once per encounter at the end of any other creature’s turn.
      modifiers: []
      domains:
        class:b41b7bcb-6246-4906-8115-831e55f62758: true
        class:4dcb43f4-a4be-4c9a-a583-45b6bbb81bfe: true
      source: Circle of Blight Class Feature
      canHavePrerequisites: true
      classid: 4dcb43f4-a4be-4c9a-a583-45b6bbb81bfe
    - __typeName: CharacterFeature
      guid: 447def87-6fd4-45cb-9a3b-b2de05b48b69
      implementation: 4
      description: |-
        Your champion is an Aspect of a demon lord. They have borne witness to your exploits and struck a deal with you: Allow their children to feed and you can call forth a modicum of their power. Morality is none of their concern, but certainly a hero is enough of an arbiter of whose
        souls deserve to be fed to demons, right?
        The demon lord’s Aspect enjoys bringing enemies in close with their appendages or flinging victims and throwing them to the gnashing horde. They’re willing to put your connection to this world at risk if it means taking one more bite.
      domains:
        class:b41b7bcb-6246-4906-8115-831e55f62758: true
        class:4dcb43f4-a4be-4c9a-a583-45b6bbb81bfe: true
