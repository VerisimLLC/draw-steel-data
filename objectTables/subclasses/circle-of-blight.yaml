__typeName: Class
id: 4dcb43f4-a4be-4c9a-a583-45b6bbb81bfe
name: Circle of Blight
isSubclass: true
primaryClassId: b41b7bcb-6246-4906-8115-831e55f62758
details: The demonologists who call forth demons from the Abyssal Waste. Their portfolio is filled with shapechanging demons that grow in hunger and power over time. You can communicate with creatures that have the abyssal keyword even if you don’t share a language.
heroicResourceChecklist: []
levels:
  level-2:
    __typeName: ClassLevel
    features:
    - __typeName: CharacterFeature
      source: Circle of Blight Class Feature
      name: Summoner’s Dominion
      description: |-
        Your circle allows you to call forth a piece of your portfolio’s dominion like any minion. 
        Once per encounter, you can use a maneuver to summon a fixture from your minions’ native manifold or origin into an unoccupied space on the ground within your Summoner’s Range. You can spend 1 essence to relocate the fixture as a free maneuver on your turn. The fixture stays until the end of the encounter, until its Stamina is reduced to 0, or until you become dying. 
        Your fixture gains additional features at 5th and 9th level.
      modifiers: []
      domains:
        class:b41b7bcb-6246-4906-8115-831e55f62758: true
        class:4dcb43f4-a4be-4c9a-a583-45b6bbb81bfe: true
