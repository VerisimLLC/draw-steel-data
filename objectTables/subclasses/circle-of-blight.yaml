    - __typeName: CharacterFeature
      source: Circle of Blight Class Feature
      implementation: 3
      description: |-
        At the start of each of your turns, you can transform up to two of your demon minions within your Summoner’s Range. A demon can transform into a different demon minion within your Summoner’s Range, maintaining their current Stamina. Starting from round 2,
        a demon can transform any demon minion you can call forth for half the essence cost, as if you summoned the new minion into the demon’s space.
        The minions must be reassigned to a new squad if their new name differs from the other squad members.
      domains:
        class:b41b7bcb-6246-4906-8115-831e55f62758: true
        class:4dcb43f4-a4be-4c9a-a583-45b6bbb81bfe: true
      classid: 4dcb43f4-a4be-4c9a-a583-45b6bbb81bfe
      name: Abyssal Evolution
      modifiers:
