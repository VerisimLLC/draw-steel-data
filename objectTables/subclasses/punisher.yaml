          behavior: activated
          activatedAbility:
            __typeName: ActivatedAbility
            resourceNumber: "5"
            targetType: target
            description: |-
              Make a power roll against one creature within Melee 1.

              - Tier 1 (<=11): 3 + M damage; push 2; M < Weak the target is prone.
              - Tier 2 (12-16): 5 + M damage; push 3; M < Average the target is prone.
              - Tier 3 (17+): 8 + M damage; push 4; M < Strong the target is prone.

              Effect: If the target is force moved at least 1 square, an enemy adjacent to the target at the end of this forced movement is also targeted by this ability's power roll, but they don't trigger this effect.
            actionResourceId: d19658a2-4d7b-4504-af9e-1a5410fb17fd
