details: The feybright that call forth pixies, nixies, and sprites from Arcadia. Your portfolio features tiny ephemeral fey spirits surrounded by weird and powerful magic. You can communicate with creatures that have the fey keyword even if you don't share a language.
heroicResourceChecklist: []
