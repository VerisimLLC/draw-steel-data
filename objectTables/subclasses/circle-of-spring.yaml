        source: Circle of Spring Class Feature
        behavior: attribute
        sourceguid: 447def87-6fd4-45cb-9a3b-b2de05b48b69
        attribute: 5cb887a0-4ae6-453e-9267-6bd6961ab1f6
        name: Fey Portfolio Champion
        filterCondition: not Ongoing Effects has "Portfolio Champion"
        value: filter:beast.name = "Celestial Attendant" and beast.Keywords has "Summoner"
        description: |-
          Your champion is an Attendant of a celestial. Whenever you call on their assistance, you must formally welcome and introduce them to the occasion. You can’t be certain if this is truly the blessing of a celestial you’ve previously allied yourself with, or if you’ve received someone
          else’s power—neither circumstance puts you in any less danger.
          The celestial Attendant wants to swarm the map with pixies while limiting their foes’ ability to do anything about it. A single neurotoxic strike is all it takes to move everyone into position.
        guid: 1c5f628b-061f-40d5-9697-013906bde638
