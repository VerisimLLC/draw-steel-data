              Companion: true
              Area: true
              Magic: true
            repeatTargets: false
            range: 1
            name: Jump Scare
            numTargets: "1"
            implementationDetails: Companion invisibility during the shift is not automated (the shift is a normal shift). Burst origin is the companion's post-shift space; the line-of-effect-to-companion targeting restriction is not enforced and is shown only as a reasoned filter note.
