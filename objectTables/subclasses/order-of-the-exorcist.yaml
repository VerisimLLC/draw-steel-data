      description: An open mind is an unguarded fortress. You specialize in hunting the hidden enemies of your order. You gain the Read Person skill.
      modifiers: []
      source: Order of the Exorcist Class Feature
      name: Exorcist Read Mind
    - __typeName: CharacterFeature
      implementation: 2
      guid: a0a9f729-3a29-465e-94ef-c5fce4d2607c
      classid: 1d9d7b8a-1c53-44e8-9034-b364c56d18de
      domains:
        class:1d9d7b8a-1c53-44e8-9034-b364c56d18de: true
        class:1df3a5c8-7b81-4db0-b9c8-8e9e39bc5049: true
      description: |-
        The power you serve grants you access to <i>judgements</i> with which you censor those your church deems heretics. Certain abilities apply a judgment on the target. Creatures with a judgment are referred to as judged. You have an edge on attack rolls against judged targets and do holy damage equal to twice your Presence score whenever you attack them.

        Each order has their own maneuver to judge a target with. You can use a judgment maneuver again on an already judged creature. When you reduce a judged creature to 0 Stamina you can use a judgment maneuver as a free triggered action against a new target within range.
      modifiers:
      - __typeName: CharacterModifier
        name: Relentless Judgement
