__typeName: Negotiator
pitfalls:
- __typeName: NegotiatorTrait
  description: My loyalty is to the guild—not the burgomaster, not the king, not Ajax himself. But don’t tell them I said that.
  name: Higher Authority
- __typeName: NegotiatorTrait
  description: We’re reshaping the world here. Of course, some people who can’t adapt are going to find themselves on the bottom. But why should anyone blame us for that?
  name: Justice
- __typeName: NegotiatorTrait
  description: Conflict isn’t bad in and of itself. It drives innovation. The key is to not be on the losing side.
  name: Peace
- __typeName: NegotiatorTrait
  description: I don’t have time for this foolishness. Come talk to me again when you have something of value to show me.
  name: Revelry
name: Guildmaster
description: The guildmaster archetype can be used for any other local information broker, such as a cult leader, hag, or spy.
id: 1b025385-9a0f-4446-8e65-42ea7e3fff30
flavorText: The guildmaster knows the value of a coin, but understands that knowledge—inside information and trade secrets alike—is the most valuable currency. They bargain accordingly.
ctime: 1783885402088
motivations:
- __typeName: NegotiatorTrait
  description: The people can’t take care of themselves. Somebody’s got to look after them, the poor lambs.
  name: Benevolence
- __typeName: NegotiatorTrait
  description: It would be highly unethical for you to show me those schematics you obtained from a rival guild. Likewise, it would be highly unethical for me to slide you this bag of gold.
  name: Discovery
- __typeName: NegotiatorTrait
  description: Who do you think will be in charge in the next age? The nobles? Pah! They still count their wealth in cows. Whoever controls information will rule the world—and I intend for that to be us.
  name: Power
- __typeName: NegotiatorTrait
  description: We have rivals—hungry opportunists who will stop at nothing. If I want to protect my guild, I’ve got to do unto them before they do unto us.
  name: Protection
