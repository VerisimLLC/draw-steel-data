__typeName: Negotiator
pitfalls:
- __typeName: NegotiatorTrait
  description: Go back to your street corner and beg for alms if that’s what you’re after. You’ll get nothing from me.
  name: Benevolence
- __typeName: NegotiatorTrait
  description: What does that have to do with me? I’m a soldier, not a scholar.
  name: Discovery
- __typeName: NegotiatorTrait
  description: You dare call me unjust? I make the laws here. Justice is mine to give or take away!
  name: Justice
- __typeName: NegotiatorTrait
  description: I’m not some sniveling coward who begs for protection, and neither are my troops. Anyone who asks for safety doesn’t deserve it.
  name: Protection
name: Warlord
description: The warlord archetype can be used for any other local-level threat, such as a vampire, hobgoblin bloodlord, or rebellious noble.
id: c27c881c-50a3-4b80-80e8-aed9399547ea
flavorText: The warlord has raised their banner and troops flock to their cause. Some say a warlord never negotiates, but that’s not true. They’re happy to listen to terms of surrender.
ctime: 1783885402137
motivations:
- __typeName: NegotiatorTrait
  description: I’m not paying a single coin to some weakling liege lord for the privilege of being told what to do. I’ve raised my banner. I defy anyone to pull it down.
  name: Freedom
- __typeName: NegotiatorTrait
  description: Did you see that young captain out there putting the fear of the gods into her troops? That’s my kid, but she earned her title. Someday, this will all be hers.
  name: Legacy
- __typeName: NegotiatorTrait
  description: Look around you. Everywhere you look—weakness, corruption, waste. Peace is a noble goal, but we won’t have peace until the current regime is swept away.
  name: Peace
- __typeName: NegotiatorTrait
  description: Have you suffered as I have at the hands of that accursed villain? If so, then I’ll gladly call you friend.
  name: Vengeance
