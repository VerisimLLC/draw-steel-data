__typeName: Negotiator
pitfalls:
- __typeName: NegotiatorTrait
  description: These people don’t need charity, they need order. Let them go to the town hall and they’ll get a full belly in exchange for an honest day’s work.
  name: Benevolence
- __typeName: NegotiatorTrait
  description: None of us are free, from the lowliest servant on up. Even a monarch has a duty to their people.
  name: Freedom
- __typeName: NegotiatorTrait
  description: My power comes to me through my lawful oath, not by some dirty deal made in secret.
  name: Power
- __typeName: NegotiatorTrait
  description: I believe in law, not vengeance, and law is decided by higher courts. I’m just a functionary.
  name: Vengeance
name: Knight
description: The knight archetype can be used for any other local authority, such as a village elder, town guard officer, or academic professor.
id: 8668f48d-2e46-4552-a804-a0d0aeabffeb
flavorText: Although not always an idealist, the knight is a loyal servant of their liege and a stickler for duty. A knight knows their place in a regimented society, and believes that everyone else should keep to their own place.
ctime: 1783885402079
motivations:
- __typeName: NegotiatorTrait
  description: That’s above my pay grade. If my superiors sign off on it, then so do I.
  name: Higher Authority
- __typeName: NegotiatorTrait
  description: Thank you for bringing this to my attention. I agree, this must be put right. The only question is how.
  name: Justice
- __typeName: NegotiatorTrait
  description: People like us, we fight so that the common folk don’t have to. If I must, I’ll draw my sword again to keep the peace.
  name: Peace
- __typeName: NegotiatorTrait
  description: Every agreement should be sealed with a toast. Huzzah!
  name: Revelry
