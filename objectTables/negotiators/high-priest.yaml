__typeName: Negotiator
pitfalls:
- __typeName: NegotiatorTrait
  description: Don’t offer that to me. Donate it to the faith if you have no need of it.
  name: Greed
- __typeName: NegotiatorTrait
  description: Me? I am no one. Any good deeds I might have accomplished are to my deity’s credit, not my own.
  name: Legacy
- __typeName: NegotiatorTrait
  description: My current responsibilities are quite enough. I have no desire for more.
  name: Power
- __typeName: NegotiatorTrait
  description: For shame! Do you boast of doing evil and expect me to join you in it?
  name: Revelry
name: High Priest
description: The high priest archetype can be used for any other national authority, such as a count, judge, or general.
