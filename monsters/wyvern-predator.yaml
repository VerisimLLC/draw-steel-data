      data: |+
        Wyvern Predator	Level 4 Elite Brute
        Beast, Wyvern	EV 24
        <b>Stamina</b> 140	<b>Immunity</b> Acid 5
        <b>Speed</b> 7 (fly)	<b>Size</b> 3 /<b> Stability</b> 3
        <b>Free Strike</b> 6
        Might +3	Agility +2	Reason -1	Intuition +1	Presence 0
        <b>Sedating Stinger</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	9 damage
        %E2%98%85	12%E2%80%9316	14 damage; M<2 slowed (save ends)
        %E2%9C%B8	17	17 damage; M<3 slowed (save ends)
        <b>Effect</b> The target is restrained (save ends) if they are already slowed.

        <b>Tail Sweep</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 3 x 6 line within 1<b>	Target</b> All enemies and objects in the line
        %E2%9C%A6	%E2%89%A411	6 damage; A<1 3 acid damage
        %E2%98%85	12%E2%80%9316	11 damage; A<2 3 acid damage
        %E2%9C%B8	17+	14 damage A<3 3 acid damage
        <b>5 Malice</b> The predator uses this ability a second time. They can target a new line or the same one.

        <b>Grasping Jaws</b> (Maneuver) %E2%97%86 2d10 + 3 %E2%97%86 2 Malice
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 1 creature or object
        %E2%9C%B8	%E2%89%A411	9 damage; A<1 grabbed
        %E2%98%85	12%E2%80%9316	14 damage; A<2 grabbed
        %E2%9C%A6	17	17 damage; A<3 grabbed (bane to escape)

        <b>Deterring Sting</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature deals damage to the predator with a melee ability.
        <b>Effect</b> The predator uses their Sedating Stinger ability against the target and then shifts 3.

        <b>Stubborn Rage</b>
        The predator is immune to being dazed or frightened while winded or while within 10 squares of another wyvern.

        <b>Tenacious Hunter</b>
        Any creature suffering a condition inflicted by a wyvern can't be hidden from the predator.


        Xorannox The Tyract
        Xorannox the Tyract is an Overmind. Formally known by their endonym, vaurath (plural vaurathi), overminds plot and scheme against their chief rivals, the synlirii and the olothec, for control of the World Below.
        Psionic Eyes
        An overmind is an enormous floating brain with a large central eye surrounded by many smaller embedded eyes. Even more alien, several psionic eyes float within inches of their head, each connected to a small brain that can manifest a unique psionic effect.
        Intelligent Loremasters
        Like their rivals, overminds are loremasters of supreme intellect. They aren't usually wizards, but they all view the collection of knowledge and arcane sciences as the best tool for ultimate conquest. Overminds are cruel and capricious but enjoy tests of intellectual might. Their one vanity is their unshakable belief in their own intellectual superiority over all others.
        Overmind Lairs
        Thanks to their innate flight, overminds prefer to build (or rather, have their thralls build) towers with no doors or entrances anywhere near the bottom.
        Rivalries and Negotiations
        Unlike their rivals, overminds have an intense hatred of their own kind and never work together. However, overminds often enjoy diplomacy with other species, seeking to form alliances and build secret networks of agents throughout the World Below.
        Smelly Eggs
        Overmind procreation involves one horror laying a single egg in a slime pool and leaving it behind. When another overmind later detects the distinct smell of the egg, they spray their inseminating fluid into the pool. These actions are compelled by biological necessity, a compulsion even the overminds can't ignore.
        Unwitting explorers sometimes accidentally abscond with an egg. If unfertilized, its bearer is likely to attract the attention of other overminds and synlirii that use the eggs in genetic experiments to create psionic creatures. If fertilized, the explorer could find themselves as a newly hatched overmind's first victim.
        Xorannox the Tyract
        Xorannox (ZOR-ah-nocks) rules as Lord of the White Tower, a multi-level finger of alabaster stone. Commonly known as the Tyract %E2%80%93 an ancient Za'hariax word that literally translates as "a king who rules with his teeth" %E2%80%93 the overmind indeed consumes those who displease him.
        Xorannox is chief of the Grasp, a secret organization that seeks to overthrow the voiceless talkers' great empire and place Xorannox above all, first as king, then as god.
        The Tyract is a master strategist, always one step ahead of his enemies. Heroes may be surprised to discover their allies are members of the Grasp. When they meet Xorannox, he's delighted! He loves treating with humanoids! They have the same enemies, after all.
        Unfortunately, no matter how useful or dependable a party of heroes might be, Xorannox is nearly incapable of resisting the urge to betray his allies. He assumes, as do most vaurathi, that the natural end of all alliances is betrayal. Thus when the gauntlet is thrown, and his life is in danger, the only minions he can truly trust are his own six eyes.
        Xorannox's Languages
        Overminds typically speak Za'hariax. Xorannox also speaks Caelian, Voll, and Hyrallic.

        Xorannox's Malice	Malice Features
        At the start of Xorannox's turn, you can spend malice to activate one of the following features.
        <b>Gas Belch</b> %E2%97%86 3 Malice
        Xorannox lets out a noxious belch. Each enemy within 2 of him is <b>M<3</b> weakened (save ends).

        <b>Solo Action</b> %E2%97%86 5 Malice
        Xorannox can take an additional action on his turn. Xorannox can use this feature even if he is dazed.

        <b>Slime Trail</b> %E2%97%86 5 Malice
        Until the end of Xorannox's next turn, whenever he or his eyes leave their space, they secrete a viscous slime into the squares on the ground. An enemy that enters an affected square has lightning weakness 5 and fire weakness 5 until the end of the encounter.

        <b>Mind Over Matter</b> %E2%97%86 7 Malice
        Xorannox fills the encounter map with a powerful telekinetic field. The Director chooses a cardinal direction (North, South, East, or West). A creature is affected by pull 2 in the chosen direction whenever they take a move action or are force moved. Each instance of this feature causes the previous instance to end. This additional movement ignores stability.


