      domains:
        CharacterFeature:91464234-5f23-43cc-8d3e-d0f33a296b9d: true
      description: Six lamprey-like intestines extend from Relg’s open stomach. Each intestine is a 5 × 1 line within 1 square of Relg, has 50 Stamina and psychic immunity all, and can’t be force moved. Each intestine enables Relg to grab one size 3 or smaller creature or object. An intestine can be targeted by abilities only while it has a target grabbed. On each of Relg’s turns, he can use his Latch Grasp ability with up to three intestines as a free action.
