        CharacterFeature:dcb14045-8254-475d-852a-c4598d498483: true
      description: 'The area within 3 squares of Relg causes creatures to lose their memories and turn violently hungry. An enemy that starts their turn in an affected square must roll a d3 and subtract the result from each of their power rolls. Each new d3 roll is cumulative and the effects last until the creature starts their turn outside of the aura. '
