        <b>5 Malice</b> The distance becomes 1 Burst, the Strike keyword is replaced with Area, and the roughneck targets all enemies instead.

        <b>Leaping Fury</b> (Action)%E2%97%86 2d10 + 3
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; M<1 prone
