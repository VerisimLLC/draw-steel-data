        <b>Effect </b>A burning target takes 1d6 fire damage at the start of each of their turns until the condition ends.

        <b>Fuel for the Fire</b> (Action)
        <b>Keywords</b> %E2%80%93
        <b>Distance</b> Ranged 10	<b>Target</b> 1 creature
        <b>Effect</b> The target gains fire weakness 10 until the end of the flameslinger's next turn. If the target is the flameslinger's mentor, they instead gain fire immunity 10.

        <b>Infernal Ichor</b>
        If the flameslinger's Stamina drops to 0, they spray burning blood. Each creature within 1 of the flameslinger takes 3 fire damage.

