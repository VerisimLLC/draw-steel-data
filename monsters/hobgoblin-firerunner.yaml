    import:
      type: mcdm
      data: |+
        Hobgoblin Firerunner    Level 5 Platoon Harrier
        Goblin, Hobgoblin, Humanoid, Infernal    EV 14
        <b>Stamina</b> 70    <b>Immunity</b> fire 5
        <b>Speed</b> 8    <b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 6
        Might +2    Agility +3    Reason +1    Intuition +1    Presence 0
        <b>Flaming Kick</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Charge, Magic, Strike, Melee
        <b>Distance</b> Melee 1<b>    Target</b> 1 creature or object
        %E2%9C%A6    <b>%E2%89%A411</b>    9 fire damage
        %E2%98%85    <b>12%E2%80%9316</b>    13 fire damage
        %E2%9C%B8    <b>17</b>    16 fire damage; A<3 dazed (EoT)

        <b>Blazing Trail</b> (Maneuver)
        <b>Keywords</b> Magic
        <b>Distance</b> Self<b>    Target</b> Self
        <b>Effect</b> The firerunner moves up to their speed and creates a 8 wall of fire. Each segment must include one of the squares the firerunner touched. Creatures can enter and pass through the wall. Any enemy who enters the wall for the first time in a round or starts their turn there takes 5 fire damage.

        <b>Hot to Go</b>
        The firerunner ignores difficult terrain. Whenever the firerunner takes fire damage, their speed and the wall they can create with Blazing Trail increases by 4 until the end of their next turn.

        <b>Infernal Ichor</b>
        If the firerunner's Stamina drops to 0, they spray burning blood. Each creature within 1 of the firerunner takes 3 fire damage.
        Hobgoblin Incendiarist    Level 5 Platoon Artillery
        Goblin, Hobgoblin, Humanoid, Infernal    EV 14
        <b>Stamina</b> 60    <b>Immunity</b> fire 5
        <b>Speed</b> 5    <b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 6
        Might +1    Agility +3    Reason 0    Intuition +2    Presence +1
        <b>Fire Crossbow</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 10<b>    Target</b> 1 creature or object
        %E2%9C%A6    <b>%E2%89%A411</b>    9 fire damage
        %E2%98%85    <b>12%E2%80%9316</b>    14 fire damage
        %E2%9C%B8    <b>17</b>    17 fire damage; A<3 burning (save ends)
        <b>Effect</b> A burning target takes 1d6 fire damage at the start of each of their turns until the condition ends.

        <b>Fire Ball Volley</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Ranged
        <b>Distance</b> 4 Cube within 10    <b>Target</b> All enemies and objects
        %E2%9C%A6    <b>%E2%89%A411</b>    5 fire damage; A<1 burning (save ends)
        %E2%98%85    <b>12%E2%80%9316</b>    9 fire damage; A<2 burning (save ends)
        %E2%9C%B8    <b>17</b>    11 fire damage; prone; A<3 burning (save ends)

        <b>Raining Cinders</b>
        The ranged free strike of each ally within 3 of the incendiarist has a distance of 10 and it now deals fire damage.

        <b>Infernal Ichor</b>
        If the incendiarist's Stamina drops to 0, they spray burning blood. Each creature within 1 of the incendiarist takes 3 fire damage.

