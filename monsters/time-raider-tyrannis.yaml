    import:
      type: mcdm
      data: |
        Time Raider Tyrannis	Level 3 Leader
        Humanoid, Time Raider	EV 20
        <b>Stamina</b> 120	<b>Immunity</b> Psychic 5
        <b>Speed</b> 10 (teleport, hover)	<b>Size</b> 2 / <b>Stability</b> 2
        <b>Free Strike</b> 5
        Might +0	Agility +3	Reason +3	Intuition +1	Presence +0
        <b>Gatling Blaster</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Ranged, Psionic, Strike, Weapon
        <b>Distance</b> Melee 2 or Ranged 10	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	8 corruption damage
        %E2%98%85	12%E2%80%9316	12 corruption damage
        %E2%9C%B8	17+	15 corruption damage
        <b>Effect</b> Each target's speed is reduced by 2 until the start of the tyrannis' next turn.

        <b>Air Raid!</b> (Maneuver) %E2%97%86 3 Malice
        <b>Keywords</b> Psionic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> Three time raiders
        <b>Effect</b> Each target is psionically lifted into the air, flies up to their speed, and makes a free strike. If a target doesn't land in an unoccupied space, they fall.

        <b>Precog Reflexes</b> (Triggered Action)
        <b>Keywords</b> Psionic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> One creature
        <b>Trigger</b> The target strikes the tyrannis.
        <b>Effect</b> The strike has a bane. After the strike resolves, the tyrannis makes a free strike against the target.
        <b>2 Malice</b> The strike has a double bane instead.

        <b>End Effect</b>
        At the end of their turn, the tyrannis can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Foresight </b>
        The tyrannis doesn't have a bane on strikes against concealed creatures.

        <b>We Will Won!</b> (Villain Action 1)
        <b>Keywords</b> Psionic, Ranged
        <b>Distance</b> Self and Ranged 10	<b>Target</b> Self and three allies
        <b>Effect</b> Each target gains 15 temporary Stamina and has their speed doubled until the end of their turn.

        <b>Stick To The Plan! </b>(Villain Action 2)
        <b>Keywords</b> Area
        <b>Distance</b> Self and 10 burst	<b>Target</b> Self and all allies in the burst
        <b>Effect</b> Each target can end one effect or condition affecting them or can move up to their speed.

        <b>Armageddon</b> (Villain Action 3)
        <b>Keywords</b> Area
        <b>Distance</b> 5 burst	<b>Target</b> Special
        <b>Effect</b> The tyrannis fires a sensor mine into each unoccupied square in the burst and a gravity well (see Gravity Well) into one of their own squares. Whenever an enemy moves into a square with a sensor mine in it, the mine explodes, dealing 3 damage to the enemy.

        Retainer
      override: true
