    import:
      type: mcdm
      data: |+
        Ajax the Invincible	Level 10 Solo
        Human, Humanoid	EV 120
        <b>Stamina</b> 650
        <b>Speed</b> 7 (fly, hover)	<b>Size</b> 1L /<b> Stability</b> 2
        <b>Free Strike</b> 10
        Might +5	Agility +4	Reason +5	Intuition +5	Presence +4
        <b>Ajax</b>
        <b>Ajax Turns</b> Ajax takes up to three turns each round. He can't take turns consecutively. Additionally, Ajax can use three triggered actions in a round while he isn't dazed.
        <b>End Effect</b> At the end of his turn, Ajax can take 20 damage to end up to two save ends effects affecting him. This damage can't be reduced in any way.

        <b>Tactical Stance</b>
        At the start of each round of combat, Ajax chooses a new stance from one of the following options and enables its benefits.
        <b>Vanguard</b> Ajax has damage immunity 5. Enemies have a double bane on power rolls that include Ajax as a target.
        <b>Mastermind</b> Ajax can either shift 2 or cause one creature within line of effect to slide 2 before using an ability, ignoring stability.
        <b>Insurgent</b> Ajax automatically has a 17 on each of his power rolls. He can still roll to see if he gets a crit.

        <b>Blade of the Gol King</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Charge, Magic, Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	15 damage; M<4 target loses 1d3 recoveries
        %E2%98%85	12%E2%80%9316	21 damage; M<5 target loses 1d3 recoveries
        %E2%9C%B8	17	25 damage; M<6 prone, target loses 1d3 recoveries
        <b>Effect</b> Ajax can shift 2 between striking each target.
        <b>1+ Malice</b> Ajax strikes one additional target for each malice spent.

        <b>Decree by the Jade Hand</b> (Action) %E2%97%86 2d10 + 5
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 3 cube within 10<b>	Target</b> All enemies and objects
        %E2%9C%A6	%E2%89%A411	10 holy damage; slide 2; P<4 hexed (save ends)
        %E2%98%85	12%E2%80%9316	16 holy damage; slide 5; P<5 hexed (save ends)
        %E2%9C%B8	17	20 holy damage; slide 8; P<6 hexed (save ends)
        <b>Effect</b> A target hexed by this ability glows green and their heroic abilities have their cost increased by 2 until the condition ends.
        <b>3 Malice</b> The potency of this ability increases by 1. The affected area becomes a 3 square deep hole and is considered difficult terrain. Each flying target is <b>M<5</b> knocked prone.

        <b>Bead of Hell</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 5 cube within 20 <b>	Target</b> Special
        <b>Effect</b> Ajax throws a glowing bead into the area. It ignites at the start of Ajax's next turn, dealing 20 fire damage and <b>A<5</b> dazed (save ends) to each enemy in the cube. An enemy who starts their turn in an affected square takes 10 fire damage.

        <b>Divine Vine</b> (Maneuver) %E2%97%86 2d10 + 5
        <b>Keywords</b> Magic, Ranged, Weapon
        <b>Distance</b> Ranged 5 <b>	Target</b> 1 creature or object
        %E2%9C%A6	%E2%89%A411	No effect
        %E2%98%85	12%E2%80%9316	Grabbed
        %E2%9C%B8	17	10 damage; grabbed
        <b>Effect</b> Upon grabbing the target, Ajax can choose to shift 5 or pull the target adjacent to him. The divine vine stays attached to a grabbed target until a creature strikes the vine, the target escapes the grab, or Ajax releases the grab as a free action.
        <b>Special</b> This ability can be replaced with the features of a different treasure Ajax has acquired.

        <b>Shieldbreaker Talisman</b> (Triggered Action)
        <b>Keywords</b> Magic
        <b>Distance</b> Melee 5<b>	Target</b> Triggering creature
        <b>Trigger</b> An enemy within distance uses a damage reducing ability.
        <b>Effect</b> Ajax makes a free strike against the target, dealing additional damage equal to twice the amount that was reduced. The damage can't be reduced.

        <b>Is This What They Taught You?</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature within distance marks Ajax.
        <b>Effect</b> The target is also marked. Ajax has an edge on power rolls against the target. Whenever the target activates a triggered action using the mark, Ajax makes a free strike against them.

        <b>Your Obsession with Me Betrays You</b> (Triggered Action)
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 10<b>	Target</b> Triggering creature
        <b>Trigger</b> Ajax causes a creature to gain rage or wrath.
        <b>Effect</b> The target <b>I<4</b> uses a signature action against a creature of Ajax's choice.

        <b>You Would Flounder Your Assault?</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 10<b>	Target</b> Self
        <b>Trigger</b> A creature within distance regains Stamina.
        <b>Effect</b> Ajax regains the same amount of Stamina.

        <b>Who's Hesitating?</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> A creature uses Hesitation is Weakness.
        <b>Effect</b> Ajax shifts up to his speed and makes a free strike that inflicts <b>R<4</b> weakened (EoT).

        <b>I'm Not Done Yet.</b>
        Ajax dies only when his Stamina reaches -325. While his Stamina is below 0, Ajax is bleeding, he can choose any two Tactical Stances each round, and the Director gains 2 more malice per round.

        <b>Phoenix Wing King</b> (Villain Action 1) %E2%97%86 2d10 + 5
        <b>Keywords</b> Area, Magic, Melee, Weapon
        <b>Distance</b> 5 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	%E2%89%A411	10 fire damage; A<4 weakened (save ends)
        %E2%98%85	12%E2%80%9316	16 fire damage; A<5 weakened (save ends)
        %E2%9C%B8	17	20 fire damage; A<6 weakened (save ends)
        <b>Effect</b> Ajax flies and cuts through each target at high speed and then appears in an unoccupied square within distance.

        <b>Their Power Is My Own </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> 3 burst<b>	Target</b> All enemies in the burst
        <b>Effect</b> Ajax uses the soul of a shadow elf eclipse to remove each target's surges. Ajax ignores edges and additional effects of each target's damaging abilities until the end of the round.
        <b>Special</b> This villain action can be replaced with a villain action from a creature an enemy has previously encountered.

