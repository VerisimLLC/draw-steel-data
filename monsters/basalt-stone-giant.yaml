      data: |+
        Basalt Stone Giant	Level 8 Elite Controller
        Giant, Stone Giant	EV 40
        <b>Stamina</b> 207
        <b>Speed</b> 7 (burrow)	<b>Size</b> 4 /<b> Stability</b> 10
        <b>Free Strike</b> 8
        Might +4	Agility +2	Reason +1	Intuition +2	Presence +1
        <b>Rune Signed Blade</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	12 damage; M<2 slowed (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	17 damage; M<3 slowed (save ends)
        %E2%9C%B8	<b>17</b>	21 damage; M<4 slowed (save ends)
        <b>Effect</b> This ability reduces a target's speed to 0 (EoT) if they were already slowed.

        <b>Forked Knife</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 3 Malice
        <b>Keywords</b> Melee, Ranged, Weapon
        <b>Distance</b> Melee 3 or Ranged 12<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	10 damage; A<2 restrained by knife (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	16 damage; A<3 restrained by knife (save ends)
        %E2%9C%B8	<b>17</b>	20 damage; prone; A<4 restrained by knife (save ends)
        <b>Effect</b> The knife lands in the target's square. The knife has 30 Stamina and damage immunity 5. Whenever the knife takes damage, the knife vibrates and deals 4 sonic damage to each enemy within 3 squares.

        <b>Cobble Stone Shape</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The basalt stone giant moves up to their speed. Each square that they leave during this movement is considered difficult terrain for enemies. Giants can move through 2 affected squares for the normal cost of 1 speed.

        <b>Resonate Rune</b> (Triggered Action)
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        <b>Trigger</b> The basalt stone giant takes damage.
        <b>Effect</b> Push 3 or <b>A<3</b> push 6 and knocked prone.

        <b>Stone Steps</b>
        The basalt stone giant ignores difficult terrain.

        <b>Stonebreaker Flesh</b>
        Whenever an enemy gets a tier 1 result on a melee strike against the basalt stone giant, they have a bane on all subsequent uses of that ability until the end of the encounter.



