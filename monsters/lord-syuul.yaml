    import:
      type: mcdm
      data: |+
        Lord Syuul	Level 6 Solo
        Horror, Voiceless Talker	EV 80
        <b>Stamina</b> 450	<b>Immunity</b> psychic 10
        <b>Speed</b> 7 (teleport, hover)	<b>Size</b> 1M /<b> Stability</b> 3
        <b>Free Strike</b> 7
        Might +1	Agility +3	Reason +4	Intuition +4	Presence +3
        <b>Solo Monster</b>
        <b>Solo Turns</b> Lord Syuul takes up to two turns each round. He can't take turns consecutively.
        <b>End Effect</b> At the end of his turn, Lord Syuul can take 10 damage to end one save ends effect affecting him. This damage can't be reduced in any way.

        <b>Tentacle Grab</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	11 damage; A<2 grabbed
        %E2%98%85	<b>12-16</b>	17 damage; A<3 grabbed
        %E2%9C%B8	<b>17</b>	20 damage; A<4 grabbed
        <b>2 Malice</b> The distance of this ability increases to Melee 10. Each target grabbed by Lord Syuul is immediately pulled 10.

        <b>Dampening Grenade</b> (Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Psionic, Ranged
        <b>Distance</b> 2 cube within 5<b>	Target</b> All enemies
        <b>Effect</b> All psionic or magical abilities within the affected area have a double bane. All tests against psionic or magical effects within this area have a double edge.
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage; effect ends after 2 turns.
        %E2%98%85	<b>12-16</b>	10 damage; effect ends after 1 round.
        %E2%9C%B8	<b>17</b>	13 damage; effect ends with the encounter.

        <b>Mind Blown</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 7 Malice
        <b>Keywords</b> Melee, Psionic, Strike
        <b>Distance</b> Melee 1 <b>	Target</b> One grabbed enemy
        %E2%9C%A6	<b>%E2%89%A411</b>	12 damage
        %E2%98%85	<b>12-16</b>	20 damage
        %E2%9C%B8	<b>17</b>	24 damage
        <b>Effect</b> If this action reduces the target to 0 Stamina and they have a brain, their brain explodes, instantly killing them.

        <b>You Come With Me</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> Lord Syuul teleports 5 along with each creature and object he has grabbed. He can release them as part of this maneuver.

        <b>Adaptability</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> Lord Syuul takes typed damage.
        <b>Effect</b> Lord Syuul gains immunity 5 to the triggering type of damage until the start of his next turn.

        <b>Mind Over Manners</b>
        When Lord Syuul uses an ability with the Psionic keyword, he can do so as if he were in the space of any creature within line of effect he has observed using an ability with the Psionic keyword.

        <b>See Only Me</b> (Villain Action 1)
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 10 burst<b>	Target</b> All enemies
        <b>Effect</b> Each target makes an <b>Intuition test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	16 psychic damage; can't establish line of effect to creatures besides Lord Syuul, and strikes targeting Lord Syuul have a bane (save ends)
        %E2%98%85	<b>12-16</b>	13 psychic damage; can't establish line of effect to creatures besides Lord Syuul (save ends)
        %E2%9C%A6	<b>17</b>	7 psychic damage

        <b>Phantom Pain </b>(Villain Action 2)
        <b>Keywords</b> Psionic
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> Lord Syuul becomes invisible, teleports up to 10, and projects an illusory double within 10. The double can't move or act, but Lord Syuul can use psionic abilities as if he were in its space. When a creature touches or damages the double with a melee strike, they take 10 psionic damage. The double disappears and Lord Syuul loses invisibility when Lord Syuul takes damage.

        <b>Mindshatter</b> (Villain Action 3) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 5 Burst<b>	Target</b> All creatures
        %E2%9C%A6	<b>%E2%89%A411</b>	7 psychic damage
        %E2%98%85	<b>12-16</b>	13 psychic damage
        %E2%9C%B8	<b>17</b>	16 psychic damage
        <b>Effect</b> Each target gains damage weakness 3 until the end of the encounter.



