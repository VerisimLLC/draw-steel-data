        Arixx	Level 1 Solo
        Arixx, Beast	EV 30
        <b>Stamina</b> 200
        <b>Speed</b> 5 (burrow)	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 5
        Might +3	Agility +1	Reason -3	Intuition +1	Presence -4
        <b>Solo Monster</b>
        <b>Solo Turns</b> The arixx takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the arixx can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Soft Underbelly</b>
        A prone creature gains an edge on melee strikes against the arixx instead of taking a bane.

        <b>Bite</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2	<b>Target</b> One creature or object
        %E2%9C%A6	%E2%89%A411	9 damage
        %E2%98%85	12%E2%80%9316	13 damage; grabbed
        %E2%9C%B8	17+	16 damage; grabbed
        <b>Effect</b> A size 1 target grabbed this way takes 3 acid damage at the start of each of their turns.

        <b>Claws</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	8 damage; A<1 grabbed
        %E2%98%85	12%E2%80%9316	11 damage; A<2 grabbed
        %E2%9C%B8	17+	14 damage; A<3 grabbed
        <b>2 Malice</b> The arixx can vertical slide each target up to 5 squares.

        <b>Spitfire</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Ranged, Weapon
        <b>Distance</b> 1 cube within 5	<b>Target</b> One creature or object
        %E2%9C%A6	%E2%89%A411	5 acid damage
        %E2%98%85	12%E2%80%9316	8 acid damage
        %E2%9C%B8	17+	11 acid damage
        <b>Effect</b> The affected area is covered in burning acid. An enemy who enters an affected square for the first time on their turn or starts their turn there takes 2 acid damage.

        <b>Earth Eruption</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 4 burst	<b>Target</b> Each enemy in the burst
        <b>Effect</b> The arixx burrows up to their speed, then creates the burst when they breach the surface.
        %E2%9C%A6	%E2%89%A411	4 damage
        %E2%98%85	12%E2%80%9316	6 damage
        %E2%9C%B8	17+	7 damage; push 2

        <b>Dust Cloud</b> (Maneuver)
        <b>Keywords</b> Area
        <b>Distance</b> 1 burst	<b>Target</b> Special
        <b>Effect</b> The arixx kicks up dust into the affected area that blocks line of effect for enemies. The arixx then shifts or burrows up to their speed.

        <b>Skitter</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Trigger</b> The arixx takes damage.
        <b>Effect</b> The arixx shifts up to 3 squares after the triggering effect resolves.

        <b>Earthwalk</b>
        Difficult terrain composed of earth or loose rock doesn't cost the arixx extra movement.

        <b>Tunneler</b>
        When the arixx burrows, they create a size 2 tunnel. The tunnel remains stable for one day, then collapses.

        <b>Acid Spew</b> (Villain Action 1) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 10 x 1 line within 1	<b>Target</b> Each creature in the line
        %E2%9C%A6	%E2%89%A411	5 acid damage
        %E2%98%85	12%E2%80%9316	8 acid damage
        %E2%9C%B8	17+	11 acid damage
        <b>Effect</b> The ground within the affected area is covered in a puddle of acid. A creature who enters an affected square for the first time on their turn or starts their turn there takes 2 acid damage.

        <b>Sinkhole </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The arixx shifts up to their speed by burrowing. If the arixx ends this move underground and within 2 squares of a creature on the surface, the arixx uses Bite against the creature.

        <b>Acid and Claws</b> (Villain Action 3) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 2 burst	<b>Target</b> Each creature in the burst
        %E2%9C%A6	%E2%89%A411	5 acid damage; M<1 bleeding (save ends)
        %E2%98%85	12%E2%80%9316	8 acid damage; M<2 bleeding (save ends)
        %E2%9C%B8	17+	11 acid damage; M<3 bleeding (save ends)


        Ashen Hoarder
        Grave robbing is dangerous business, but necromancers need bodies for their experiments. To procure supplies and stay out of danger, these mages build ashen hoarders- hulking constructs made of magically reinforced humanoid bones.
        Appendages and Spikes
        Ashen hoarders sport four long legs made from compact columns of bone, allowing them to move quickly and avoid creatures who might try to hinder the construct's grim work. Articulated arms with attached tools and weapons aid the hoarder in digging up corpses and fighting enemies.
        When an ashen hoarder obtains a corpse, the construct impales it on one of the many sharp bones protruding from their back. These spikes secure the corpses and charge them with necrotic energy, ensuring the cargo is ready for experimentation when it arrives at the necromancer's door.
        Weaponized Bodies
        These automatons are equipped to protect their cargo. If enemies corner an ashen hoarder, the construct can use the energy stored within their corpses to reanimate them as deadly mines, detonating the remains with explosive corruptive energy. Once the threat is dead, the ashen hoarder can retrieve the enemies' remains and recollect the pieces of their original load.
        Soul Shackle
        Ashen hoarders require a vast amount of necromantic energy to create but also to power continuously. Along with an entire ossuary worth of bones to construct its body, powering it requires a soul. The soul is partially bound into an object known as a Soul Shackle, usually a ring or an amulet, and is used to command the construct. It's an agonizing process for the victim and freeing them is no easy task. Destroying the Soul Shackle is enough to send an ashen hoarder into an indiscriminate unshackled rage, as it can feel part of its soul shredded into oblivion. It will kill any living creature it can before collapsing in on itself. Freeing the soul trapped inside requires a long-term project and the assistance of a powerful holy figure.
