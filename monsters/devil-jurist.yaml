    import:
      type: mcdm
      data: |+
        Devil Jurist	Level 5 Elite Artillery
        Devil, Infernal	EV 28
        <b>Stamina</b> 120	<b>Immunity</b> Fire 5
        <b>Speed</b> 6 (fly)	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 7
        Might 0	Agility +2	Reason +1	Intuition +1	Presence +3
        <b>Fire and Brimstone</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 12<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	10 fire damage
        %E2%98%85	12%E2%80%9316	15 fire damage; A<2 burning (save ends)
        %E2%9C%B8	17	18 fire damage; A<3 burning (save ends)
        <b>Effect</b> A burning creature or object takes 1d6 fire damage at the start of each of their turns until the condition ends.
        <b>1+ Malice </b>The jurist can target one additional creature or object for each malice spent.

        <b>Dismissal with Prejudice</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 2 burst<b>	Target</b> Each enemy in the burst
        %E2%9C%A6	%E2%89%A411	6 damage; slide 1
        %E2%98%85	12%E2%80%9316	10 damage; slide 3
        %E2%9C%B8	17	12 damage; slide 5
        <b>EffectM<2</b> the target slides an additional 3 squares.

        <b>Ashes to Ashes</b> (Maneuver)
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 12<b>	Target</b> 1 burning creature
        <b>Effect</b> The target takes 6 fire damage.

        <b>Devilish Charm</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 5<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature targets the jurist with a strike.
        <b>Effect</b> The target makes a <b>Presence test.</b>
        %E2%9C%B8	%E2%89%A411	The jurist chooses a new target for the strike
        %E2%98%85	12%E2%80%9316	The jurist halves the incoming damage
        %E2%9C%A6	17	The target has a bane on the strike

        <b>Hellfire</b>
        Fire damage dealt by the jurist ignores immunity.

        <b>True Name</b>
        If a creature within 10 squares of the jurist speaks the jurist's true name aloud, the jurist loses their immunities, the additional effects on their signature action, and their Devilish Charm ability.

