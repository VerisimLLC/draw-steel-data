    import:
      type: mcdm
      data: |+
        Demon Vicisitator    Level 10 Horde Harrier
        Abyssal, Demon    EV 12
        <b>Stamina</b> 60    <b>Weakness</b> Holy 5
        <b>Speed</b> 9    <b>Size</b> 1M / <b>Stability</b> 0
        <b>    Free Strike</b> 4
        Might +4    Agility +5    Reason -1    Intuition -2    Presence -3
        <b>Warp Touch</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Ranged, Strike, Weapon
        <b>Distance</b> Melee 1 or Ranged 10<b>    Target</b> 1 creature or object
        %E2%9C%A6    <b>%E2%89%A411</b>    9 damage
        %E2%98%85    <b>12-16</b>    12 damage
        %E2%9C%B8    <b>17</b>    14 damage; I<5 flesh warped (save ends)
        Effect         A flesh warped creature is slowed and weakened.

        <b>Soul Flay</b> (Maneuver) %E2%97%86 2d10 + 5 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 6 x 3 line within 1<b>    Target</b> All enemies in the line
        %E2%9C%A6    <b>%E2%89%A411</b>    4 psychic damage; P<3 soul flayed (save ends)
        %E2%98%85    <b>12-16</b>    7 psychic damage; P<4 soul flayed (save ends)
        %E2%9C%B8    <b>17</b>    9 psychic damage; P<5 soul flayed (save ends)
        <b>Effect</b> A soul flayed creature is bleeding, except the Stamina they lose from the condition increases to 2d6.

        <b>Lethe</b>
        While winded, the vicisitator has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the vicisitator can't be hidden from them.
        Aurumvas    Level 10 Leader
        Abyssal, Demon    EV 48
        <b>Stamina</b> 260    <b>Weakness</b> Holy 5
        <b>Speed</b> 8 (fly)    <b>Size</b> 3 /<b> Stability</b> 2
        <b>Free Strike</b> 9
        Might +5    Agility +2    Reason +5    Intuition +3    Presence +5
        <b>Greedy Hands</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Strike
        <b>Distance</b> Melee 2<b>    Target</b> Two creatures or objects
        %E2%9C%A6    <b>%E2%89%A411</b>    15 corruption damage; R<4 weakened (save ends)
        %E2%98%85    <b>12-16</b>    20 corruption damage; R<5 weakened (save ends)
        %E2%9C%B8    <b>17</b>    24 corruption damage; R<6 weakened (save ends)
        <b>2 Malice</b> Aurumvas regains Stamina equal to the damage dealt.

        <b>Covetous Bolts</b> (Action) %E2%97%86 2d10 + 5%E2%97%86 3 Malice
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 20<b>    Target</b> Two creatures or objects
        %E2%9C%A6    <b>%E2%89%A411</b>    15 psychic damage; P<4 dazed (save ends)
        %E2%98%85    <b>12-16</b>    20 psychic damage; P<5 dazed (save ends)
        %E2%9C%B8    <b>17</b>    24 psychic damage; P<6 dazed (save ends)
        <b>2 Malice</b> Targets can't gain heroic resources while dazed.

        <b>Greed is Good</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10    <b>Target</b> Special
        <b>Effect</b> Aurumvas chooses a treasure or an object made of gold and teleports to an unoccupied space adjacent to the target, ending one save ends effect affecting him.

        <b>Absorb Soul</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> 10 burst<b>    Target</b> Self
        <b>Trigger</b> A demon dies within distance.
        <b>Effect</b> The director gains 1 malice.

        <b>More... More...</b>
        While winded, Aruumvas has a double edge on strikes, and strikes have an edge against him.

        <b>Soulsight</b>
        Each creature within 5 of Aurumvas can't be hidden from him.

        <b>Time is Money </b>(Villain Action 1)
        <b>Keywords</b> -
        <b>Distance</b> Self and 20 burst<b>    Target</b> Self and all allies
        <b>Effect</b> Aurumvas warps time with his abyssal avarice. Each target teleports up to their speed and makes a free strike.

        <b>Hostile Acquisition </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>    Target</b> Special
        <b>Effect</b> Aurumvas chooses up to three treasures he can see within distance that aren't artifacts. Until the end of the encounter, ethereal golden snakes burst from the ground and encircle the targets. While the object is worn or held, every time that hero gains a heroic resource, the director gains 1 malice.

