        Might +2	Agility +2	Reason 0	Intuition 0	Presence 0
        <b>Notched Axe</b> (Action) - 2d10 + highest characteristic - Signature
        <b>Keywords</b> Charge, Melee, Range, Strike, Weapon
        <b>Distance</b> Melee 1 or Ranged 5 	<b>Target </b>One creature or object
        %E2%9C%B8	<b>%E2%89%A411</b>		3 damage
        %E2%98%85	<b>12%E2%80%9316</b>	5 damage
        %E2%9C%A6	<b>17</b>		7 damage

        <b>Relentless</b>
        If the charger's Stamina drops to 0, they can make a free strike before dying. If the target is reduced to 0 Stamina or killed by the attack, the charger lives and their Stamina is reduced to 1 instead.

        Level 4 Retainer Advancement Ability
        <b>Blood Oath</b> (Maneuver, Encounter)
        <b>Keywords</b> %E2%80%93
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> Until the start of the next turn, the charger and the charger's mentor gain their Recovery value in temporary hit points, their Speed increases by 2, and they gain an edge on resistance rolls.

        Level 7 Retainer Advancement Ability
        <b>Mow 'Em Down</b> (Action, Encounter)
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The charger moves in a straight line up to their speed. During this move, they ignore enemy free strikes, and they can make a melee free strike against any creature they move adjacent to.

        Level 10 Retainer Advancement Ability
        <b>Vein Burst</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Attack, Area, Psionic
        <b>Distance</b> 2 burst	<b>Target</b> All enemies
        <%E2%9C%B8	<b>%E2%89%A411</b>		12 psychic damage
        %E2%98%85	<b>12%E2%80%9316</b>		18 psychic damage
        %E2%9C%A6	<b>17</b>		24 psychic damage
        <b>Effect </b>The orc takes psychic damage equal to the number of enemies affected. This damage can't be reduced in any way.

