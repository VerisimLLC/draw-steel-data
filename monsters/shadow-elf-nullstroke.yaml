        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> Three creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	11 damage; I<2 bleeding (save ends)
        %E2%98%85	<b>12-16</b>	16 damage; I<3 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	19 damage; I<4 bleeding (save ends)
        <b>2 Malice</b> The potency of this ability increases by 1.

        <b>Grasping Shadow</b> (Maneuver) %E2%97%86 2d10 + 4 %E2%97%86 5 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 5	<b>Target</b> Three creatures or objects casting a shadow
        %E2%9C%A6	<b>%E2%89%A411</b>	pull 5; I<2 slowed (save ends)
        %E2%98%85	<b>12-16</b>	pull 7; I<3 slowed (save ends)
        %E2%9C%B8	<b>17</b>	pull 10; I<4 slowed (save ends)
        <b>Effect</b> The nullstroke makes a free strike against each target pulled into an adjacent square.

        <b>PUT IT OUT!</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Trigger</b> An enemy uses an ability that emits light, such as fire.
        <b>Effect</b> The enemy has a double bane on the ability.

        <b>End Effect</b>
        At the end of their turn, the nullstroke can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Of the Umbra</b>
        The nullstroke ignores concealment granted by darkness. While the nullstroke is in direct sunlight, they have damage weakness 3. While the nullstroke is concealed, they have damage immunity 3.

        <b>From the Shadows</b> (Villain Action 1)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5<b>	Target</b> All allies
        <b>Effect</b> The nullstroke calls forth one <b>brush stalker</b> that appears within distance. Each target then shifts up to their speed and makes a free strike.

        <b>Eraserhead </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        <b>Effect</b> The nullstroke removes all surges, edges, and bonuses granted by features and abilities affecting each target. If the effect is usually always on, it is disabled until the end of the target's next turn.

        <b>Umbral Hunger</b> (Villain Action 3) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 3 cube within 5<b>	Target</b> All enemies in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	5 corruption damage
        %E2%98%85	<b>12-16</b>	7 corruption damage
        %E2%9C%B8	<b>17</b>	10 corruption damage
        <b>EffectR<3</b> speed becomes zero (save ends). The affected area is shrouded in darkness and becomes concealment. When an enemy starts their turn in an affected square, they take 5 corruption damage.
        Brush Stalker	Level 4 Mount
        Animal, Fey	EV 22
        <b>Stamina</b> 60
        <b>Speed</b> 8	<b>Size</b> 2 /<b> Stability</b> 3
        <b>Free Strike</b> 5
