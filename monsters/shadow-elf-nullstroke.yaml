        %E2%98%85	<b>12-16</b>	7 damage
        %E2%9C%B8	<b>17</b>	9 damage

        <b>Reclamation</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 2 Malice
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	4 corruption damage; M<1 weakened (save ends)
        %E2%98%85	<b>12-16</b>	7 corruption damage; M<2 weakened (save ends)
        %E2%9C%B8	<b>17</b>	9 corruption damage; M<3 weakened (save ends)

        <b>Suneater</b>
        The brush stalker sheds darkness like other creatures would shed light. Each square within 2 of the brush stalker is devoid of light and provides concealment.

        <b>Wyrd Dyr</b>
