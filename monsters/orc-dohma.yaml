        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; push 1
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage; push 3
        %E2%9C%B8	<b>17</b>	12 damage; push 5; dazed (EoT)

        <b>Familial Reinforcements</b> (Maneuver)%E2%97%86 3 VP
        <b>Keywords</b> -
        <b>Distance</b> Ranged 15<b>	Target</b> Special
        <b>Effect</b> The dohma shifts up to their speed and 5 orc blitzers appear in unoccupied spaces.

