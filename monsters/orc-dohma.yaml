        <b>Keywords</b> Area
        <b>Distance</b> 10 Burst<b>	Target</b> All allies
        <b>Effect</b> Each target moves up to their speed. Enemies within reach of a target make an <b>Intuition resistance roll</b>:
        %E2%9C%B8	<b>%E2%89%A411</b>	Frightened of the dohma (INU ends)
        %E2%98%85	<b>12%E2%80%9316</b>	Frightened of the dohma (EoT)
        %E2%9C%A6	<b>17</b>	no effect

        <b>Lockdown </b>(Villain Action 2)
        <b>Keywords</b> Area
        <b>Distance</b> 10 Burst<b>	Target</b> All allies
        <b>Effect</b> Each target attempts a grab with an edge. The dohma then moves up to their speed.

        <b>I'll Do This Myself</b> (Villain Action 3)
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The dohma shifts up to their speed and takes a Mace Lariat attack. Then, dohma shifts up to their speed and takes a Mace Lariat attack. Finally, the dohma shifts up to their speed and takes a Mace Lariat attack.

