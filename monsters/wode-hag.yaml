    import:
      type: mcdm
      data: |+
        Shtriga Nonna	Level 3 Solo
        Fey, Hag	EV 88
        <b>Stamina</b> 240
        <b>Speed</b> 5 flying	<b>Size</b> 1 <b>Stability</b> 1
        <b>Free Strike</b> 6
        Might +2	Agility +1	Reason +1	Intuition +2	Presence +2
        <b>Solo Monster</b>
        <b>Solo Turns</b> Shtriga Nona takes 2 turns each round. She can use two actions on each of her turns and can take each turn after an enemy turn they choose. While dazed, Shtriga Nona can take one action and one maneuver per turn.
        <b>Villain Points</b> At the start of each round of combat, the Director gains VP equal to three times the number of heroes in battle instead of twice.
        <b>End Effect</b> Shtriga Nonna takes 5 damage and ends one EoE effect affecting her at the end of her turn.

        <b>Supernatural Resistance</b>
        Magic or Psionic attacks against Shtriga Nonna have a bane.

        <b>Corrosive Claws</b> (Action) %E2%97%86 2d10 + 2%E2%97%86 Signature
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Reach 1
        <b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	6 acid damage
        %E2%98%85	<b>12-16</b>	10 acid damage; weakened (EoT)
        %E2%9C%B8	<b>17</b>	13 acid damage; weakened (AGL ends)
        <b>Effect</b> A weakened target takes 6 acid damage at the start of their turn.

        <b>Soul Steal</b> (Action) %E2%97%86 MGT RR %E2%97%86 <b>7 VP</b>
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 cube within 1
        <b>Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	10 corruption damage; Shtriga Nonna regains 10 Stamina
        %E2%98%85	<b>12-16</b>	7 corruption damage; Shtriga Nonna regains 5 Stamina
        %E2%9C%B8	<b>17</b>	4 corruption damage

        <b>Shapeshifter </b>(Maneuver)
        <b>Keywords</b> Magic
        <b>Distance</b> Self
        <b>Target</b> Self
        <b>Effect:</b>  Shtriga Nonna can alter her body to become any size 1 creature. Cats are one of her favored shapes.
