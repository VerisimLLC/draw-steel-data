      data: |+
        Mummy Lord	Level 4 Leader
        Mummy, Undead	EV 24
        <b>Stamina</b> 155	<b>Immunity</b> corruption 6, poison 6 / <b>Weakness</b> fire 5
        <b>Speed</b> 6	<b>Size</b> 1M /<b> Stability</b> 4
        <b>Free Strike</b> 6
        Might +4	Agility +0	Reason +2	Intuition +4	Presence +2
        <b>Accursed Slam</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	10 corruption damage; I<2 bleeding (save ends)
        %E2%98%85	<b>12-16</b>	14 corruption damage; I<3 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	17 corruption damage; I<4 bleeding (save ends)
        <b>Effect</b> The potency of abilities used against a target bleeding from this ability increase by 1.

        <b>Binding Curse</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 1 Malice
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 20	<b>Target</b> One creature
        %E2%9C%B8	<b>%E2%89%A411</b>	7 corruption damage; I<2 frightened (save ends)
        %E2%98%85	<b>12-16</b>	12 corruption damage; I<3 frightened (save ends)
        %E2%9C%A6	<b>17</b>	16 corruption damage; I<4 frightened (save ends)
        <b>Effect A target frightened by this ability takes 4 psychic damage whenever they use a move action until the condition ends.</b>
        <b>2+ Malice</b> The mummy lord targets an additional creature for every 2 malice spent.

        <b>Summon my Guard!</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Trigger</b> The Mummy Lord becomes winded for the first time.
        <b>Effect</b> Two <b>mummies</b> and 4 <b>ghoul carvers</b> appear within distance.

        <b>Cursed Transference</b>
        At the end of their turn, the mummy lord can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.
        <b>5 Malice</b> The effect is transferred to a creature within 10.

        <b>Plague of Flies</b> (Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	5 poison damage
        %E2%98%85	<b>12-16</b>	8 poison damage
        %E2%9C%B8	<b>17</b>	10 poison damage
        <b>Effect</b> Each target has a bane on their next strike.

        <b>Land's Guardian </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The mummy lord's speed increases by 2 and adds the burrow keyword to their movement. The mummy lord burrows up to their speed. Each enemy within 2 squares of the mummy lord's movement must make an <b>Agility test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	Prone, can't stand (EoT)
        %E2%98%85	<b>12-16</b>	Prone
        %E2%9C%A6	<b>17</b>	no effect

        <b>Unbound Horrors</b> (Villain Action 3) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	5 corruption damage; I<2 frightened (save ends)
        %E2%98%85	<b>12-16</b>	8 corruption damage; I<3 frightened (save ends)
        %E2%9C%B8	<b>17</b>	10 corruption damage; I<4 frightened and restrained (save ends)
        Undead - 3rd Echelon
        Whether through intentional craft of undead, or by exotic and unique circumstance, especially dangerous undead lurk in isolated, untouched places.
        Koptourok
        Koptourok is a Variac name that roughly translates to "dead tourist." It's given to those who meet their end suffocating in the depths, whether they drowned in a subterranean lake, wandered into a cave of trapped gas, or were crushed by a rockslide. These rasping, slouching undead rise from their grave desperate for the one thing they've lost: breath.
        Haunt
        Born of mass death events that leave many souls stranded in agony together, a haunt is a violent nuclear chaos driven by a maladaptive hatred for the living. They stake claim to the scene of their death, where their grief forbids them from leaving and strands them in the Mundane World. No one soul within the haunt is necessarily malicious, and all of them would individually prefer to move on and find peace, but their accumulated grief drives them to tremendous anger. As such, haunts will commit sadistic acts of violence against the living, even if not one soul within the haunt would've been capable of doing so in life.
        Waxen
        When a corpse is preserved improperly, its body fat can become a substance known as corpse wax, which some necromancers will harvest and use to enhance their own minions, transforming them into waxens. These awkward, loping creatures cake their foes in foul-smelling wax to slow and sicken them. Some necromancers might light their own waxen minions ablaze-doing so usually means sacrificing the creature to the flames, but also makes their fistfulls of wax significantly more dangerous in the process.
        Vampires and Vampire Lords
        By drinking the blood of a true vampire, a vampire spawn can transcend their feral beginnings and rise to become a true vampire themself. However, this need not be the end of their ambitions. Through many nights of cunning, a vampire can grow old and powerful enough to control vast amounts of territory and vassals. The term "vampire lord" thus refers not to a specific age or threshold of physical prowess, but rather status and influence. A vampire who refers to themself as a lord invites challenges to their title and is prepared to crush those who come to end their reign.

