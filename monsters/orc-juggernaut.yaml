      data: |+
        Orc Juggernaut	Level 3 Platoon Brute
        Humanoid, Orc	EV 10
        <b>Stamina</b> 60
        <b>Speed</b> 6	<b>Size</b> 1L /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might +2	Agility +2	Reason -1	Intuition -1	Presence +2
        <b>Haymaker Greataxe</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; prone
        %E2%9C%B8	<b>17</b>	14 damage; prone; M<2 bleeding (save ends)
        <b>Effect</b> This ability deals an additional 6 damage against already prone targets.

        <b>Hrraaaaaagh!</b> (Free Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Trigger</b> The juggernaut takes damage.
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The juggernaut moves up to their speed and makes a free strike.

        <b>Blood in the Water</b>
        The juggernaut can move 3 additional squares if they end their movement closer to a prone creature.

        <b>Relentless</b>
        If the juggernaut's Stamina drops to 0, they can take a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the juggernaut lives and their Stamina is reduced to 1 instead.
        Orc Rampart	Level 2 Platoon Defender
        Humanoid, Orc	EV 8
        <b>Stamina</b> 59
        <b>Speed</b> 6	<b>Size</b> 1L /<b> Stability</b> 2
        <b>Free Strike</b> 4
        Might +2	Agility +2	Reason +2	Intuition +2	Presence +2
        <b>My Spear, My Foe</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage; taunted (EoT)
        %E2%9C%B8	<b>17</b>	12 damage; taunted (EoT)
        <b>Effect</b> This ability has a double edge if the target dealt damage to the rampart this round.

        <b>Castling</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> 1 ally
        <b>Effect</b> The rampart moves or shifts up to their speed to a square adjacent to the target and then swaps places with the target.

        <b>No.</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Trigger</b> A creature targets an adjacent ally with an ability.
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The rampart becomes the new target.

        <b>Relentless</b>
        If the rampart's Stamina drops to 0, they can make a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the rampart lives and their Stamina is reduced to 1 instead.

