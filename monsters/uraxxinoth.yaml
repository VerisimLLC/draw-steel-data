        <b>Cold Immunity 5</b>
        <b>Ice Walker: </b>Uraxxinoth can walk and climb on ice as if it were normal terrain.
        <b>Solo Turns: </b>Uraxxinoth takes 2 turns each round. They can use two actions on each of their turns and can take each turn after an enemy turn they choose. While dazed, Uraxxinoth can take one action and one maneuver per turn.
        <b>Frosty Bite</b>
        <b>Keywords:</b><i> </i>Attack, Melee, Weapon	<b>Type:</b> Action
        <b>Distance:</b> Melee 3			<b>Target:</b> 1 creature or object
        <b>Roll 2d6 + Might:</b>
        <i>7 or lower:</i> <b>2 damage, 2 cold damage</b>
        <i>8-10:</i><b> 4 damage, 4 cold damage; weakened 1</b>
        <i>11+:</i> <b>6 damage, 6 cold damage; weakened 2</b>
        <b>Spit Frost</b>
        <i>Just one puff chills you to the bone.</i>
        <b>Keywords:</b><i> </i>Attack, Ranged, Weapon	<b>Type:</b> Action
        <b>Distance:</b> Ranged	5		<b>Target:</b> 1 creature
        <b>Roll 2d6 + Might:</b>
        <i>7 or lower:</i> <b>3 cold damage</b>
        <i>8-10:</i><b> 6 cold damage; slowed 1</b>
        <i>11+:</i> <b>10 cold damage; slowed 3</b>
        Maneuver
        <b>Icy Winds</b>
        <i>I control the weather in this domain.</i>
        <b>Keywords:</b> Area, Magic, Melee	<b>Type:</b> Maneuver
        <b>Distance:</b><i> </i>3 Burst			<b>Target:</b> All enemies
        <b>Effect:</b><i> </i>Uraxxinoth slides each target up to 2 squares.
        Triggered Actions
        <b>Ice Shield</b>
        <i>An incoming attack is blocked by a sudden shield of ice.</i>
        <b>Keywords:</b><i> </i>Magic		<b>Type:</b> Triggered
        <b>Distance:</b> Self
        <b>Trigger:</b> An enemy within distance damages Uraxxinoth.
        <b>Effect:</b><i> </i>The damage is halved.
        Villain Abilities
        Uraxxinoth can only use one villain ability per round.
        <b>Recharge: Ice Breath</b>
        <i>Things this cold feel like a knife in your lungs.</i>
        <b>Keywords:</b><i> </i>Area, Melee, Weapon	<b>Type:</b> Action
        <b>Distance:</b> 4 Cube within 1		<b>Target: </b>All creatures
        <b>Roll 2d6 + Might:</b>
        <i>7 or lower:</i> <b>5 cold damage</b>
        <i>8-10:</i><b> 10 cold damage</b>
        <i>11+:</i> <b>15 cold damage</b>
        <b>Recharge: Blizzard</b>
        <i>A snowstorm whips around the dragon</i><i>.</i>
        <b>Keywords:</b><i> </i>Area, Magic, Melee	<b>Type:</b> Maneuver
        <b>Distance:</b> 1 Burst			<b>Target: </b>All creatures
        <b>Roll 2d6 + Reason:</b>
        <i>7 or lower:</i> <b>slowed 1</b>
        <i>8-10:</i><b> restrained 1</b>
        <i>11+:</i> <b>restrained 5</b>
        <b>Extra:</b> The blizzard lasts until the start of the next round and gives Uraxxinoth concealment against their enemies, but doesn't conceal enemies from Uraxxinoth.
        <b>Recharge: Ice Spears</b>
        <i>The ice covering Uraxxinoth's body explodes from the dragon in all directions.</i>
        <b>Keywords:</b><i> </i>Area, Magic, Melee	<b>Type:</b> Action
        <b>Distance:</b> 3 Burst			<b>Target: </b>All creatures
        <b>Roll 2d6 + Reason:</b>
        <i>7 or lower:</i> <b>3 damage and 3 cold damage</b>
        <i>8-10:</i><b> 5 damage and 5 cold damage</b>
        <i>11+:</i> <b>7 damage and 7 cold damage</b>
        <b>Extra:</b> Restrained creatures take an additional 5 cold damage.
        <b>Who is Uraxxinoth?</b>
        A young, brash dragon who commands the power of ice, Uraxxinoth has organized a group of kobolds to help gather a hoard of treasure. Uraxxinoth needs vast wealth to perform a ritual that will summon Garinos, an imprisoned archdevil whose sole desire is to see Orden plunged into an eternal winter. Uraxxinoth wants this too and believe that together, the dragon and the devil can make the world and icy place.
