        <b>Keywords</b> Area, Psionic, Weapon
        <b>Distance</b> 5 cube within 10<b>	Target</b> All enemies in the cube
        <b>Effect</b> The marauder lord uses Levitating Axes against each target. The marauder lord makes one power roll against all targets.

