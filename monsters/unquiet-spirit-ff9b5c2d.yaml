      type: mcdm
      data: |+
        Unquiet Spirit	Level 1 Hexer Retainer
        Incorporeal, Undead	EV 11
        <b>Stamina</b> 20	<b>Immunity</b> corruption 3, poison 3
        <b>Speed</b> 5 (fly)	<b>Size</b> 1M/<b>Stability</b> 1
        <b>Free Strike</b> 2
        Might -4	Agility +1	Reason 0	Intuition 0	Presence +2
        <b>Chill of Death</b> (Action) - 2d10 + highest characteristic - Signature
        <b>Keywords</b> Magic, Ranged ,Strike
        <b>Distance</b> Ranged 10 	<b>Target </b>One creature or object
        %E2%9C%A6 %E2%89%A411 		3 cold damage
        %E2%98%85 12%E2%80%9316 	5 cold damage
        %E2%9C%B8 17+ 		7 cold damage; P (strong) slowed (EoT)

        <b>Spirit Meld</b> (Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 1	<b>Target</b> the unquiet spirit's mentor
        <b>Effect</b> The spirit moves into their mentor's space while in an adjacent space, or moves into an adjacent space from their mentor's space.When the unquiet spirit enters their mentor's space in this way, they move with the mentor, can't be sensed, can't affect or be affected by other creatures or objects, and can't take actions, maneuvers, or move actions except for Spirit Meld.

        <b>Corruptive Phasing</b>
        The specter can move through other creatures and objects at normal speed. The first time in a round that the specter passes through a creature other than their mentor, the creature takes 2 corruption damage.

        Level 4 Retainer Advancement Ability
        <b>Curse of Defenselessness</b> (Action, Encounter)  - 2d10 + highest characteristic
        <b>Keywords</b> Ranged, Magic, Strike
        <b>Distance</b> Ranged 10	<b>Target</b> 1 creature
        %E2%9C%A6 %E2%89%A411		6 corruption damage; defenselessness 1
        %E2%98%85 12%E2%80%9316		10 corruption damage; defenselessness 2
        %E2%9C%B8 17+		14 corruption damage; defenselessness 3
        <b>Effect</b> The first attack against the target gains 1 surge for each level of defenselessness.

        Level 7 Retainer Advancement Ability
        <b>Ectoplasm</b> (Action, Encounter)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 cube within 1	<b>Target</b> All enemies
        <11		A (weak) slowed and weakened (save ends)
        %E2%98%85 12%E2%80%9316		A (average) slowed and weakened (save ends)
        %E2%9C%B8 17+		A (strong) slowed and weakened (save ends)

        Level 10 Retainer Advancement Ability
        <b>Death Phase</b> (Action, Encounter)
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 5	<b>Target</b> One creature
        <b>Effect</b> P (strong) phased (EoT). A phased target gains the unquiet spirit's Corruptive Phasing trait and their movement gains the Fly tag. They are visible but can't affect or be affected by other creatures or objects. A willing creature can automatically fail the Presence test.


