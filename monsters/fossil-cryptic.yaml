    import:
      type: mcdm
      data: |+
        Fossil Cryptic	Level 2 Solo
        Elemental	EV 40
        <b>Stamina</b> 250
        <b>Speed</b> 8 (burrow)	<b>Size</b> 1L /<b> Stability</b> 3
        <b>Free Strike</b> 5
        Might +3	Agility +2	Reason +1	Intuition +1	Presence 0
        <b>Solo Monster</b>
        <b>Solo Turns</b> The cryptic takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the cryptic can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Churning Trunk</b>
        The cryptic emits a 1 aura of swirling debris that obscures their form. Any enemy who enters the aura for the first time in a round or starts their turn there takes 5 damage. Ranged abilities that target the cryptic have a bane.

        <b>Seismic Step</b>
        The cryptic ignores difficult terrain. Additionally, they have line of effect to concealed creatures touching the ground.

        <b>Sand Slam</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	8 damage; A<1 slide 2
        %E2%98%85	12%E2%80%9316	12 damage; A<2 prone and can't stand (EoT)
