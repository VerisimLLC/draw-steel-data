    import:
      type: mcdm
      data: |+
        Meteor Dragon	Level 10 Solo
        Dragon, Elemental	EV 120
        <b>Stamina</b> 650
        <b>Speed</b> 15 (fly)	<b>Size</b> 3 /<b> Stability</b> 6
        <b>Free Strike</b> 10
        Might +5	Agility +5	Reason +3	Intuition +3	Presence +5
        <b>Solo Monster</b>
        <b>Solo Turns</b> The dragon takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the dragon can take 20 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Voidshroud Wyrmscale Aura</b>
        The dragon's scales emit a 1 aura that transforms the area into the void of space. An enemy that starts their turn in an affected square takes 10 cold damage and begins to suffocate.
        Each time the dragon takes damage, the area of the aura increases by 1 (to a maximum of 5) and the dragon deals an additional 5 damage on their next ability.

        <b>Gravity Well </b>(Action) %E2%97%86 Signature
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 4 cube within 10<b>	Target</b> All enemies and objects
        <b>Effect</b> Each target makes a <b>Might test.</b>
        %E2%9C%B8	%E2%89%A411	20 sonic damage; dragonsealed (save ends)
        %E2%98%85	12%E2%80%9316	16 sonic damage; dragonsealed (save ends)
        %E2%9C%A6	17	10 sonic damage
        <b>Effect</b> Each dragonsealed target emits a golden aura and takes an additional 2 damage per square moved from falling or from forced movement into obstacles until the condition ends.

        <b> Cosmic Tail Ray</b> (Action) %E2%97%86 2d10 + 5
        <b>Keywords</b> Magic, Melee, Ranged, Strike
        <b>Distance</b> Melee 2 or Ranged 15<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	15 holy damage; A<4 weakened (save ends)
        %E2%98%85	12%E2%80%9316	21 holy damage; A<5 weakened (save ends)
        %E2%9C%B8	17	25 holy damage; A<6 weakened (save ends)
        <b>Effect</b> A target is dazed (EoT) if they are already weakened.

        <b>Investiture of Gravity</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 15 burst <b>	Target</b> All dragonsealed enemies
        <b>Effect</b> The dragon chooses a direction. All targets vertically slide 10, ignoring stability, in that direction as if falling downward.

        <b>Crescent Claws </b>(Free Maneuver)
        Once per turn, the dragon chooses a target within 3 and makes a free strike against them. The dragon ignores banes when using abilities against the target until the start of their next turn.

        <b>A Hero Faces the Void</b> (Triggered Action) %E2%97%86 2d10 + 5 %E2%97%86 2 Malice
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 15<b>	Target</b> 1 creature
        <b>Trigger</b> The target spends Heroic Resources on an ability.
        %E2%9C%A6	%E2%89%A411	10 psychic damage; P<4 frightened (save ends)
        %E2%98%85	12%E2%80%9316	16 psychic damage; P<5 frightened (save ends)
        %E2%9C%B8	17	20 psychic damage; P<6 frightened (save ends)
        <b>Effect</b> A creature frightened by this ability can't use the ability that triggered it again until the condition ends.

        <b>Field Collapse</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Special<b>	Target</b> All enemies and objects
        <b>Trigger</b> The dragon is targeted by an attack or an ability while their wyrmscale aura has an area of 2 or more.
        <b>Effect</b> The dragon halves the damage. Each target within the dragon's wyrmscale aura takes 5 sonic damage and is pulled 5. The area of the wyrmscale aura reduces to 1.

        <b>Meteor Dragon's Domain</b>
        If the encounter map is a location the dragon has occupied for 1 week or more, each creature and object other than the dragon has their stability reduced to 0 and they automatically get a tier-1 result on Agility tests. Additionally, suffocating in the area deals an additional 1d6 damage at the end of each round.

        <b>Impactful Arrival</b> (Villain Action 1)
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 1 mile burst<b>	Target</b> All creatures and objects
        <b>Effect</b> The target takes 30 fire damage and is <b>M<5</b> knocked prone.
        <b>Special</b> This ability is used before initiative is rolled.

        <b>Burning Aurora </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> Until the end of the encounter, each dragonsealed and weakened enemy within line of effect to the dragon loses 1 Heroic Resource at the start of each of their turns (to a minimum of 0). The dragon then uses their Cosmic Tail Ray ability targeting four creatures or objects with a double edge.

        <b>Voidlight Breath</b> (Villain Action 3)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> %E2%88%9E x 3 line within 1<b>	Target</b> All enemies and objects
        <b>Effect</b> Each target makes an <b>Agility test.</b>
        %E2%9C%B8	%E2%89%A411	25 damage; I<6 annihilated
        %E2%98%85	12%E2%80%9316	21 damage; I<5 annihilated
        %E2%9C%A6	17	15 damage; I<4 annihilated
        <b>Effect</b> An annihilated target must make the test again. Each subsequent time the target makes the test, the potency decreases by 2 for them. A creature reduced to 0 Stamina in this way is instantly killed, their soul utterly destroyed.

