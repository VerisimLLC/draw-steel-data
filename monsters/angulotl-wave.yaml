      data: |+
        ANGULOTL WAVE	LEVEL 1 HORDE CONTROLLER
        Angulotl, Humanoid	EV 3
        Stamina 10	Immunity poison 2
        Speed 5 (swim, climb)	Size 1S / Stability 0
        Free Strike 1
        Might 0	Agility 0	Reason 0	Intuition +2	Presence +2
        Refulgent Beams (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        Keywords Magic, Ranged, Strike
        Distance Ranged 8	Target 2 creatures or objects
        %E2%9C%B8	%E2%89%A411	3 holy damage
        %E2%98%85	12%E2%80%9316	4 holy damage; R<1 illuminated (save ends)
        %E2%9C%A6	17	5 holy damage; R<2 illuminated (save ends)
        Effect Illuminated creatures and objects can't Hide or turn invisible, and strikes made against them have an edge until the condition ends.

        Noxious Bubble (Action) %E2%97%86 2 Malice
        Keywords Area, Magic, Ranged
        Distance 2 Cube of unoccupied space within 10	Target Special
        Effect A bubble of toxic gas fills the area, ready to pop. If a creature or object touches the bubble, or the bubble takes damage, it bursts. Each angulotl within 1 becomes wet (save ends) (see Wet) and each enemy within 1 makes a Might test.
        %E2%9C%B8	%E2%89%A411	3 poison damage; wet and weakened (save ends)
        %E2%98%85	12%E2%80%9316	2 poison damage; wet (save ends)
        %E2%9C%A6	17	1 poison damage; wet (EoT)

        Toxiferous
        When an adjacent enemy grabs or uses a melee ability against the wave, they take 2 poison damage.



