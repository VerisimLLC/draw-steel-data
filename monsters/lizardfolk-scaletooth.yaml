      data: |+
        Lizardfolk Scaletooth	Level 1 Platoon Brute
        Humanoid, Lizardfolk	EV 6
        <b>Stamina</b> 46
        <b>Speed</b> 5 (swim)	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 4
        Might +2	Agility +1	Reason 0	Intuition 0	Presence 0
        <b>Razor Bite</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage
        %E2%98%85	<b>12%E2%80%9316</b>	9 damage
        %E2%9C%B8	<b>17</b>	12 damage; A<2 bleeding (save ends)
        <b>Effect</b> The potency of this ability increases by 1 if the target is grabbed by the scaletooth.

        <b>Tail Whip</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 2 Malice
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2	<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage; slide 1
        %E2%98%85	<b>12%E2%80%9316</b>	8 damage; slide 2; M<1 grappled if within 2 of the scaletooth
        %E2%9C%B8	<b>17</b>	10 damage; slide 3; M<2 grappled if within 2 of the scaletooth
        <b>Effect</b> The scaletooth needs their tail to use this ability. The scaletooth can't grapple more than one creature or object with this ability.

        <b>Reptilian Escape</b>
        While the scaletooth still has a tail, whenever the scaletooth is grabbed, slowed, weakened, or knocked prone, the scaletooth can lose their tail to immediately end the effect and shift 2.

