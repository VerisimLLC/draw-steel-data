        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 5<b>	Target</b> Self or 1 elemental
        <b>Effect</b> The target gains 15 temporary Stamina that lasts until the start of the field's next turn.
        <b>3 Malice</b> The ground within 1 of the target is overgrown with thicket and vines until the end of the encounter. Whenever an enemy attacks the target while within line of effect of the affected area, they are pulled 5 towards the affected area. Whenever an enemy enters the affected area on a turn or starts their turn within it, they are knocked prone.

