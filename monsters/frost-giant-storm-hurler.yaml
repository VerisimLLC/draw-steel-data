        Frost Giant Storm Hurler	Level 8 Elite Artillery
        Frost Giant, Giant	EV 40
        <b>Stamina</b> 180	<b>Immunity</b> cold 8
        <b>Speed</b> 7	<b>Size</b> 4 /<b> Stability</b> 5
        <b>Free Strike</b> 9
        Might +4	Agility -1	Reason 0	Intuition 0	Presence 0
        <b>Ice Javelins</b> (Action)%E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 15<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	13 cold damage
        %E2%98%85	<b>12%E2%80%9316</b>	18 cold damage; M<3 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	22 cold damage; M<4 bleeding (save ends)
        <b>Effect</b> Each time a creature bleeding from this ability takes damage due to bleeding, their speed decreases by 1 (to a minimum of 0) until the condition ends.

        <b>Flower of Frost</b> (Action) %E2%97%86 3 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 15<b>	Target</b> Special
        <b>Effect</b> The storm hurler throws three size 1L javelins into unoccupied squares within distance. A javelin has 30 Stamina and fire weakness 5. At the start of the storm hurler's next turn, each javelin with 1 or more Stamina explodes in a shower of icicles. Each enemy and object within 3 squares of an exploding javelin makes an <b>Agility test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	14 cold damage; push 4; bleeding (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	11 cold damage; push 2; slowed (save ends)
        %E2%9C%A6	<b>17</b>	7 cold damage

        <b>Ice Dance</b> (Maneuver)
        <b>Keywords</b> Attack, Melee
        <b>Distance</b> Melee 1<b>	Target</b> 1 giant ally
        <b>Effect</b> Both giants shift 6, staying adjacent to each other. The storm hurler allows the target to jump 5 and make a free strike.

        <b>Frozen Retribution</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> The storm hurler is targeted by a ranged strike.
        <b>Effect</b> The storm hurler imposes a double bane on the strike. If the result is tier 1, the storm hurler uses their Ice Javelins ability against the striker.

        <b>Kingdom of Isolation</b>
        The storm hurler is surrounded by a snowstorm. An enemy that starts their turn within 2 squares of the storm hurler can't shift.



