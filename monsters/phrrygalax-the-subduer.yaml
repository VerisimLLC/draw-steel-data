        <b>Free Strike</b> 7
        Might +3	Agility +2	Reason +0	Intuition +0	Presence +3
        <b>Baneful Blade</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	10 damage
        %E2%98%85	<b>12-16</b>	16 damage; M<1 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	19 damage; M<2 3 damage, bleeding (save ends)

        <b>Spinning Spit</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 2 Malice
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 1 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	7 fire damage
        %E2%98%85	<b>12-16</b>	13 fire damage
        %E2%9C%B8	<b>17</b>	16 fire damage

        <b>Heavy Landing</b> (Maneuver)
        <b>Keywords</b> Area
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> Phrrygalax flies up to his speed and lands in an unoccupied space on the ground. Each creature adjacent to where he lands is <b>A<2</b> knocked prone.

        <b>Armor of the Ancients </b>(Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> Phrrygalax takes acid, cold, corruption, fire, lightning, or poison damage.
        <b>Effect</b> Phrrygalax absorbs the damage instead, recovering Stamina equal to the damage dealt. Phrrygalax swaps his current immunity with the triggering damage type.

        <b>STILL YOUR TONGUE! </b>(Free Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> Phrrygalax hears a creature within 5 reciting the oath of Good King Omund's Dragon Phalanx
        <b>Effect</b> Phrrygalax shifts up to his speed and uses Baneful Blade against the enemy, dealing an additional 7 damage.

        <b>Oathbreaker's Vengeance</b>
        When Phrrygalax fails a saving throw, he deals an additional 7 damage on his next strike.



