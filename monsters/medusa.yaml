    import:
      type: mcdm
      data: |+
        Medusa	Level 5 Solo
        Accursed, Humanoid, Medusa	EV 70
        <b>Stamina</b> 400	<b>Immunity</b> Poison 5, Acid 5
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 7
        Might +2	Agility +4	Reason +0	Intuition +0	Presence +0
        <b>Solo Monster</b>
        <b>Solo Turns</b> The medusa takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the medusa can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Snake Bite</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	11 damage; M<2 slowed (save ends)
        %E2%98%85	12%E2%80%9316	16 damage; M<3 slowed (save ends)
        %E2%9C%B8	17	19 damage; M<4 slowed (save ends)

        <b>Damning Gaze</b> (Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	11 damage; push 3
        %E2%98%85	12%E2%80%9316	16 damage; push 5
        %E2%9C%B8	17	19 damage; push 7
        <b>3 Malice</b> The medusa targets two additional creatures or objects.

        <b>Petrify</b> (Action) %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 burst<b>	Target</b> Each enemy in the burst
        <b>Effect</b> The medusa turns dozens of eerie snake eyes on their foes.
        %E2%9C%B8	%E2%89%A411	Slowed (save ends) or M<4 restrained (save ends)
        %E2%98%85	12%E2%80%9316	M<3 restrained (save ends)
        %E2%9C%A6	17	M<2 restrained (save ends)
        <b>Effect</b> A target with cover has +1 to resist the potency, while an already slowed target has -1 to resist the potency. A target restrained by this ability magically begins to turn to stone. A target that ends two consecutive turns restrained by this ability is petrified (see Petrification).

        <b>Nimble Escape</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The medusa shifts 3 and hides, even if observed.

        <b>Venomous Spit</b> (Triggered Action) %E2%97%86 2d10 + 4 %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Melee 1<b>	Target</b> One creature
        <b>Trigger</b> A creature deals damage to the medusa.
        %E2%9C%A6	<b>%E2%89%A411</b>	13 acid damage
        %E2%98%85	<b>12-16</b>	18 acid damage
        %E2%9C%B8	<b>17</b>	22 acid damage

        <b>Cunning Edge</b>
        The medusa has an edge on power rolls made against any creature affected by their Petrify ability.

        <b>Many Peering Eyes</b>
        The medusa can't be flanked.

        <b>Mass Petrify</b> (Villain Action 1)
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> Line of effect<b>	Target</b> All enemies
        <b>Effect </b>The medusa uses their Petrify ability against each target without spending Malice. Each target not behind cover has -1 to resist the potency.

        <b>Serpent Wings </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The medusa manifests temporary wings and vertically shifts up to their speed. During or after this movement, they can use Snake Bite and Damning Gaze once each.

        <b>Stone Puppets</b> (Villain Action 3)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 10 burst<b>	Target</b> Special
        <b>Effect</b> Each stone statue and creature affected by Petrify within distance moves up to their speed and uses a signature action with an edge targeting an enemy of medusa's choice as a free triggered action. A stone statue without its own stats has a speed of 5 and uses the Medusa's free strike instead.

