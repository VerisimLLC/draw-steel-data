        <b>5 Malice</b> If the target is pushed into another creature, both the target and the creature are restrained (EoT).

        <b>Ensnaring Chains</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Ranged, Weapon
        <b>Distance</b> Ranged 10	<b>Target</b> 1 restrained, slowed, or prone target
        <b>Effect</b> The gunner makes a free strike against the target. The target loses any restrained, slowed or prone conditions and gains restrained (save ends).

        <b>Split Shot</b>
        Whenever the gunner deals damage to a creature or object, a creature or object within 1 of the recipient takes 3 damage.

