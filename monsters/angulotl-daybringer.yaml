    import:
      type: mcdm
      data: |
        ANGULOTL DAYBRINGER	LEVEL 1 LEADER
        Angulotl, Humanoid	EV 12
        Stamina 80	Immunity poison 3
        Speed 5 (swim, climb)	Size 1M / Stability 1
        Free Strike 4
        Might +3	Agility +2	Reason 0	Intuition +2	Presence 0
        Acid Grasp (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        Keywords Melee, Strike, Weapon
        Distance Melee 1	Target 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	7 acid damage; A<1 dazed (save ends)
        %E2%98%85	12%E2%80%9316	10 acid damage; A<2 dazed (save ends)
        %E2%9C%B8	17	13 acid damage; A<3 dazed (save ends)
        Effect The next time the target strikes the daybringer, they immediately take 4 acid damage.
        1 Malice The daybringer jumps 3 squares before or after using this ability.

        Sun Lamp (Maneuver)
        Keywords %E2%80%94
        Distance Self	Target Self
        Effect The daybringer expands their throat to resemble the sun until the start of their next turn. Each non-minion angulotl who starts their turn within 10 of the daybringer gains 5 temporary Stamina and has their Speed increased by 3 until the end of their turn.

        Tongue Slap (Triggered Action)
        Keywords %E2%80%94
        Distance Melee 5	Target 1 creature
        Trigger The target targets the daybringer or an ally with a strike that isn't a critical hit.
        Effect The daybringer reduces the power roll result by 1 tier.
        2 Malice Pull 4.

        Moisturizing End Effect
        The daybringer either takes 5 damage or removes the wet effect from an adjacent creature and ends one save ends effect affecting them at the end of their turn.

        New Dawn (Villain Action 1)
        Keywords %E2%80%94
        Distance Ranged 10	Target Special
        Effect Four angulotl pollywogs escape the daybringer's back and waddle into unoccupied squares within distance.

        Plague of Frogs (Villain Action 2)
        Keywords %E2%80%94
        Distance Self and 8 burst	Target Self and all allies in the burst
        Effect Each target jumps 4. Each non-minion target also makes a free strike.

        It Is Day (Villain Action 3)
        Keywords %E2%80%94
        Distance Special	Target Special
        Effect The encounter map dries up and becomes illuminated. Each wet enemy has the wet condition end and takes 6 acid damage. All angulotls have a double edge on their next strike.

        Toxiferous
        When an adjacent enemy grabs or uses a melee ability against the daybringer, they take 3 poison damage.

        RETAINER
