    import:
      type: mcdm
      data: |+
        Logostician Vesper	Level 10 Elite Controller
        War Dog	EV 48
        <b>Stamina</b> 253
        <b>Speed</b> 10	<b>Size</b> 2 /<b> Stability</b> 3
        <b>Free Strike</b> 10
        Might +2	Agility +1	Reason +5	Intuition +4	Presence +1
        <b>Portal to the Firing Line</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 Signature
        <b>Keywords</b> Area, Ranged, Weapon
        <b>Distance</b> 5 x 3 line within 15<b>	Target</b> All non-prone creatures and objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage
        %E2%98%85	<b>12-16</b>	12 damage; I<4 slowed (save ends)
        %E2%9C%B8	<b>17</b>	15 damage; I<5 slowed (save ends)
        <b>Effect</b> A creature targeted by this ability may drop prone to impose a bane on it.
        <b>2 Malice </b>The portal remains until Vesper dies or the encounter ends. Any non-prone enemy that enters or starts their turn in the affected area takes 15 damage, or 7 damage if they choose to fall prone.

        <b>Portal to the Mantle</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 3 cube within 15<b>	Target</b> All creatures and objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 fire damage
        %E2%98%85	<b>12-16</b>	12 fire damage
        %E2%9C%B8	<b>17</b>	15 fire damage
        <b>Effect</b> The affected area becomes difficult terrain. A creature that enters an affected square or starts their turn in one takes 10 fire damage. The affected area increases by 1 at the beginning of each round.

        <b>Portal to the Void</b> (Maneuver)
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 5 cube within 15<b>	Target</b> All creatures and objects
        %E2%9C%A6	<b>%E2%89%A411</b>	A<4 pulled 3 towards the center
        %E2%98%85	<b>12-16</b>	A<5 pulled 3 towards the center
        %E2%9C%B8	<b>17</b>	pulled 3 towards the center
        <b>Effect</b> A portal appears at the center square of the area. Any creature that shares a square with the portal when this ability is used or that would be pulled into the portal's square takes 10 sonic damage.
        <b>2 Malice </b>The portal remains until Vesper dies or the encounter ends. A creature that enters an affected square is <b>A<4</b> pulled 3 towards the center. A creature that starts their turn in an affected square is <b>M<4</b> slowed (EoT).

        <b>Portal to the Sky</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 15<b>	Target</b> One enemy
        <b>Trigger</b> The target moves within 3 squares of Vesper
        <b>Effect</b> The target is dropped through a portal and teleported 7 squares above a square within distance.

        <b>Living Logistics Network</b>
        Each ally that starts their turn within 10 squares of Vesper has the teleport keyword added to their movement until the end of their turn. Whenever an affected ally teleports, they deal an additional 5 damage on their next strike.

        <b>Crash and Burn</b>
        When Vesper dies, they move their full speed and then explode, dealing 4d6 damage to each adjacent enemy. Any enemy that takes more than 14 damage this way vertically slides 5.

