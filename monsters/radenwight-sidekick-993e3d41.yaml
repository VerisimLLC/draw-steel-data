      data: |
        Radenwight Sidekick 	Level 1 Support Retainer
        Humanoid, Radenwight	EV 13
        <b>Stamina</b> 30
        <b>Speed</b> 5 (climb)	<b>Size</b> 1S/<b>Stability</b> 0
        <b>Free Strike</b> 2
        Might 0	Agility +2	Reason 0	Intuition +1	Presence 0
        <b>Dagger's Bite</b> (Action) - 2d10 + highest characteristic - Signature
        <b>Keywords</b> Melee, Ranged, Strike, Weapon
        <b>Distance</b> Melee 1, Ranged 5 	<b>Target </b>One creature or object
        %E2%9C%A6	%E2%89%A411		3 damage
        %E2%98%85	12%E2%80%9316	5 damage
        %E2%9C%B8	17+		7 damage

        <b>Ready Rodent</b> (Triggered Action, Encounter)
        <b>Keywords</b> Melee, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> 1 creature
        <b>Trigger</b> An ally deals damage to the target.
        <b>Effect</b> The sidekick makes a free strike against the target.

        Level 4 Retainer Advancement Ability
        <b>Boost</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect </b>If the sidekick's mentor comes within 1 of the sidekick at any point during their turn, the mentor's speed increases by 1 and the mentor's movement gains the climb keyword until the end of the turn.

        Level 7 Retainer Advancement Ability
        <b>Bug Bag</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Area, Ranged
        <b>Distance</b> 3 cube within 3	<b>Target</b> All creatures
        %E2%9C%A6	%E2%89%A411		6 poison damage; (weak) M weakened (save ends)
        %E2%98%85	12%E2%80%9316		9 poison damage (average) M weakened (save ends)
        %E2%9C%B8	17+		13 poison damage; (strong) M weakened (save ends)

        Level 10 Retainer Advancement Ability
        <b>Triumphant Squeak </b>(Maneuver, Encounter)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The target can use a Recovery. The dazed, frightened, and weakened conditions end for the target. Allies within 3 can use Triumphant Squeak as a triggered action, targeting themselves.


        Rivals
        <b>Monster Troops</b>
        They take the jobs you were eyeing on the local town's job board. They sit at your favorite table in the tavern with the best drinks, food, and entertainment. You know their name, and they know yours. They're rivals-heroes just like you, and maybe better.
        Rivals are streamlined and modular, meant to be easy to adjust on the fly with ancestral traits or signature abilities. They're presented at every tier, capturing their foray into renown as it inevitably crosses, clashes with, and impedes the heroes' journey.
        Using Rivals in a Campaign
        The next time the heroes suddenly visit a local temple in search of capable clergy to help with a horde of undead, you won't be fumbling for a stat block-that's what rivals are for. These grab-and-go adaptations of classes are meant to capture enough of the class fantasy without making Directors run a full hero character sheet.
        They also seamlessly work together, allowing Directors to build a party of NPC heroes or villains who can be allies, enemies, or (quite literally) rivals. They can foil the heroes, showing other ways to use their strength and power.
        Rival Ancestries
        You can adjust the rival stat blocks to more closely model the rival's ancestry. Select one of the following ancestries, adjust the size and stability, and add the new keyword and ancestral trait.
        |Keyword|Adjustments
        |Devil|<b>Size</b> 1M /<b> Stability</b> 0
        |Dragon Knight|<b>Size</b> 1M /<b> Stability</b> 1
        |Dwarf|<b>Size</b> 1M /<b> Stability</b> 2
        |High Elf / Wode Elf|<b>Size</b> 1M /<b> Stability</b> 0
        |Hakkan|<b>Size</b> 1L /<b> Stability</b> 2
        |Human|<b>Size</b> 1M /<b> Stability</b> 1
        |Memonek|<b>Size</b> 1M /<b> Stability</b> 0
        |Orc|<b>Size</b> 1M /<b> Stability</b> 2
        |Polder|<b>Size</b> 1M /<b> Stability</b> 1
        |Revenant|<b>Size</b> 1M /<b> Stability</b> 2
        |Time Raider|<b>Size</b> 1M /<b> Stability</b> 0
        Rival Abilities
        Each of the rivals can replace their signature action with one the heroes have access to. The censor, tactician, shadow, and fury can select a signature action from any kit, while the other rivals can select a signature action from their respective class. The new ability deals extra damage equal to the rival's level.
        Rival Languages
        Most rivals speak Caelian and two other languages.

        Rival Malice	Level 1+ Malice Features
        At the start of any rival's turn, you can spend malice to activate one of the following features.
        <b>Work as One</b> %E2%97%86 3 Malice
        Until the end of the round, each rival can impose a bane against a strike made against an adjacent rival as a free triggered action.

        <b>We Just Do It Better</b> %E2%97%86 3 Malice
        Until the end of the round, each rival rolls an additional 1d3 on all power rolls made against the target of their Rivalry trait.

        <b>Check Out Our Loot</b> %E2%97%86 5 Malice
        The rival pulls out a magic consumable and hurls it, targeting a 5 x 1 line within 1 or a 3 cube within 10. Each enemy in an affected area makes an <b>Agility test.</b>
        %E2%9C%B8	%E2%89%A411	11 damage; condition (save ends)
        %E2%98%85	12%E2%80%9316	8 damage; condition (EoT)
        %E2%9C%A6	17	5 damage
        <b>Effect</b> The rival chooses the damage type and condition afflicted from one of the following pairs: sonic and dazed, poison and weakened, or fire and frightened.

        <b>Calling the Shots</b> %E2%97%86 7 Malice
        All rivals regain 10 Stamina. Until the end of the round, when a rival uses an ability against an enemy, each rival adjacent to that enemy can make a free strike against them.

        <b>Coordinated Takedown</b> %E2%97%86 10 Malice
        Each rival moves up to their speed and uses an action or maneuver that doesn't cost Malice.
