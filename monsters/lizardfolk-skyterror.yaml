    import:
      type: mcdm
      data: |+
        Lizardfolk Skyterror	Level 1 Platoon Harrier
        Humanoid, Lizardfolk	EV 6
        <b>Stamina</b> 30
        <b>Speed</b> 7 (swim)	<b>Size</b> 1S /<b> Stability</b> 0
        <b>Free Strike</b> 3
        Might +1	Agility +2	Reason 0	Intuition 0	Presence +1
        <b>Glaive Rush</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	5 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage
        %E2%9C%B8	<b>17</b>	9 damage; prone
        <b>Effect</b> The skyterror can shift 4 after using this ability if they are flying.

        <b>Poison Blowdart</b> (Action) %E2%97%86 2d10 + 2
        <b>Keywords</b> Ranged, Weapon
        <b>Distance</b> Ranged 5	<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	3 damage; M<0 weakened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	5 damage; M<1 weakened (save ends)
        %E2%9C%B8	<b>17</b>	7 damage; M<2 weakened (save ends)
        <b>Effect</b> A creature that ends their turn adjacent to a creature or object weakened by this ability is weakened (EoT).

        <b>Glider</b>
        The skyterror adds the flying keyword to their movement until the end of their next turn whenever they move at least 2 squares along the ground or fall at least 2 squares.

        <b>Reptilian Escape</b>
        While the skyterror still has a tail, whenever the skyterror is grabbed, slowed, weakened, or knocked prone, the skyterror can lose their tail to immediately end the effect and shift 2.



