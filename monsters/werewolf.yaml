    import:
      type: mcdm
      data: |+
        Werewolf	Level 1 Solo
        Accursed, Humanoid, Werebeast	EV 30
        <b>Stamina</b> 200
        <b>Speed</b> 8	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 5
        Might +3	Agility +2	Reason -1	Intuition +1	Presence +1
        <b>Solo Monster</b>
        <b>Solo Turns</b> The werewolf takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the werewolf can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Shapeshifter</b>
        The werewolf enters combat in their hybrid humanoid form. Their shape can't change via any effects beyond their own ability.

        <b>Ferocity</b>
        The werewolf's abilities are capable of inflicting ferocity points on non-stormwight enemies. If a creature has 10 or more ferocity at the start of their turn, they spend all their ferocity and either make a free strike at the nearest creature or shift up to their speed towards the nearest creature and take a free strike. Non-stormwight creatures that take damage in this way gain 1 ferocity. All accumulated ferocity disappears after completing a respite.

        <b>Accursed Bite</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	9 damage; 2 ferocity
        %E2%98%85	<b>12%E2%80%9316</b>	13 damage; 4 ferocity
        %E2%9C%B8	<b>17</b>	16 damage; 5 ferocity
        <b>2 Malice</b> The target has <b>P<0</b> lycanthropy. The potency of this attack increases by 1 each time the werewolf forces the same target to resist it.
        <b>Effect</b> A creature afflicted with lycanthropy accumulates 2 ferocity at the end of each of their turns whenever they're in combat. Their ferocity does not disappear after completing a respite; they must complete the Find a Cure project to end this condition.

        <b>Claws</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; 1 ferocity; M<2 push 3
        %E2%9C%B8	<b>17</b>	11 damage; 3 ferocity; M<3 vertical slide 3

        <b>Berserker Slash</b> (Action) %E2%97%86 5 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self <b>	Target</b> Self
        <b>Effect</b> The werewolf shifts up to their speed and uses Claws against each creature who comes within 1 of the werewolf during the move. The werewolf makes one power roll against all targets.

        <b>Wall Leap</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The werewolf jumps 4 squares. If they end this movement at a wall, the werewolf jumps off the wall 4 squares and makes a melee free strike.

        <b>Facepalm and Head Slam</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Trigger</b> The target targets the werewolf with a melee ability after charging or moving 3 or more squares in a straight line towards them.
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature
        <b>Effect</b> The target is knocked prone and takes 5 damage before executing the ability.

        <b>Vukenstep</b>
        The werewolf ignores difficult terrain.

        <b>Howl</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 5 burst<b>	Target</b> All enemies in the burst
        <b>Effect</b> Each target makes an <b>Intuition test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	Target moves up to their speed away from the werewolf; frightened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	Frightened (EoT)
        %E2%9C%A6	<b>17</b>	no effect
        <b>Effect</b> Enemies that have 1 or more ferocity gain 4 ferocity and howl along with the werewolf.

        <b>Full Wolf </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The werewolf changes into a massive wolf, pushing adjacent creatures out of their way and moving into a square that can accommodate their new size. Until they die or the end of the encounter, their Speed is 10, their Size is 3, and their Stability is 2. Each of the werewolf's strikes deal an additional 3 damage and inflict an additional 1 ferocity. The potency of the werewolf's Accursed Bite increases by 1.

        <b>Rampage</b> (Villain Action 3) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 2 burst<b>	Target</b> All creatures in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	8 damage; 2 ferocity
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; 4 ferocity
        %E2%9C%B8	<b>17</b>	14 damage; 8 ferocity; prone
        <b>Effect</b> The werewolf shifts up to twice their speed either before or after using this ability.



