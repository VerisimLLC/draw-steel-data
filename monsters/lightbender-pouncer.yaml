    import:
      type: mcdm
      data: |+
        Lightbender Pouncer	Level 3 Elite Harrier
        Beast, Lightbender	EV 20
        <b>Stamina</b> 100
        <b>Speed</b> 10	<b>Size</b> 2 <b>Stability</b> 1
        <b>	Free Strike</b> 5
        Might +2	Agility +2	Reason -3	Intuition +1	Presence -1
        <b>Pounce</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage; A<1 prone
        %E2%9C%B8	<b>17</b>	14 damage; A<2 prone
        <b>Effect</b> The pouncer makes a free strike against each target they have knocked prone.

        <b>Sparkling Tail Whip </b>(Action) %E2%97%86 2d10 + 2
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 2 burst	<b>Target</b> All enemies and objects in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; A<1 dazzled (save ends)
        %E2%9C%B8	<b>17</b>	10 damage; A<2 dazzled (save ends)
        <b>Effect</b> A dazzled creature has a bane on strikes and can't have line of effect to targets who aren't adjacent to them.

        <b>Illusory Feint </b>(Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 cube within 10	<b>Target</b> All enemies in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	R<0 dazed (save ends)
        %E2%98%85	<b>12-16</b>	R<1 dazed (save ends)
        %E2%9C%B8	<b>17</b>	R<2 dazed (save ends)
        <b>Effect</b> 	Targets dazed by this ability have a speed of 0 while dazed. If a dazed target takes damage or if someone else spends an action to shake the creature out of their stupor, the condition ends.

        <b>Striking Afterimage</b> (Triggered Action)
        <b>Keywords</b> Magic
        <b>Trigger</b> The pouncer takes damage from a strike.
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The pouncer halves the damage, doesn't suffer any effect associated with it, and teleports 5 squares. The pouncer makes a free strike if they teleport into a space adjacent to an enemy.

        <b>Avoidance</b>
        The pouncer always treats a save ends effect as an EoT effect.

