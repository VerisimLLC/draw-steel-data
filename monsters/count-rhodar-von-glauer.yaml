    import:
      type: mcdm
      data: |+
        Count Rhodar Von Glauer	Level 10 Solo
        Undead, Vampire	EV 120
        <b>Stamina</b> 650	<b>Immunity</b> corruption 10, poison 10
        <b>Speed</b> 12 (fly, hover, teleport)	<b>Size</b> 1M /<b> Stability</b> 3
        <b>Free Strike</b> 10
        Might +3	Agility +5	Reason +2	Intuition +2	Presence +3
        <b>Solo Monster</b>
        <b>Solo Turns</b> Rhodar takes up to two turns each round. He can't take turns consecutively.
        <b>End Effect</b> At the end of his turn, Rhodar can take 20 damage to end one save ends effect affecting him. This damage can't be reduced in any way.
        <b>Spear of the Damned</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Ranged, Strike, Weapon
        <b>Distance</b> Melee 2 or Ranged 15<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	15 damage; A<4 restrained (save ends)
        %E2%98%85	12%E2%80%9316	21 damage; A<5 restrained (save ends)
        %E2%9C%B8	17	25 damage; A<6 restrained (save ends)
        <b>Effect</b> Restrained targets are impaled by a spear. Rhodar has three spears, each of which can impale a target in this way. At the start of his turn, Rhodar can summon any number of his spears back to himself, ending the effect.

        <b>Disarming Glare </b>(Action)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies in the burst
        <b>Effect </b>Each target makes an <b>Intuition test.</b>
        %E2%9C%B8	%E2%89%A411	16 corruption damage; frightened (save ends)
        %E2%98%85	12%E2%80%9316	13 corruption damage; frightened (EoT)
        %E2%9C%A6	17	8 corruption damage
        <b>Effect </b>Rhodar ignores banes on strikes and abilities made against each enemy frightened by this ability until the condition ends.

        <b>Sanguinus Flourish </b>(Action) %E2%97%86 2d10 + 5 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	%E2%89%A411	6 damage, 2 corruption damage; push 2; M<4 bleeding (save ends)
        %E2%98%85	12%E2%80%9316	6 damage, 7 corruption damage; push 5; M<5 bleeding (save ends)
        %E2%9C%B8	17	6 damage, 10 corruption damage; push 7; M<6 bleeding (save ends)
        <b>Effect </b>Rhodar shifts up to his speed before or after using this ability. He regains Stamina equal to the total corruption damage dealt.

        <b>Vengeance of Rh%C3%B6l</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> 3 burst	<b>Target</b> Special
        <b>Effect</b> The area is saturated with vengeful spirits until the end of the round. An enemy that enters an affected square or starts their turn there takes 5 corruption damage.

        <b>Reactive Rebuke </b>(Triggered Action)%E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Ranged 10<b>	Target</b> Triggering creature
        <b>Trigger </b>A creature makes a strike against Rhodar.
        <b>Effect </b>The target is<b>I<5 </b>frightened. This effect ends if the target is ever more than 10 squares from Rhodar.

        <b>Grave Ward</b>
        Rhodar has damage immunity 5. This trait is disabled until the start of the next round if he takes holy damage.

        <b>Controlled Bloodthirst</b>
        Rhodar has a speed of 15 and an edge on power rolls while a creature is bleeding within 20. Each bleeding creature within 10 of Rhodar can't be hidden from him.

        <b>Thin The Blood</b>
        Each enemy within 5 of Rhodar has -2 on saving throws.

        <b>Red Tide</b> (Villain Action 1) %E2%97%86 2d10 + 5
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 8 cube within 15<b>	Target</b> All enemies in the cube
        %E2%9C%A6	%E2%89%A411	8 corruption damage; A<4 bloodsoaked (save ends)
        %E2%98%85	12%E2%80%9316	13 corruption damage; A<5 bloodsoaked (save ends)
        %E2%9C%B8	17	16 corruption damage; A<6 bloodsoaked until the encounter ends
        <b>Effect</b> Rhodar has a double edge on abilities used against bloodsoaked creatures.

        <b>Sanguine Mist</b> (Villain Action 2)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies in the burst
        <b>Effect </b>Each target makes a <b>Presence test.</b>
        %E2%9C%B8	%E2%89%A411	16 corruption damage; bleeding until the encounter ends
        %E2%98%85	12%E2%80%9316	13 corruption damage; bleeding (save ends)
        %E2%9C%A6	17	8 corruption damage
        <b>Effect Count Rhodar teleports to an unoccupied square within the affected area, and if his Grave Ward trait is currently disabled, it re-activates.</b>

        <b>Fires of Dracul </b>(Villain Action 3) %E2%97%86 2d10 + 5
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 15 x 3 line within 1<b>	Target</b> All enemies in the line
        %E2%9C%A6	%E2%89%A411	10 fire damage; R<4 weakened (save ends)
        %E2%98%85	12%E2%80%9316	16 fire damage; R<5 weakened (save ends)
        %E2%9C%B8	17	20 fire damage; R<6 weakened (save ends)
        <b>Effect</b> Rhodar teleports to an unoccupied square adjacent to one target after the ability resolves.

