    import:
      type: mcdm
      data: |+
        Omen Dragon	Level 8 Solo
        Dragon, Elemental	EV 100
        <b>Stamina</b> 550	<b>Immunity</b> corruption 6
        <b>Speed</b> 10 (fly)	<b>Size</b> 5 /<b> Stability</b> 6
        <b>Free Strike</b> 9
        Might +3	Agility +4	Reason +2	Intuition +3	Presence +5
        <b>Solo Monster</b>
        <b>Solo Turns</b> The dragon takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the dragon can take 15 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Stagnant Wyrmscale Aura</b>
        The dragon's scales emit a 4 aura barrier of stagnancy. The affected area is considered difficult terrain for enemies, and no creature but the omen dragon can regain Stamina in the aura. Whenever a dragonsealed creature starts their turn in the dragon's aura without a Deathcount, they gain a Deathcount of 12.

        <b>Deathcount</b>
        Several of the dragon's abilities impose a Deathcount on the target. At the end of every turn, a creature with a Deathcount has their Deathcount reduce by 1 if they are within the dragon's aura. When a creature's Deathcount hits 0, they die. Multiple instances of a Deathcount don't stack; only the lowest Deathcount takes effect. Each Deathcount is lifted when the dragon is destroyed.

        <b>Corroding Breath</b> (Action) %E2%97%86 Signature
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 5 cube within 10<b>	Target</b> All enemies and objects
        <b>Effect</b> Each target makes an <b>Agility test.</b>
        %E2%9C%B8	%E2%89%A411	18 corruption damage; dragonsealed (save ends)
        %E2%98%85	12%E2%80%9316	14 corruption damage; dragonsealed (save ends)
        %E2%9C%A6	17+	9 corruption damage
        <b>Effect</b> Only creatures with souls can be dragonsealed. Until the condition ends, a dragonsealed creature appears ghastly and pale, their Presence score is considered 1 lower when resisting potencies, and they can't regard other creatures as allies.

        <b>Barbed Tail Swing</b> (Action) %E2%97%86 2d10 + 5
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 4<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	14 damage; M<3 bleeding (save ends)
        %E2%98%85	12%E2%80%9316	19 damage; M<4 bleeding (save ends)
        %E2%9C%B8	17+	23 damage M<5 bleeding (save ends)
        <b>3 Malice</b> Pull 5. The potency of this ability increases by 2.

        <b>Detonation</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst <b>	Target</b> All dragonsealed enemies in the burst
        <b>Effect</b> Each target takes 9 corruption damage, and the omen dragon regains Stamina equal to half the total damage dealt. This lifts the dragonseal on the target.

        <b>Blood! Blood! </b>(Free Maneuver)
        Once per turn, the dragon chooses 1 dragonsealed target within line of effect and imposes the bleeding condition (save ends).

        <b>Don't Turn Away</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> A creature leaves the dragon's aura
        <b>Effect</b> The dragon shifts up to their speed. The Deathcount of each dragonsealed creature that comes within 1 of the dragon during their movement is reduced by 1.

        <b>Repent!</b> (Free Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Melee 2 or Ranged 5<b>	Target</b> Triggering creature
        <b>Trigger</b> A dragonsealed creature deals damage to the dragon.
        <b>Effect</b> The dragon allows the target to choose between making a free strike against themself or gaining a Deathcount of 5.

        <b>Omen Dragon's Domain</b>
        If the encounter map is a location the dragon has occupied for 1 week or more, all healing abilities used in the area are only half as effective. Additionally, when a creature with a soul dies, the dragon absorbs the soul, granting the Director 1 Malice. The creature can't resurrect until the dragon is destroyed.

        <b>What You Deserve</b> (Villain Action 1) %E2%97%86 2d10 + 5
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	%E2%89%A411	Pull 1; Deathcount 10 (See Deathcount)
        %E2%98%85	12%E2%80%9316	Pull 2; Deathcount 8
        %E2%9C%B8	17+	Pull 3; Deathcount 6
        <b>Effect</b> Each target receives a premonition of their imminent death.

        <b>Souls of the Broken</b> (Villain Action 2) %E2%97%86 2d10 + 5
        <b>Keywords</b> Magic, Strike, Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> 5 creatures or objects
        <b>Effect </b>The dragon spits fragments of souls to possess targets, making a separate roll for each target.
        %E2%9C%A6	%E2%89%A411	P<5 frightened (save ends)
        %E2%98%85	12%E2%80%9316	P<5 moves up to their speed towards the dragon
        %E2%9C%B8	17+	P<5 makes free strike against nearest ally

        <b>So Long, and Goodnight</b> (Villain Action 3)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 6 burst <b>	Target</b> All dragonsealed creatures in the burst
        <b>Effect</b> The dragon's eyes glow with malicious intent. If a target has a Deathcount, it is reduced to 1. (See Deathcount)

