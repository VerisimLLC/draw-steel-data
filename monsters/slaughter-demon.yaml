    import:
      type: mcdm
      data: |+
        Slaughter Demon	Level 4 Elite Brute
        Abyssal, Demon, Hobgoblin	EV 24
        <b>Stamina</b> 140	<b>Immunity</b> fire 5
        <b>Speed</b> 7 (burrow)	<b>Size</b> 3 /<b> Stability</b> 3
        <b>Free Strike</b> 6
        Might +3	Agility 0	Reason -1	Intuition +1	Presence 0
        <b>Steely Skewer</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	9 damage
        %E2%98%85	<b>12%E2%80%9316</b>	14 damage; A<2 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	17 damage; A<3 bleeding and restrained (save ends)
        <b>Effect</b> A creature restrained by this attack moves along with the slaughter demon until the condition ends. The slaughter demon can have up to 6 creatures or objects restrained on their weapons.

        <b>Tail Stinger</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 3 Malice
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Melee 5	<b>Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	10 poison damage; M<1 weakened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	16 poison damage; M<2 weakened (save ends)
        %E2%9C%B8	<b>17</b>	20 poison damage; M<3 weakened (save ends)
        <b>Effect</b> A target weakened by this ability has damage weakness 3 until the condition ends.

        <b>Drag Below</b> (Maneuver)
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature or object
        <b>Effect</b> The slaughter demon makes a free strike against the target and burrows up to their speed. The target is pulled the same number of squares the slaughter demon burrows into, including vertically.

        <b>Devour Soul</b> (Triggered Action)
        <b>Keywords</b> Magic
        <b>Trigger</b> A creature with a soul dies.
        <b>Distance</b> 5 burst	<b>Target</b> Triggering creature
        <b>Effect</b> The target can't be brought back to life. The slaughter demon gains an edge on all power rolls for the rest of the encounter.

        <b>Tunneler</b>
        When the slaughter demon burrows, they create a size 2 tunnel. The tunnel remains stable for one day, then collapses.

        <b>Soulsight</b>
        Each creature within 2 of the slaughter demon can't be hidden from them.

        <b>Lethe</b>
        While winded, the slaughter demon has an edge on strikes, and strikes have an edge against them.



