    import:
      type: mcdm
      data: |
        Demon Chorogaunt    Level 3 Leader
        Abyssal, Demon    EV 20
        <b>Stamina</b> 120    <b>Weakness</b> Holy 5
        <b>Speed</b> 5    <b>Size</b> 1L/ <b>Stability</b> 2
            <b>Free Strike</b> 5
        Might +2    Agility +2    Reason +2    Intuition +2    Presence +2
        <b>Agonizing Harmony</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 5 burst    <b>Target</b> Each enemy in the burst
        %E2%9C%A6    %E2%89%A411    4 psychic damage; I<1 slowed (save ends)
        %E2%98%85    12%E2%80%9316    7 psychic damage; I<2 slowed (save ends)
        %E2%9C%B8    17+    10 psychic damage; I<3 slowed (save ends)
        <b>Effect</b> An ally within 10 squares of the chorogaunt can shift up to their speed.

        <b>Chaotic Entrancing Harmony</b> (Maneuver)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst    <b>Target</b> Each enemy in the burst
        <b>Effect </b>Each target slides 3, ignoring their stability.

        <b>I Thrive on Pain</b> (Triggered Action) %E2%97%86 3 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Self    <b>Target</b> Self
        <b>Trigger </b>The chorogaunt is targeted by a strike.
        <b>Effect </b>Any damage from the attack is halved, and the chorogaunt deals an additional 3 damage with their abilities until the end of their next turn.

        <b>End Effect </b>
        At the end of their turn, the chorogaunt can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Lethe</b>
        While winded, the chorogaunt has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the chorogaunt can't be hidden from them.

        <b>Frightening Tones</b> (Villain Action 1)
        <b>Keywords</b> Ranged
        <b>Distance</b> Ranged 10    <b>Target</b> Three enemies
        <b>Effect </b>The chorogaunt allows each target to choose between taking 5 psychic damage or being frightened (save ends).

        <b>Bully the Weak</b> (Villain Action 2)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10    <b>Target</b> One ally
        <b>Effect </b>The chorogaunt kills the target, and each other ally deals an additional 3 damage on attacks until the end of the round. The Director gains malice equal to the number of heroes.

        <b>Running Cacophony</b> (Villain Action 3)
        <b>Keywords</b> Magic
        <b>Distance</b> Self    <b>Target</b> Self
        <b>Effect </b>The chorogaunt shifts up to their speed, uses their Agonizing Harmony, shifts up to their speed, and then uses their Agonizing Harmony again.

        Demons - 2nd Echelon
        As demons consume more souls, and their mercurial forms shift into more powerful ones, they also begin to develop more distinct personalities, desires, and intelligence based on the souls consumed. It's now that demons begin to develop a particular taste for types of souls which, should they survive long enough, will eventually define them.
        Higher Categories of Demons
        The following demons have been identified across categories 4-6:
        <b>Grulqin's</b> consist of a bulbous head two powerful arms and circular bone saw blade that runs down the middle of its head.
        <b>Orliq</b> are made of shifting bone plates surrounding a swirling core of corruptive energy.
        The <b>wobalas </b>prefers to kill from afar while protected by allies, firing physic arrows from bows made from their very flesh and sinew.
        <b>Bale Eyes</b>, sometimes called a Flesh Moon, are colossal floating orbs of roiling, dripping flesh. A weeping seam opens to reveal a demonic eye whose gaze melts flesh from bone.
        <b>Fangling </b>bodies are overgrown with teeth, fangs, and tusks from a thousand different creatures. Deadly to take on in close quarters, they've been known to get caught on one another.
        <b>Gunge</b> demons are horrifically distended with maws that could swallow a horse whole. It vomits up bilious slime that traps and dissolves any unlucky enough to get caught in it.
        <b>Niktin</b> are cunning hunters that disguise themselves as mundane objects that leave an oily foul smelling red residue wherever they are left. Their natural form is a humanoid made of red oil.
        <b>Tourmenauk's</b> resemble a hulking ape with a dozen or more extra mouths distributed around their body. Though their brute force is formidable enough, this demon also inflicts raw psychic pain by screaming from their mouths in different voices-often using the agonized voices of souls the tormenauk has devoured.
        <b>The Lumbering Egress</b> is a walking mass of warped flesh around a giant whirling portal to the demonic realms. Lesser demons pour out at alarming rates making these creatures devastating siege engines.
