      data: |+
        Granite Stone Giant	Level 8 Elite Defender
        Giant, Stone Giant	EV 40
        <b>Stamina</b> 247
        <b>Speed</b> 7 (burrow)	<b>Size</b> 4 /<b> Stability</b> 10
        <b>Free Strike</b> 8
        Might +4	Agility +1	Reason +1	Intuition +2	Presence +1
        <b>Jagged Stoneclub</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	12 damage
        %E2%98%85	<b>12%E2%80%9316</b>	17 damage; R<3 weakened (save ends)
        %E2%9C%B8	<b>17</b>	21 damage; R<4 weakened (save ends)
        <b>Effect</b> This attack inflicts bleeding (save ends) if the target is already weakened.

        <b>Crag Burst</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 3 Malice
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 2 burst<b>	Target</b> All enemies and objects in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	6 damage; push 2
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage; push 4
        %E2%9C%B8	<b>17</b>	14 damage; vertical push 4
        <b>Effect</b> The affected area becomes difficult terrain. A creature takes 3 damage whenever they enter an affected square.

        <b>Castle Stone Shape</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The granite stone giant moves up to their speed and creates a 14 wall of stone. Each segment must include one of the squares the granite stone giant touched.

        <b>Pillar</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature or object
        <b>Trigger</b> The target moves or shifts away from the granite stone giant.
        <b>Effect</b> A 1 square wide pillar of stone juts 5 squares out of the ground beneath the target, raising them and then vertically pushing them 5. The forced movement is entirely straight up.

        <b>Stone Steps</b>
        The granite stone giant ignores difficult terrain.

        <b>Stonebreaker Flesh</b>
        Whenever an enemy gets a tier 1 result on a melee strike against the granite stone giant, they have a bane on all subsequent uses of that ability until the end of the encounter.



