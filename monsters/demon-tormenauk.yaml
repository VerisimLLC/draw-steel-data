      data: |+
        Demon Tormenauk	Level 6 Horde Brute
        Abyssal, Demon	EV 8
        <b>Stamina</b> 45	<b>Weakness</b> Holy 5
        <b>Speed</b> 6	<b>Size</b> 1M / <b>Stability</b> 2
        <b>	Free Strike</b> 4
        Might +3	Agility 0	Reason 2	Intuition +1	Presence +2
        <b>Many Maws</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1 <b>	Target</b> One creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage
        %E2%98%85	<b>12-16</b>	9 damage
        %E2%9C%B8	<b>17</b>	11 damage; grabbed, target has a bane on escaping the grab
        <b>Effect</b> While the target is grabbed by this ability, they take 4 psychic damage at the start of each of the tormenauk's turns.

        <b>Agony Wail</b> (Maneuver) %E2%97%86 2d10 + 3 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 3 burst<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	4 psychic damage; I<1 dazed (save ends)
        %E2%98%85	<b>12-16</b>	6 psychic damage; I<2 dazed (save ends)
        %E2%9C%B8	<b>17</b>	8 psychic damage; I<3 dazed (save ends)
        <b>Effect</b> The potency increases by 1 if the target is grabbed by the tormenauk.

        <b>Lethe</b>
        While winded, the tormenauk has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the tormenauk can't be hidden from them.



