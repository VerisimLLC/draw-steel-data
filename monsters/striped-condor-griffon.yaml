        <b>Bound Ahead</b> (Action)%E2%97%86 5 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self (while grounded)	<b>Target</b> Self
        <b>Effect</b> The griffon shifts up to their speed in a straight line. Each enemy who comes within 1 of the griffon during the move can choose to either take 5 damage or be knocked prone.

