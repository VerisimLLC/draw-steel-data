      data: |+
        Soulraker Handmaiden    Level 8 Horde Ambusher
        Abyssal, Demon, Soulraker    EV 10
        <b>Stamina</b> 50    <b>Weakness</b> Holy 5
        <b>Speed</b> 1    <b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 4
        Might +3    Agility +0    Reason +2    Intuition +2    Presence +4

        <b>Emergent Horrors </b>(Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>Target</b> One creature or object
        %E2%9C%B8    <b>%E2%89%A411</b>    8 corruption damage
        %E2%98%85    <b>12-16</b>    11 corruption damage
        %E2%9C%A6    <b>17</b>    13 corruption damage; M<4 frightened (save ends)
        <b>Effect</b> This ability deals an additional 8 damage if the handmaiden was concealed.

        <b>Conceal Parasite</b> (Maneuver) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self    <b>Target</b> Self
        <b>Effect</b> The handmaiden can withdraw into their host, concealing them and making them impossible to detect without supernatural aid.

        <b>Implanted Parasite</b>
        A victim implanted with a handmaiden is unaware of their presence. The handmaiden cannot use any of their abilities until they emerge. After a 3-4 weeks they fully bond with the victim and emerge as a horrifying stalk of flesh and bone. An emerged handmaiden uses their victim's speed to move on their turn and has access to their victim's signature abilities. The handmaiden must be killed before they can be excised. Creatures implanted with a handmaiden parasite must complete the Find a Cure project to end this effect.
        Soulraker Praetorian    Level 7 Horde Harrier
        Abyssal, Demon, Soulraker    EV 9
        <b>Stamina</b> 45    <b>Weakness</b> Holy 5
        <b>Speed</b> 8    <b>Size</b> 1L / <b>Stability</b> 0
        <b>    Free Strike</b> 3
        Might +2    Agility +4    Reason 0    Intuition +2    Presence 0
        <b>Barbed Stinger </b>(Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>    Target</b> 1 creature or object
        %E2%9C%A6    <b>%E2%89%A411</b>    7 poison damage; push 2
        %E2%98%85    <b>12-16</b>    10 poison damage; push 2
        %E2%9C%B8    <b>17</b>    11 poison damage; push 4; A<4 grabbed
        <b>Effect</b> The praetorian shifts into each square the target leaves.

        <b>Stinging Departure</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>    Target</b> Triggering creature
        <b>Trigger </b>A creature ends the praetorian's grab.
        <b>Effect</b> The praetorian makes a free strike on the target, breaking off their stinger in their victim, and shifts up to half their speed. The target is bleeding until they remove the stinger as a free action, taking 6 damage in the process.

        <b>Praetorian Buzzing</b>
        A creature who starts their turn with 2 or more praetorians adjacent to them takes 6 sonic damage.

        <b>Lethe</b>
        While winded, the praetorian has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the praetorian can't be hidden from them.



