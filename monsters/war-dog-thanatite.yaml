      data: |+
        War Dog Thanatite	Level 6 Horde Controller
        Humanoid, War Dog	EV 8
        <b>Stamina</b> 35
        <b>Speed</b> 5	<b>Size</b> 1M /<b>Stability</b> 0
        <b>Free Strike</b> 3
        Might +1	Agility +1	Reason +2	Intuition +3	Presence +1
        <b>Snaking Entrails</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10<b>Target</b> 1 ally
        <b>Effect</b> The target dies. The thanatite makes one power roll against each enemy within 2 of the target:
        %E2%9C%A6	<b>%E2%89%A411</b>	3 corruption damage; A<1 slowed (save ends)
        %E2%98%85	<b>12-16</b>	5 corruption damage; A<2 slowed (save ends)
        %E2%9C%B8	<b>17</b>	7 corruption damage; A<3 restrained (save ends)
        <b>3 Malice</b> If an affected enemy is adjacent to a corpse, they are frightened of the thanatite (save ends).

        <b>Wall of Flesh</b> (Maneuver)
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 10 wall within 10<b>Target</b> One corpse
        <b>Effect</b> The target is molded into a wall of blood and bone. The wall must share at least one square with the target. Each enemy within the affected area vertical slides 2 and is knocked prone. Each square of wall has 3 Stamina.

        <b>Loyalty Collar</b>
        When the thanatite dies, they explode, dealing 2d6 damage to each adjacent enemy.

