    import:
      type: mcdm
      data: |+
        Xorannox the Tyract	Level 6 Solo
        Horror, Overmind	EV 80
        <b>Stamina</b> 450
        <b>Speed</b> 5 (fly, hover)	<b>Size</b> 3 /<b> Stability</b> 2
        <b>Free Strike</b> 7
        Might +4	Agility +2	Reason +4	Intuition +3	Presence +3
        <b>Solo Monster</b>
        <b>Solo Turns</b> Xorannox takes up to two turns each round. He can't take turns consecutively.
        <b>End Effect</b> At the end of his turn, Xorannox can take 10 damage to end one save ends effect affecting him. This damage can't be reduced in any way.

        <b>Eyes of the Tyract</b>
        Six unique eyestalks float around Xorannox and act on his turn at his command. On each of Xorannox's turns, he directs one eyestalk to move and use a signature action. When an eyestalk is destroyed, Xorannox can't use that eyestalk's ability.

        <b>Toothful Thrashing</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	12 damage; slide 2; M<2 bleeding (EoT)
        %E2%98%85	<b>12-16</b>	20 damage; slide 3; M<3 bleeding (EoT)
        %E2%9C%B8	<b>17</b>	23 damage; vertical slide 3; M<4 bleeding (EoT)

        <b>Grav Spike</b> (Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Psionic, Ranged
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        %E2%9C%A6	<b>%E2%89%A411</b>	Vertical push 3
        %E2%98%85	<b>12-16</b>	Vertical push 5
        %E2%9C%B8	<b>17</b>	Vertical push 7
        <b>Effect</b> Xorannox shifts up to his speed before or after using this ability.

        <b>Optical Collusion</b> (Maneuver)
        <b>Keywords</b> Area, Melee
        <b>Distance</b> Self <b>	Target</b> Self
        <b>Effect</b> Xorannox commands all eyestalks to move up to their speed.

        <b>Shutout</b> (Maneuver) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> 5 x 2 line within 1<b>	Target</b> Special
        <b>Effect</b> Xorannox ends all ongoing supernatural effects and suppresses supernatural effects from equipment in the affected area. New supernatural effects cannot activate in the affected area until the end of Xorannox's next turn.

        <b>Cower!</b> (Triggered Action)
        <b>Keywords</b> Psionic, Ranged
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Trigger</b> A creature deals damage to Xorannox.
        <b>Effect</b> The triggering creature is <b>I<3</b> frightened (save ends).

        <b>Above It All</b>
        Xorannox can't be flanked, frightened, or knocked prone.

        <b>Natural Enemies</b>
        If Xorannox perceives another overmind or voiceless talker on the battlefield, he targets that threat at least once every turn.

        <b>Disruption Beam</b> (Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Psionic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> Three creatures
        %E2%9C%A6	<b>%E2%89%A411</b>	11 psychic damage; R<2 dazed (save ends)
        %E2%98%85	<b>12-16</b>	17 psychic damage; R<3 dazed (save ends)
        %E2%9C%B8	<b>17</b>	20 psychic damage; R<4 dazed (save ends)

        <b>All Eyes, All Rise </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> Xorannox reforms all destroyed eyestalks and raises them at full Stamina.

        <b>Panoptibeam </b>(Villain Action 3)
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 2 burst<b>	Target</b> All enemies in the burst
        <b>Effect</b> Xorannox directs each remaining eyestalk to use a signature action, targeting each creature in the area.



