        %E2%9C%B8	17+	13 damage
        <b>Effect</b> An ally within 10 of the monarch can make a free strike.

        <b>Get in Here!</b> (Maneuver) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 20	<b>Target</b> Special
        <b>Effect</b> Two <b>goblin runners</b> appear in unoccupied spaces.

        <b>Meat Shield</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 1	<b>Target</b> One ally
        <b>Trigger</b> A creature targets the monarch with a strike.
        <b>Effect</b> The ally becomes the target of the triggering strike instead.

        <b>End Effect</b>
        At the end of their turn, the monarch can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Crafty</b>
        The monarch doesn't provoke opportunity attacks by moving.

        <b>What Are You Waiting For?</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst	<b>Target</b> Each ally
        <b>Effect</b> Each target can move up to their speed or make a free strike.

        <b>Focus Fire</b> (Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10	<b>Target</b> One enemy or object
        <b>Effect</b> Each ally within 10 squares of the target can move up to their speed toward the target.

        <b>Kill!</b> (Villain Action 3)
        <b>Keywords</b> -
        <b>Distance</b> Special	<b>Target</b> Special
        <b>Effect</b> Each enemy in the encounter takes 2 damage for each goblin adjacent to them.


