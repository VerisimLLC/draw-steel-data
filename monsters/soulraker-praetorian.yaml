        A creature who starts their turn with 2 or more praetorians adjacent to them takes 6 sonic damage.

        <b>Lethe</b>
        While winded, the praetorian has an edge on strikes, and strikes have an edge against them.

        <b>Soulsight</b>
        Each creature within 2 of the praetorian can't be hidden from them.



