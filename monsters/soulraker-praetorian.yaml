        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Triggering creature
        <b>Trigger </b>A creature ends the praetorian's grab.
        <b>Effect</b> The praetorian makes a free strike on the target, breaking off their stinger in their victim, and shifts up to half their speed. The target is bleeding until they remove the stinger as a free action, taking 6 damage in the process.

