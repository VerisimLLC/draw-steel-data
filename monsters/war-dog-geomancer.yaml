    import:
      type: mcdm
      data: |+
        War Dog Geomancer    Level 8 Horde Controller
        Humanoid, War Dog    EV 10
        <b>Stamina</b> 45
        <b>Speed</b> 5 (burrow)    <b>Size</b> 1M /<b> Stability</b> 3
        <b>Free Strike</b> 3
        Might +2    Agility +1    Reason +4    Intuition +4    Presence +2
        <b>Earthwave</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 7 x 2 line within 10<b>    Target</b> All creatures
        %E2%9C%A6    <b>%E2%89%A411</b>    3 damage; M<2 push (see effect); M<2 push (see effect)
        %E2%98%85    <b>12-16</b>    6 damage; M<3 push (see effect)
        %E2%9C%B8    <b>17</b>    8 damage; M<4 push (see effect) and prone
        <b>Effect </b>This ability ignores stability. The geomancer declares a direction for the Earthwave. A creature pushed by this ability is pushed to toward the squares at the end of the area in the chosen direction.
        <b>2 Malice</b> A two square deep trench is dug into the affected area.

        <b>Siegeworks</b> (Maneuver)
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 5 wall within 10<b>    Target</b> Special
        <b>Effect</b> The geomancer raises walls of stone with portholes within distance. Creatures have line of effect through a wall while adjacent to it.

        <b>Dust Cloud</b>
        The geomancer is surrounded by a 2 aura of swirling dust and earthen debris. The geomancer and all allies in the affected area are concealed.

        <b>Loyalty Collar</b>
        When the geomancer dies, they explode, dealing 3d6 damage to each adjacent enemy.
        War Dog Iron Priest    Level 8 Horde Support
        Humanoid, War Dog    EV 10
        <b>Stamina</b> 50
        <b>Speed</b> 5    <b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 3
        Might +2    Agility +1    Reason +1    Intuition +4    Presence +4
        <b>Houndcannon</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 7 x 1 line within 1<b>    Target</b> All enemies
        %E2%9C%A6    <b>%E2%89%A411</b>    3 damage
        %E2%98%85    <b>12-16</b>    6 damage; P<3 bleeding (save ends)
        %E2%9C%B8    <b>17</b>    8 damage; P<4 lose 1 recovery, bleeding (save ends)
        <b>Effect</b> Allies within 2 of the iron priest have an edge on their next strike. If 1 or more recoveries were lost due to this ability, affected allies have double edge instead.

        <b>Iron Banner</b> (Maneuver)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 4 aura<b>    Target</b> All War Dogs
        <b>Effect</b> Until the start of the iron priest's next turn, all targets gain one of the following effects, chosen by the Director:
        %E2%9C%A6     The target has damage immunity 2.
        %E2%9C%A6     The target's strikes deal an additional 3 holy damage.
        %E2%9C%A6     The target's speed increases by 3.
        <b>3 Malice</b> The Director chooses two effects instead of one.

        <b>Chosen of the Iron Saint</b>
        The Director gains 1 malice whenever an ally within 3 of the iron priest gets a tier-3 result on a power roll.

