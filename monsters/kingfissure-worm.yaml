    import:
      type: mcdm
      data: |+
        Kingfissure Worm	Level 7 Solo
        Beast, Worm	EV 90
        <b>Stamina</b> 420
        <b>Speed</b> 10 (burrow)	<b>Size</b> 5 /<b> Stability</b> 5
        <b>Free Strike</b> 8
        Might +5	Agility +1	Reason -5	Intuition +2	Presence -3
        <b>Solo Monster</b>
        <b>Solo Turns</b> The kingfissure worm takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the kingfissure worm can take 15 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Multiple Tongues</b>
        The kingfissure worm has three tongues. A tongue is a 5 x 1 line within 1 of the kingfissure worm, has 35 Stamina, psychic immunity all, and can't be force moved. Each tongue enables the kingfissure worm to grab one Size-3 or smaller creature or object, and can only be targeted by strikes and abilities while it's grabbing a target.

        <b>Tongue Grab</b> (Action) %E2%97%86 2d10 + 5 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 5<b>	Target</b> One creature or object per tongue
        %E2%9C%A6	%E2%89%A411	13 damage; M<3 grabbed
        %E2%98%85	12%E2%80%9316	18 damage; M<4 grabbed
        %E2%9C%B8	17	22 damage; M<5 grabbed, target has a bane on escaping the grab
        <b>Special</b> The kingfissure worm requires one or more tongues to use this ability.
        <b>Effect</b> The kingfissure worm may pull up to 2 grabbed creatures adjacent to them using their maneuver.

        <b>Maw</b> (Action) %E2%97%86 2d10 + 5
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance </b>Melee 1<b>	Target</b> One creature or object
        %E2%9C%A6	%E2%89%A411	15 damage; push 3
        %E2%98%85	12%E2%80%9316	20 damage; push 5; prone
        %E2%9C%B8	17	25 damage; swallowed (see Swallowed)
        <b>2 Malice </b>While charging, the kingfissure worm ignores difficult terrain and can move through enemies and objects at normal speed. A creature takes 8 damage and is pushed 3 the first time the kingfissure worms passes through their space on a turn.

        <b>Swallow</b> (Action) %E2%97%86 2 Malice
        <b>Keywords</b> %E2%80%93
        <b>Distance</b> Melee 1 <b>	Target</b> One grabbed creature
        <b>Effect</b> The target becomes swallowed (see Swallowed).

        <b>Tongue Whip</b> (Maneuver)
        <b>Keywords</b> Melee, Ranged, Strike, Weapon
        <b>Distance</b> Melee 5 or Ranged 10 (while grabbing a creature or object)<b>	Target</b> One creature or object
        <b>Effect</b> The kingfissure worm slams what they're grabbing against the target, dealing 13 damage to both. The kingfissure worm deals an additional 5 damage if they use the ranged distance and they release the grabbed creature or object.

        <b>Tearing Recoil</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Special
        <b>Trigger</b> A tongue takes damage that does not immediately destroy it.
        <b>Effect</b> The kingfissure worm pulls the damaged tongue back into their mouth, releasing and dealing 5 damage to whatever the tongue had grabbed.

        <b>Titanic Tunneler</b>
        The kingfissure worm can burrow through solid rock at half their burrowing speed and leaves a stable, size 3 tunnel in their wake.

        <b>Seismic King</b>
        The kingfissure worm can't establish line of effect beyond 3 squares, but ignores concealment and doesn't need line of effect to target creatures touching the ground with strikes and abilities.

        <b>Swallowed</b>
        A swallowed creature is restrained. At the start of each turn of combat, the swallowed creature takes 1d6 acid damage. If the kingfissure worm takes 25 or more damage in a single round from swallowed creatures, they immediately regurgitate all swallowed creatures, who land prone in an unoccupied square within 3 of the kingfissure worm.

        <b>Unstoppable Crawler</b>
        The kingfissure worm can't be frightened or knocked prone. While the kingfissure worm is restrained or slowed, their speed is reduced by 2 instead of suffering the condition's normal effects.

        <b>King's Fissure</b> (Villain Action 1)
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 20 x 4 line within 1<b>Target</b> All grounded creatures and objects in the line
        <b>Effect</b> The affected area becomes a 10 square deep fissure in the earth. Each target makes an <b>Agility test.</b>
        %E2%9C%B8	%E2%89%A411	10 damage; target falls; prone can't stand (EoT)
        %E2%98%85	12%E2%80%9316	10 damage; target is prone hanging on the edge
        %E2%9C%A6	17	The target shifts to the nearest unoccupied square outside the area

        <b>Earth Breach </b>(Villain Action 2)
        <b>Keywords</b> Weapon
        <b>Distance</b> Self (while burrowing)<b>	Target</b> All creatures and objects
        <b>Effect</b> The worm burrows up to half their speed, then breaches the surface and moves five squares straight up into the air before diving back into the ground. Each target that the worm passes through during this movement takes 10 damage and is <b>A<4 </b>knocked prone. Any creature that is winded after taking this damage is swallowed (see Swallowed).

