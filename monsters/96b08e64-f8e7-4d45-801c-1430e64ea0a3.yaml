    traitNames: []
    import:
      type: mcdm
      data: |+
        Thorn Dragon	Level 2 Solo
        Dragon, Elemental	EV 40
        <b>Stamina</b> 250	<b>Immunity</b> poison 5
        <b>Speed</b> 8 (fly)	<b>Size</b> 3 /<b> Stability</b> 6
        <b>Free Strike</b> 5
        Might +2	Agility +3	Reason -1	Intuition +1	Presence +2
        <b>Solo Monster</b>
        <b>Solo Turns</b> The dragon takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the dragon can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Withering Wyrmscale Aura</b>
        The dragon's scales emit a 2 aura barrier of withering green magic. When a creature in the affected area regains Stamina, they only regain half the Stamina. A winded creature who enters an affected square or starts their turn there takes 1d6 poison damage.

        <b>Virulent Breath</b> (Action) %E2%97%86 Signature
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 10 x 1 line within 1<b>	Target</b> All enemies
        <b>Effect </b>Each target makes a <b>Might test</b>.
        %E2%9C%B8	%E2%89%A411	12 poison damage; dragonsealed (save ends)
        %E2%98%85	12%E2%80%9316	9 poison damage; dragonsealed (save ends)
        %E2%9C%A6	17	5 poison damage
        <b>Effect</b> Until the condition ends, a creature dragonsealed by the dragon has their wounds overtaken by nettles and thorns, and they take an additional die of damage from conditions that deal damage, the dragon's Wyrmscale Aura, and the dragon's Malign Thicket Villain Action.

        <b>Spinous Tail Swing</b> (Action) %E2%97%86 2d10 + 3
        <b>Keywords</b> Charge, Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> Two enemies or objects
        %E2%9C%A6	%E2%89%A411	8 damage; push 2
        %E2%98%85	12%E2%80%9316	12 damage; push 4
        %E2%9C%B8	17	15 damage; push 8
        <b>3 Malice</b> Each target is <b>A<2</b> bleeding (save ends).

        <b>Investiture of Verdure</b> (Maneuver) %E2%97%86 5 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst <b>	Target</b> All dragonsealed enemies
        <b>Effect</b> Each target is pulled 5 toward the dragon. For each creature pulled, the dragon gains 5 temporary Stamina.

        <b>Provoking Nettles </b>(Free Maneuver)
        Once per turn, the dragon shifts 5 and can move through enemies at normal speed. The first time the dragon passes through a creature's space during this movement, the creature takes 3 damage.

        <b>Prickly Situation</b> (Triggered Action)
        <b>Keywords</b> Magic
        <b>Distance</b> 10<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature successfully saves to end their dragonsealed condition.
        <b>Effect</b> The target is pulled 5 toward the dragon and is restrained (EoT).

        <b>Thorny Scales</b> (Free Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature deals damage to the dragon with a melee strike.
        <b>Effect</b> The dragon makes a free strike against the target. The target is <b>M<2</b> bleeding (EoT).

        <b>Thorn Dragon's Domain</b>
        If the encounter map is a location the dragon has occupied for 1 week or more, each space on the map is considered difficult terrain for all creatures except for the dragon. Each such creature who moves within the area takes 1 damage for each square they enter. A creature restrained in this area is also bleeding.

        <b>Briar Bindings</b> (Villain Action 1) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 4 burst<b>	Target</b> All enemies
        %E2%9C%A6	%E2%89%A411	5 damage; A<1 restrained (save ends)
        %E2%98%85	12%E2%80%9316	9 damage; A<2 restrained (save ends)
        %E2%9C%B8	17	12 damage; A<3 restrained (save ends)

        <b>Thorned Armor </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The dragon grows longer, sharper thorns upon their scales. A creature who targets the dragon with a melee strike takes 3 damage.

        <b>Malign Thicket</b> (Villain Action 3)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The dragon's domain becomes imbued with deadly poison. A creature who takes damage from the dragon's domain or from striking the dragon takes an additional 1d6 poison damage.

