      data: |+
        Human Bandit Chief	Level 3 Leader
        Human, Humanoid	EV 20
        <b>Stamina</b> 120	<b>Immunity</b> Corruption 4, Psychic 4
        <b>Speed</b> 5	<b>Size</b> 1M / <b>Stability</b> 2
        	<b>Free Strike</b> 5
        Might +2	Agility +3	Reason +2	Intuition +3	Presence +2
        <b>Whip & Magic Longsword</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Magic, Melee, Strike, Weapon
        <b>Distance</b> Melee 3	<b>Target</b> Two enemies or objects
        %E2%9C%A6	%E2%89%A411	8 damage; pull 1
        %E2%98%85	12%E2%80%9316	12 damage; pull 2
        %E2%9C%B8	17+	15 damage; pull 3
        <b>Effect </b>A target who is adjacent to the bandit chief after the ability resolves takes 5 corruption damage.
        <b>2 Malice </b>The bandit chief targets an additional enemy or object.

        <b>Kneel, Peasant!</b> (Maneuver) %E2%97%86 2d10 + 3
        <b>Keywords</b> Melee, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> One enemy or object
        %E2%9C%A6	%E2%89%A411	Push 1; M<1 prone
        %E2%98%85	12%E2%80%9316	Push 2; M<2 prone
        %E2%9C%B8	17+	Push 4; M<3 prone
        <b>2 Malice</b> This ability targets each enemy adjacent to the bandit chief.

        <b>Bloodstones</b> (Triggered Action)
        <b>Keywords </b>Magic
        <b>	Distance </b>Self	<b>Target </b>Self
        <b>	Trigger </b>The bandit chief makes a power roll.
        <b>Effect </b>The bandit chief takes 9 corruption damage and increases the result of the power roll by one tier.

        <b>End Effect </b>
        At the end of their turn, the bandit chief can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Supernatural Insight</b>
        The bandit chief ignores concealment if it's granted by a supernatural effect, or the target is supernatural.

        <b>Shoot!</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst	<b>Target</b> All allies in the burst
        <b>Effect </b>Each target makes a ranged free strike.

        <b>Form Up!</b> (Villain Action 2)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst	<b>Target</b> All allies in the burst
        <b>Effect </b>Each target shifts up to their speed. Until the end of the encounter, the bandit chief and all allies have damage immunity 2 while adjacent to a target.

        <b>Lead From the Front</b> (Villain Action 3)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect </b>Shift 10. During or after this movement, the bandit chief can use their Whip & Magic Longsword against up to four targets. Each ally adjacent to a target can make a free strike against them.

