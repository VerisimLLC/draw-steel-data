        Elemental EV 3 for two minions
        1M 6 6 0 5
        Size Speed Stamina Stability Free Strike
        Immunity: Sonic 2, fire 2 Weakness: -
        Movement: Fly With Captain:
        M ight -2 A gility -2 R eason 0 I ntuition 0 P resence +1
        t Soot Strike
        The crux's melee free strikes automatically hide each
        ally from the target until the start of the crux's next turn, the target
        uses a maneuver to clear the soot, the crux takes damage, or the
        crux is destroyed.
        t Ashen Cloud 1 Essence
        When the crux is reduced to 0 Stamina, the area within 1 square of
        the crux is clouded by ash until it is dispersed by wind. You and any
        ally are concealed while occupying an affected square. An enemy
        can't establish line of effect beyond the ash while occupying an
        affected square.
