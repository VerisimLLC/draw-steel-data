      type: mcdm
      data: |+
        Scyza	Level 1 Mount
        Animal, Orc	EV 28
        <b>Stamina</b> 60
        <b>Speed</b> 6	<b>Size</b> 4 /<b> Stability</b> 3
        <b>Free Strike</b> 4
        Might +4	Agility -1	Reason -4	Intuition 0	Presence -1
        <b>Clawed Kick</b> (Action) %E2%97%86 2d10+4 %E2%97%86 Signature
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Reach 2<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; prone
        %E2%9C%B8	<b>17</b>	10 damage; prone
        <b>Effect</b> The scyza roars and the target is frightened (EoT)

        <b>Whiptail</b> (Action) %E2%97%86 2d10+4
        <b>Keywords</b> Attack, Melee, Weapon
        <b>Distance</b> Reach 3<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	3 damage
        %E2%98%85	<b>12%E2%80%9316</b>	6 damage; bleeding (EoT)
        %E2%9C%B8	<b>17</b>	9 damage; bleeding (MGT ends)
        <b>Effect</b> This attack deals an extra 3 damage to a target on top of the scyza and knocks the target prone into an unoccupied adjacent square.

        <b>Crestfall</b> (Action) %E2%97%86 2d10+4 %E2%97%86 2 VP
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 3 Cube within 2<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	4 damage; 1 sonic damage; dazed (EoT)
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; 3 sonic damage; prone
        %E2%9C%B8	<b>17</b>	10 damage; 5 sonic damage; prone can't stand (EoT)

        <b>Sandstorm</b> (Maneuver) %E2%97%86 <b>INU RR</b> %E2%97%86 3 VP
        <b>Keywords</b> Resistance, Maneuver
        <b>Distance</b> 3 Burst<b>	Target</b> All enemies
        %E2%9C%B8	<b>%E2%89%A411</b>	10 damage; prone; slowed (EoT)
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage; slowed (EoT)
        %E2%9C%A6	<b>17</b>	4 damage
        <b>Effect</b> The scyza kicks up a sandstorm concealing all allies in the affected area until the end of the scyza's next turn.

        <b>War Harness</b>
        Three of the scyza's size 1 allies can occupy the same space while riding the scyza.

        <b>Terrible</b>
        The scyza deals double damage to objects.


