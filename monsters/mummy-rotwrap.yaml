      data: |+
        Mummy Rotwrap	Level 7 Minion Brute
        Mummy, Undead	EV 9 for four minions
        <b>Stamina</b> 15	<b>Immunity</b> corruption 7, poison 7 / <b>Weakness</b> fire 5
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 1
        <b>With Captain</b> Melee distance +3	<b>Free Strike</b> 4
        Might +4	Agility -2	Reason -2	Intuition +1	Presence -2
        <b>Fetid Wrappings</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> One creature or object per minion
        %E2%9C%A6	%E2%89%A411	4 damage
        %E2%98%85	12%E2%80%9316	7 damage; pull 1
        %E2%9C%B8	17	8 damage; pull 3
        <b>Effect</b> Each ally has an edge on strikes made against the target until the end of the round.


        Vampires and Sunlight
        In some stories, vampires prefer to take action in the dark of night as direct sunlight sears their skin. Learning about the vampire's weaknesses before delving into their domain can also make for a great adventure or downtime project. If you would like to explore sunlight rules with vampires, give them the following traits.
        <b>Creature of the Night</b>
        The vampire regains 1/4th of their Stamina if they start their turn in concealment granted by darkness.

        <b>Curse of Day</b>
        If the vampire is exposed to direct sunlight, they have damage weakness 5 and lose their Creature of the Night trait until they start their turn in concealment granted by darkness.

