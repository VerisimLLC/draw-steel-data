        %E2%9C%B8	<b>17</b>	21 damage; prone
        <b>Effect</b> This ability deals an additional 12 damage against already prone targets.

        <b>Stomp</b> (Action)%E2%97%86 2d10 + 4%E2%97%86 3 Malice
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	14 damage; prone
        %E2%98%85	<b>12%E2%80%9316</b>	20 damage; prone M<3 and can't stand (save ends)
        %E2%9C%B8	<b>17</b>	25 damage; prone M<4 and can't stand (save ends)
        <b>Effect</b> The target becomes entrenched in a 2 square deep hole in the ground.

        <b>Hill Quake</b> (Maneuver)
        <b>Keywords</b> Area, Melee
        <b>Distance</b> 3 burst<b>	Target</b> All enemies in the burst
        <b>Effect</b> Each target makes either a <b>Might or Agility test</b>.
        %E2%9C%B8	<b>%E2%89%A411</b>	6 damage; vertical push 4; prone
        %E2%98%85	<b>12%E2%80%9316</b>	2 damage; vertical push 4
        %E2%9C%A6	<b>17</b>	Push 2
        <b>Effect</b> The clobberer can choose to fall prone, doubling the push distance.

        <b>You Ain't Getting Away</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature
        <b>Trigger</b> The target moves or shifts away from the clobberer.
        <b>Effect</b> The target makes an <b>Agility test</b>.
        %E2%9C%B8	<b>%E2%89%A411</b>	Grabbed, target has a bane on escaping the grab
        %E2%98%85	<b>12%E2%80%9316</b>	Grabbed
        %E2%9C%A6	<b>17</b>	No effect
        <b>2 Malice</b> A grabbed target is released and either slammed on the ground for 5 damage and prone can't stand (EoT) or is vertically pushed 5.

        <b>Destructive Path</b>
        The clobberer automatically destroys unattended, mundane size 1 objects in their path during their movement. They can break through any mundane wall made of wood, stone, or a similarly sturdy material in this way, so long as the wall is no more than 2 squares thick.

        <b>Distracted</b>
        Whenever the clobberer targets a creature or object with an ability, the director provides any enemy within range of the ability an opportunity to use a free triggered action to distract the clobberer. The clobberer targets that enemy instead.


