        <b>PUT IT OUT!</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Trigger</b> An enemy uses an ability that emits light, such as fire.
        <b>Effect</b> The enemy has a double bane on the ability.

        <b>End Effect</b>
        At the end of their turn, the eclipse can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Of the Umbra</b>
        The eclipse ignores concealment granted by darkness. While the eclipse is in direct sunlight, they have damage weakness 3. While the eclipse is concealed, they have damage immunity 3.

        <b>From the Shadows</b> (Villain Action 1)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5<b>	Target</b> All allies
        <b>Effect</b> The eclipse calls forth one <b>brush stalker</b> that appears within distance. Each target then shifts up to their speed and makes a free strike.

        <b>Cast Away All Hope </b>(Villain Action 2)
        <b>Keywords</b> Magic
        <b>Distance</b> 3 burst<b>	Target</b> All enemies in the burst
        <b>Effect</b> The eclipse dispels their enemies' hard-earned advantages, removing each target's surges. Each ally ignores edges and additional effects of each target's damaging abilities until the end of the round.

        <b>Umbral Hunger</b> (Villain Action 3) %E2%97%86 2d10 + 4
