    import:
      type: mcdm
      data: |+
        Demon Bale Eye	Level 5 Horde Hexer
        Abyssal, Demon	EV 7
        <b>Stamina</b> 30	<b>Weakness</b> Holy 5
        <b>Speed</b> 6 (fly)	<b>Size</b> 4 /<b> Stability</b> 2
        <b>Free Strike</b> 3
        Might +0	Agility +0	Reason +3	Intuition +3	Presence +3
        <b>Wilting Visions</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 Signature
        <b>Keywords</b> Magic, Strike, Ranged
        <b>Distance</b> Ranged 15<b>	Target</b> One creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	6 psychic damage
        %E2%98%85	<b>12-16</b>	8 psychic damage
        %E2%9C%B8	<b>17</b>	9 psychic damage
        <b>Effect</b> The target has corruption weakness 5 (EoT).
        <b>2 Malice</b> The target has <b>I<2 </b>corruption weakness 5 (save ends).

        <b>Demonwarp Tears</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 5 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 4 cube beneath Bale Eye within 5<b>	Target</b> All enemies
        %E2%9C%A6	<b>%E2%89%A411</b>	3 psychic damage; A<1 warped (save ends)
        %E2%98%85	<b>12-16</b>	5 psychic damage; A<2 warped (save ends)
        %E2%9C%B8	<b>17</b>	6 psychic damage; A<3 warped (save ends)
        <b>Effect</b> A warped creature has all of their characteristic scores reversed. A score of +1 becomes -1, -2 becomes +2, etc.

        <b>Lethe</b>
        While winded, the bale eye has an edge on strikes, and strikes have an edge against them.

        <b>Focused Soulsight</b>
        Each creature within 5 of the bale eye can't be hidden from them.

