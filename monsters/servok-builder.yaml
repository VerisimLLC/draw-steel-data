        Servok Builder	Level 9 Elite Brute
        Construct, Servok, Valok	EV 44
        <b>Stamina</b> 240
        <b>Speed</b> 5	<b>Size</b> 3 /<b> Stability</b> 8
        <b>Free Strike</b> 10
        Might +4	Agility -2	Reason -4	Intuition -1	Presence -5
        <b>Wrecking Ball</b> (Action)%E2%97%86 Signature
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 3 cube within 5<b>	Target</b> All enemies and objects
        <b>Effect</b> Each target makes either an <b>Agility or Intuition test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	15 damage; push 5; prone
        %E2%98%85	<b>12%E2%80%9316</b>	12 damage; push 3
        %E2%9C%A6	<b>17</b>	8 damage

        <b>Construction Arm</b> (Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	16 damage
        %E2%98%85	<b>12%E2%80%9316</b>	23 damage; grabbed
        %E2%9C%B8	<b>17</b>	28 damage; grabbed; M<4 vertical push 5

        <b>Lay the Foundation</b> (Action)%E2%97%86 3 Malice
        <b>Keywords</b> Area
        <b>Distance</b> 6 x 3 line within 1<b>	Target</b> Special
        <b>Effect</b> The affected area is covered in wet concrete and is considered difficult terrain. An enemy that starts their turn in the concrete makes a <b>Might test.</b>
        %E2%9C%B8	<b>%E2%89%A411</b>	Restrained (EoT)
        %E2%98%85	<b>12%E2%80%9316</b>	Slowed (EoT)
        %E2%9C%A6	<b>17</b>	No effect

        <b>Build Wall</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> 6 wall within 3<b>	Target</b> Special
        <b>Effect</b> The builder creates segments of concrete wall. The builder can also remove unoccupied squares of wet concrete within 3, creating 2 additional walls for each square of concrete.

        <b>Sputter</b> (Free Triggered Action) %E2%97%86 2d10 + 4 %E2%97%86 1 Malice
        <b>Keywords</b> Resistance
        <b>Trigger</b> The target deals damage to the builder.
        <b>Distance</b> Melee 3<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	A<2 restrained in concrete (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	A<3 restrained in concrete (save ends)
        %E2%9C%B8	<b>17</b>	A<4 restrained in concrete (save ends)

        <b>Servok Siege Machine</b>
        The builder ignores difficult terrain and deals an additional 15 damage with abilities used against objects.

        <b>Crafted to Perfection</b>
        The builder's shape can't change via any external effects.

        <b>Valiar Might</b>
