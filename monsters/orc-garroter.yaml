      data: |+
        Orc Garroter	Level 1 Platoon Ambusher
        Humanoid, Orc	EV 6
        **Stamina** 30
        **Speed** 5	**Size** 1L /** Stability** 0
        **Free Strike** 4
        Might +1	Agility +2	Reason 0	Intuition +1	Presence -1
        **Dagger Feint** (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        **Keywords** Melee, Strike, Weapon
        **Distance** Melee 1**	Target** 1 creature or object
        %E2%9C%A6	**%E2%89%A411**	6 damage; shift 1
        %E2%98%85	**12%E2%80%9316**	9 damage; shift 2
        %E2%9C%B8	**17**	12 damage; shift 3
        **Effect** This ability deals an additional 4 damage when it's made with an edge.
        **Strangle** (Action) %E2%97%86 2d10 + 2
        **Keywords** Melee, Strike, Weapon
        **Distance** Melee 1**	Target** 1 creature
        %E2%9C%B8	**%E2%89%A411**	6 damage
        %E2%98%85	**12%E2%80%9316**	9 damage; I<1 dazed (save ends)
        %E2%9C%A6	**17**	12 damage; grabbed; I<2 dazed (save ends)
        **Effect** The target can't speak or use magic abilities while grabbed.
        **Chroma Cloak **(Maneuver)%E2%97%86 1 Malice
        The garroter turns invisible. The effect ends when the garroter uses an ability, takes damage, or at the end of their turn.
        **Relentless**
        If the garroter's Stamina drops to 0, they can make a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the garroter lives and their Stamina is reduced to 1 instead.

