    import:
      type: mcdm
      data: |+
        Hobgoblin War Mage	Level 5 Elite Controller
        Goblin, Hobgoblin, Humanoid, Infernal	EV 28
        <b>Stamina</b> 120	<b>Immunity</b> fire 5
        <b>Speed</b> 5 (teleport, hover)	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 6
        Might 0	Agility +2	Reason +3	Intuition +2	Presence +2
        <b>Hellfire</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Area, Magic, Ranged
        <b>Distance</b> 3 cube within 10<b>	Target</b> All enemies in the cube
        %E2%9C%A6	<b>%E2%89%A411</b>	5 fire damage; M<1 weakened (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	9 fire damage; M<2 weakened (save ends)
        %E2%9C%B8	<b>17</b>	11 fire damage; M<3 weakened (save ends)
        <b>Effect</b> The war mage can teleport a creature within 10 up to 2 squares before using this ability.

        <b>Enchantments of War</b> (Action)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> 2 allies
        <b>Effect</b> Each target gains 10 temporary Stamina and has a double edge on their next power roll. The war mage can spend any amount of their Stamina to increase the temporary Stamina each target gains by an equivalent amount.

        <b>Unhallowed Ground</b> (Maneuver) %E2%97%86 3 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 cube within 10<b>	Target</b> Special
        <b>Effect</b> The war mage consecrates the affected area and causes it to smolder. Until the end of the encounter, the affected area is considered difficult terrain and enemies have fire weakness 10 while occupying an affected square.

        <b>Magic Siphon</b> (Triggered Action)
        <b>Keywords</b> Magic
        <b>Trigger</b> A creature within distance uses a strike or ability with the magic keyword
        <b>Distance</b> Ranged 10	<b>Target</b> Triggering creature
        <b>Effect</b> Any damage dealt or Stamina regained by the attack or ability is halved. The war mage regains Stamina equal to the remainder.

        <b>Infernal Ichor</b>
        If the war mage's Stamina drops to 0, they spray burning blood. Each creature within 1 of the war mage takes 3 fire damage.

        <b>Despair, You Who Faces Death</b>
        Each enemy has -2 on saving throws while within 2 squares of the war mage.



