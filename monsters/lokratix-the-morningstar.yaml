        <b>Acidic Stun</b> (Action) %E2%97%86 2d10 + 3%E2%97%86 2 Malice
        <b>Keywords</b> Area, Magic, Melee
        <b>Distance</b> 3 x 1 line within 1<b>	Target</b> All enemies in the line
        %E2%9C%A6	<b>%E2%89%A411</b>	7 acid damage; M<1 dazed (save ends)
        %E2%98%85	<b>12-16</b>	12 acid damage; M<2 dazed (save ends)
        %E2%9C%B8	<b>17</b>	15 acid damage; M<3 dazed (save ends)
