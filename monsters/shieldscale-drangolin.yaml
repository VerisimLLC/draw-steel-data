        %E2%9C%B8    <b>17</b>    14 acid damage; A<2 restrained (save ends)
        <b>    Effect </b>A size 2 or smaller creature restrained by this ability is pulled into one of the cube's squares and moves with the cube. The creature takes 4 acid damage at the start of each of their turn while restrained. When restrained ends, the creature moves to the nearest unoccupied square adjacent to the cube.
        <b>2 Malice</b> The cube targets 1 additional creature or object.

        <b>You Didn't Pay Attention!</b> (Free Triggered Action)
        <b>Keywords</b> -
        <b>Trigger </b>A creature moves or is force moved into the cube.
        <b>Distance</b> Self<b>Target</b> Self
        <b>Effect</b> The cube uses Engulf with a double edge.

