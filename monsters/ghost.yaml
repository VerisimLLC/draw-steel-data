      data: |
        Ghost	Level 1 Leader
        Incorporeal, Undead	EV 20
        <b>Stamina</b> 40	<b>Immunity</b> corruption 3, poison 3
        <b>Speed</b> 6 (fly, hover)	<b>Size</b> 1M/<b> Stability</b> 1
        <b>Free Strike</b> 2
        Might -2	Agility +2	Reason 0	Intuition 0	Presence +3
        <b>Heat Death </b>(Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 5	<b>Target</b> Two creatures
        %E2%9C%A6	%E2%89%A411	4 cold damage; P<1 slowed (save ends)
        %E2%98%85	12%E2%80%9316	7 cold damage; P<2 slowed (save ends)
        %E2%9C%B8	17+	8 cold damage; P<3 slowed (save ends)
        <b>Effect</b> The next strike made against a target has an edge.

        <b>Haunt</b> (Maneuver)
        <b>Keywords</b> Ranged
        <b>Distance</b> Ranged 8	<b>Target</b> Self or one incorporeal ally
        <b>Effect</b> The target shifts up to their speed.
        <b>2 Malice</b> The ghost chooses one additional target.

        <b>Shriek</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Melee 1	<b>Target</b> The triggering creature
        <b>Trigger</b> A creature within distance targets the ghost with a strike.
        <b>Effect</b> The ghost halves the incoming damage and the target takes 2 sonic damage.

        <b>Phantom Flow</b>
        Each incorporeal undead creature within 10 squares of the ghost ignores difficult terrain.

        <b>Paranormal Activity</b> (Villain Action 1)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst	<b>Target</b> Each size 1S or larger object in the burst
        <b>Effect</b> Each target floats 1 square into the air and is pulled 5 squares toward the nearest enemy within 3 squares of them.

        <b>Spirited Away</b> (Villain Action 2) %E2%97%86 2d10 + 2
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst	<b>Target</b> Each enemy in the burst
        %E2%9C%A6	%E2%89%A411	P<1 levitated (EoT) (see effect)
        %E2%98%85	12%E2%80%9316	P<2 levitated (EoT)
        %E2%9C%B8	17+	P<3 levitated for the rest of the encounter
        <b>Effect</b> A levitated target floats 1 square off the ground when they are first affected, then rises 1 square at the end of each of their turns. If a levitated target can't already fly, they can fly but are slowed and weakened while flying in this way.

        <b>Awful Wail</b> (Villain Action 3) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst	<b>Target</b> Each enemy in the burst
        %E2%9C%A6	%E2%89%A411	2 sonic damage
        %E2%98%85	12%E2%80%9316	5 sonic damage
        %E2%9C%B8	17+	5 sonic damage
        <b>EffectP<2</b> the target is reduced to 1 Stamina if they have 2 or more Stamina after taking damage.

        <b>Corruptive Phasing</b>
        The ghost can move through other creatures and objects at normal speed. The first time in a round that the ghost passes through a creature, that creature takes 2 corruption damage. The ghost doesn't take damage from being force moved into objects.
        Undead - 2nd Echelon
        When the dead rise, all of hell rises with them.
        Lady Demelza, Courser
        Mummies
        Mummies are humanoids raised from the dead via a complex series of magical rituals. The process tethers a creature's soul to their earthly body, preventing them from crossing into true death. As part of the mummification process, a corpse is embalmed and wrapped in cloth imbued with necromantic power. Mummification is reserved for situations of grave import. A great hero may voluntarily be mummified upon death to eternally guard future generations or a holy relic. On the other hand, a great villain may be mummified to prevent them from escaping their crimes through death.
        Vampire Spawn
        Vampirism is a curse of blood. A curse that harrows its victims, turning them into mirror-mockeries of life that nonetheless hunger for life's essence: blood. With that hunger comes power everlasting over life and death. By feeding, a vampire passes this curse onto their victims.
        Though vampires are fundamentally changed from their mortal forms, they retain the intellect and memories of their mortal selves. A vampire's power grows as they spend time in undeath. Vampire spawn, the youngest of their ilk, are barely separated from their mortal selves. They are driven by their thirst for blood and their master's orders. Few spawn survive long enough to become true vampires.
        Mournlings
        Powered by sorrow and rage, these hulking amalgamations of dirt or flesh defend the homes of their creators, brutally attacking intruders while sobbing uncontrollably. Mournlings express far more emotion than many other undead guardians, for their makers imbued them with sadness and loss. Though their druidic creators are long-dead, some original mournlings still defend forests, meadows, and other natural places they were built to protect.
        Outside of battle, mournlings patrol for interlopers in a trance-like state. When an unknown creature creates a disturbance or approaches them, the mournling unleashes a primal cry that conveys the very essence of suffering, then they burst into violence. They continue to sob and moan even as they viciously beat their enemies to a pulp.
