        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Trigger</b> An adjacent creature damages Myxovidan
        <b>Effect </b>Myxovidan perfectly recreates the damaging move. If the move requires a Power Roll, Myxovidan rolls power using his stats. If Myxovidan gets a higher tier on this roll than the triggering creature, the Director gains 2 Malice.

        <b>Stench of Death</b>
        Whenever an enemy regains Stamina while within 5 of Myxovidan, they regain 3 less Stamina.



