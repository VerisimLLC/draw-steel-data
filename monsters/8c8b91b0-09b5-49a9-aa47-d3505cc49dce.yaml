    import:
      type: mcdm
      override: true
      data: |+
        Orc Eye of Grole	Level 1 Platoon Artillery
        Humanoid, Orc	EV 6
        <b>Stamina</b> 20	<b>Immunity</b> affinity 5
        <b>Speed</b> 6	<b>Size</b> 1M /<b> Stability</b> 0
        <b>Free Strike</b> 4
        Might +1	Agility +1	Reason 0	Intuition 0	Presence +2
        <b>Affinity</b>
        The eye has an affinity for one of the following damage types: cold, fire, or lightning. This type determines the eye's affinity immunity and the damage type of their attacks.

        <b>Elemental Discharge</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Magic, Ranged, Strike
        <b>Distance</b> Ranged 10<b>	Target</b> 1 creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>	6 affinity damage; push 2 or shift 2 away from target
        %E2%98%85	<b>12%E2%80%9316</b>	9 affinity damage; slide 4 or shift 4 away from target
        %E2%9C%B8	<b>17</b>	12 affinity damage; slide 6 or shift 6 away from target

        <b>Power Burst</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 x 2 line within 1<b>	Target</b> All enemies in the line
        %E2%9C%A6	<b>%E2%89%A411</b>	3 affinity damage; push 2
        %E2%98%85	<b>12%E2%80%9316</b>	5 affinity damage; push 3
        %E2%9C%B8	<b>17</b>	8 affinity damage; push 4; prone
        <b>Effect</b> An enemy has affinity weakness 3 in the affected area.

        <b>Relentless</b>
        If the eye's Stamina drops to 0, they can make a free strike before dying. If the target is reduced to 0 Stamina or killed by the strike, the eye lives and their Stamina is reduced to 1 instead.

