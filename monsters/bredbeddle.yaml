    import:
      type: mcdm
      data: |+
        Bredbeddle	Level 3 Solo
        Bredbeddle, Giant	EV 50
        <b>Stamina</b> 300
        <b>Speed</b> 5	<b>Size</b> 2 /<b> Stability</b> 4
        <b>Free Strike</b> 6
        Might +3	Agility 0	Reason -3	Intuition +1	Presence +2
        <b>Solo Monster</b>
        <b>Solo Turns</b> The bredbeddle takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the bredbeddle can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Resilient Form</b>
        The bredbeddle can't be physically transformed in any way except by their Heady or Not trait.

        <b>Heady or Not</b>
        While headless, the bredbeddle can move into a space with a severed head and attach it to their neck as an action. Doing so physically transforms the bredbeddle, who takes on the size, weight, reach, and stability of the head's original owner. These effects last until the bredbeddle is killed or beheaded, or until the head falls off after 24 hours. A head that falls off this way can no longer be attached to the bredbeddle.
        A creature must succeed on a <b>hard Might test</b> made as a maneuver to rip a head off the bredbeddle. If they fail, the bredbeddle makes a free strike against them.

        <b>Executioner's Swing</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 2 burst	<b>Target</b> Each enemy in the burst
        %E2%9C%A6	%E2%89%A411	2 damage; A<1 bleeding (save ends)
        %E2%98%85	12%E2%80%9316	4 damage; A<2 bleeding (save ends)
        %E2%9C%B8	17+	5 damage; A<3 bleeding (save ends); M<2 dazed (save ends)
        <b>3 Malice</b> The bredbeddle shifts up to 2 squares and can target additional enemies who come within distance of this ability during the move.

        <b>Lop</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 3 Malice
        <b>Keywords</b> Magic, Melee, Strike, Weapon
        <b>Distance</b> Melee 2	<b>Target</b> One creature
        %E2%9C%A6	%E2%89%A411	9 damage; bleeding (save ends) or M<1 beheaded (see effect)
        %E2%98%85	12%E2%80%9316	13 damage; bleeding (save ends) or M<2 beheaded (see effect)
        %E2%9C%B8	17+	16 damage; bleeding (save ends) or M<3 beheaded (see effect)
        <b>Effect</b> A beheaded target has their head fall into an unoccupied square adjacent to the bredbeddle, but they remain alive. While beheaded, the target is bleeding and can't establish line of effect beyond 1 square. The beheaded target can survive without their head for 24 hours, and can reattach their head with a maneuver by entering its square. A target who remains beheaded for 24 hours dies.

        <b>Scramble</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self (while headless)	<b>Target</b> Self
        <b>Effect</b> The bredbeddle shifts up to their speed, and can push each creature who comes within their reach during the movement 1 square. Each square the bredbeddle exits during the movement becomes difficult terrain.

        <b>Headway</b> (Maneuver) %E2%97%86 2d10 + 3 %E2%97%86 5 Malice
        <b>Keywords</b> Ranged, Strike, Weapon
        <b>Distance</b> Ranged 20<b>	Target</b> One creature or object
        <b>Effect</b> The bredbeddle must have a head in their possession (attached to them or not), which they throw at the target. If the head was attached, the bredbeddle becomes headless.
        %E2%9C%A6	%E2%89%A411	9 damage; M<1 dazed (save ends)
        %E2%98%85	12%E2%80%9316	13 damage; prone; M<2 dazed (save ends)
        %E2%9C%B8	17+	16 damage; prone; M<3 dazed (save ends)

        <b>Envious Imitation</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> Magic
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Trigger</b> A creature targets the bredbeddle with a ranged strike.
        <b>Effect</b> The bredbeddle uses the same ability against the triggering creature, using that creature's bonus to any power rolls they have to make.

        <b>Turn Green</b> (Villain Action 1) %E2%97%86 2d10 + 3
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 burst	<b>Target</b> Each enemy in the burst
        %E2%9C%A6	%E2%89%A411	P<1 The target turns green (save ends)
        %E2%98%85	12%E2%80%9316	P<2 The target turns green (save ends)
        %E2%9C%B8	17+	P<3 The target turns green until the end of the encounter
        <b>Effect</b> Green shadows crawl out from under the bredbeddle's feet and attempt to turn each target green. The bredbeddle has a double edge on attacks made against targets turned green until the condition ends.

        <b>Challenge </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5<b>Target</b> One enemy
        <b>Effect</b> The bredbeddle points at the target and issues them a challenge. If the target refuses, they turn green until the end of the encounter (see Turn Green).
        If the target accepts, the bredbeddle shifts to a space adjacent to the target, who must make a <b>hard Might test</b> with no additional modifiers. On success, the target can choose to deal 40 damage to the bredbeddle or remove the bredbeddle's head. On failure, the target is beheaded (see Lop).

        <b>Headlam Rampage</b> (Villain Action 3) %E2%97%86 2d10 + 3
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2	<b>Target</b> Four creatures
        %E2%9C%A6	%E2%89%A411	6 damage; bleeding (save ends) or A<1 beheaded
        %E2%98%85	12%E2%80%9316	7 damage; bleeding (save ends) or A<2 beheaded
        %E2%9C%B8	17+	8 damage; bleeding (save ends) or A<3 beheaded (see Lop)



