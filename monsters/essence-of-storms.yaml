        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 5<b>	Target</b> Self or 1 elemental
        <b>Effect</b> The target receives lightning immunity 5 until the start of the essence's next turn if they don't already have it.
        <b>3 Malice</b> The target emits a 3 aura vortex until the end of the encounter. The aura is considered difficult terrain for enemies. At the end of each of the target's turns, the target can select 1 creature within the aura to push 5.

        <b>Thunderclap</b> (Triggered Action) %E2%97%86 1 Malice
        <b>Keywords</b> Magic, Melee, Ranged
        <b>Distance</b> Melee 1 or Ranged 5	<b>Target</b> 1 creature or object
        <b>Trigger</b> The essence takes damage from the target.
        <b>Effect</b> The essence deals 5 lightning damage to the target.

        <b>Fickle and Free</b>
        The essence can't be restrained, slowed, or knocked prone, and they ignore difficult terrain.

