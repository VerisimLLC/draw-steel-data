    import:
      type: mcdm
      data: |+
        Olothec	Level 6 Solo
        Horror, Olothec	EV 80
        <b>Stamina</b> 450	<b>Immunity </b>psychic 6
        <b>Speed</b> 7 (fly, swim)	<b>Size</b> 2 /<b> Stability</b> 0
        <b>Free Strike</b> 7
        Might +4	Agility -1	Reason +4	Intuition +2	Presence +3
        <b>Solo Monster</b>
        <b>Solo Turns</b> The olothec takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the olothec can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Gelatinosis</b>
        A creature permanently devolves into a slime servant if they spend 1 continuous minute weakened by Devolving Tentacles, they are reduced to 0 or lower Stamina by the psychic damage from Devolving Tentacles, or they suffer all three transformations from Oozing Transformation.

        <b>Devolving Tentacles</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 3<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	11 damage; M<2 weakened or slimed (save ends)
        %E2%98%85	12%E2%80%9316	17 damage; M<3 weakened or slimed (save ends)
        %E2%9C%B8	17	20 damage; M<4 weakened and slimed (save ends)
        <b>Effect</b> A slimed target takes 4 psychic damage whenever they roll power until the condition ends.

        <b>Slime Spew </b>(Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 7 x 2 line within 1<b>	Target</b> All creatures and objects
        %E2%9C%A6	17	6 acid damage; A<2 push (special)
        %E2%98%85	12%E2%80%9316	10 acid damage; A<3 push (special)
        %E2%9C%B8	%E2%89%A411	13 acid damage; A<4 push (special), prone
        <b>Effect </b>A creature pushed by this ability is pushed to the squares within the line that are furthest from the olothec.
        <b>1 Malice </b>The affected area becomes difficult terrain. A creature that enters an affected square for the first time during a turn is <b>A<3</b> knocked prone.

        <b>Oozing Transformation</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 2 Malice
        <b>Keywords</b> Psionic, Ranged, Strike
        <b>Distance</b> Ranged 10 <b>	Target</b> One creature
        %E2%9C%A6	%E2%89%A411	13 psychic damage; I<2 transformed (save ends)
        %E2%98%85	12%E2%80%9316	20 psychic damage; I<3 transformed (save ends)
        %E2%9C%B8	17	23 psychic damage; I<4 transformed (save ends)
        <b>Effect</b> Each time a creature is transformed, the Director chooses one of the following transformations. When a creature ends the transformed effect, all transformations end.
        <b>Head </b>The creature's head becomes a ball of slime. They cannot communicate and they can't establish line of effect beyond 3 squares.
        <b>Legs </b>The creature's legs become pillars of ooze. They are slowed while on land and add the swim keyword to their speed.
        <b>Torso </b>The creature's arms become gelatinous. They can't benefit from edges or surges.

        <b>Jaunt</b> (Maneuver)
        <b>Keywords</b> Psionic
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The olothec teleports to an unoccupied square within 10 or swaps places with a creature or object within 5.

        <b>Liquify</b> (Triggered Action)
        <b>Keywords</b> Psionic, Ranged
        <b>Distance</b> Ranged 5<b>	Target</b> One enemy
        <b>Trigger</b> Target deals damage to the olothec
        <b>Effect</b> The target takes 8 psychic damage and gains psychic weakness 3 until the end of the olothec's next turn.

        <b>Primordial Mind</b>
        The olothec is immune to the frightened and taunted conditions.

        <b>Slime Sense</b>
        A slimed or transformed creature can't be hidden or concealed from the olothec.

        <b>Horrifying Form</b> (Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Psionic, Ranged, Strike
        <b>Distance</b> Special<b>	Target</b> All enemies
        %E2%9C%A6	%E2%89%A411	10 psychic damage; P<2 frightened (save ends)
        %E2%98%85	12%E2%80%9316	14 psychic damage; P<3 frightened (save ends)
        %E2%9C%B8	17	17 psychic damage; P<4 frightened (save ends)
        <b>Effect</b> This ability targets each enemy the olothec has line of effect to. A frightened enemy can't save against any other effect until they are no longer frightened.

        <b>Psychic Pulse </b>(Villain Action 2)
        <b>Keywords</b> Area, Psionic
        <b>Distance</b> 10 burst<b>	Target</b> All creatures
        <b>Effect</b> Each target takes 12 psychic damage, slides 5, and is <b>M<3</b> weakened and slimed (save ends) (see devolving tentacles). The olothec has damage immunity 4 until the start of their next turn.

        <b>Return to Perfection</b> (Villain Action 3) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Ranged, Psionic
        <b>Distance</b> 10 burst<b>	Target</b> All creatures
        %E2%9C%A6	%E2%89%A411	7 psychic damage; R<2 devolved (save ends)
        %E2%98%85	12%E2%80%9316	13 psychic damage; R<3 devolved (save ends)
        %E2%9C%B8	17	16 psychic damage; R<4 devolved (save ends)
        <b>Effect</b> A devolved creature has a -1 modifier to all their characteristic scores other than Reason until the condition ends.

