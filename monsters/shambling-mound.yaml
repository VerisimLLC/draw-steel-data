      data: |+
        Shambling Mound	Level 5 Solo
        Plant, Shambling Mound	EV 70
        <b>Stamina</b> 400
        <b>Speed</b> 3	<b>Size</b> 3 /<b> Stability</b> 5
        <b>Free Strike</b> 7
        Might +4	Agility -1	Reason +0	Intuition +1	Presence +0
        <b>Solo Monster</b>
        <b>Solo Turns</b> The shambling mound takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the shambling mound can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Engulfing Sack</b>
        The shambling mound has a vegetative sack on their body where they carry engulfed creatures. The sack has 30 Stamina, damage immunity 5, and fire weakness 10. Destroying the sack frees creatures trapped by the shambling mound's Engulf action. The shambling mound regrows the sack at the beginning of their next turn.

        <b>Vine Lash</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 6<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	%E2%89%A411	11 damage; A<3 grabbed
        %E2%98%85	12%E2%80%9316	16 damage; A<4 grabbed
        %E2%9C%B8	17	19 damage; grabbed
        <b>2 Malice</b> The shambling mound can slide one or both targets up to 6 squares.
        <b>3 Malice </b>Each target takes 7 poison damage.

        <b>Seismic Slam</b> (Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 6 burst<b>	Target</b> Each enemy in the burst
        %E2%9C%A6	%E2%89%A411	4 damage; M<2 dazed (save ends)
        %E2%98%85	12%E2%80%9316	6 damage; M<3 dazed (save ends)
        %E2%9C%B8	17	7 damage; M<4 dazed (save ends)

        <b>Engulf</b> (Action) %E2%97%86 2 Malice
        <b>Keywords</b> Area, Melee
        <b>Distance</b> Melee 6 <b>	Target</b> 1 creature or object
        <b>Effect</b> The shambling mound reaches out with writhing vines and <b>A<3</b> engulfs an enemy size 1L or smaller into their sack. The potency increases by 1 if the target is grabbed by the shambling mound. An engulfed creature is restrained, takes 3 poison damage at the start of each turn of combat, and can't take damage from abilities used from outside the sack. When the shambling mound moves, the engulfed creature moves with them. If the mound dies or their engulfing sack is destroyed, each engulfed creature is freed and shunted to an unoccupied square within 2 squares.
        <b>2+ Malice </b>The shambling mound can engulf 1 additional enemy for every 2 malice spent.

        <b>Leech</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Each creature trapped by Engulf
        <b>Effect</b> 5 poison damage. The shambling mound gains 5 temporary Stamina for each creature affected by this maneuver.

        <b>Tether Down</b> (Triggered Action) %E2%97%86 2d10 + 4 %E2%97%86 1 Malice
        <b>Keywords</b> -
        <b>Distance</b> Melee 6<b>	Target</b> One creature
        <b>Trigger</b> A creature within distance moves.
        %E2%9C%A6	%E2%89%A411	7 damage; M<2 restrained (EoT)
        %E2%98%85	12%E2%80%9316	12 damage; M<3 restrained (EoT)
        %E2%9C%B8	17	15 damage; M<4 restrained (EoT)

        <b>False Appearance</b>
        While the shambling mound remains motionless, they are indistinguishable from ordinary vegetation.

        <b>Frothing Flora</b>
        The area within 6 squares of the shambling mound is considered difficult terrain.

        <b>Ravenous Overgrowth</b> (Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 10 x 2 line within 1<b>	Target</b> All creatures in the line
        %E2%9C%A6	%E2%89%A411	7 damage, pull 3
        %E2%98%85	12%E2%80%9316	12 damage; pull 4; targets gain poison weakness 3 until the encounter ends
        %E2%9C%B8	17	15 damage; pull 6; targets gain poison weakness 5 until the encounter ends

        <b>Composting </b>(Villain Action 2)
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> Melee 6<b>	Target</b> All enemies
        <b>Effect</b> The shambling mound attempts to devour each enemy within distance with its Engulf action without spending malice.

