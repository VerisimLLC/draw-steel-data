      description: |-
        The target must be size 1L or smaller. The shambling mound reaches out with writhing vines, and if the target has A<3, they are pulled adjacent to the shambling mound (taking no damage from this movement) and engulfed into its sack. If the target is grabbed by the shambling mound, the potency increases by 1. An engulfed creature is restrained, takes 3 poison damage at the start of each of their turns, and can't take damage from abilities used from outside the sack: damage from outside instead strikes the sack (the Engulfed effect's 30 temporary Stamina; the sack has damage immunity 5 and fire weakness 10). When the shambling mound moves, the engulfed creature moves with them. If the shambling mound dies or their sack is destroyed, each engulfed creature is freed and appears in an unoccupied space within 2 squares of the shambling mound.

        **2+ Malice**: The shambling mound can engulf one additional target for each 2 Malice spent.
