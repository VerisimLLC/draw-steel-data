      data: |
        War Dog Tetrarch	Level 6 Leader
        Humanoid, War Dog	EV 32
        <b>Stamina</b> 180
        <b>Speed</b> 7	<b>Size</b> 1M /<b>Stability</b> 2
        <b>Free Strike</b> 7
        Might +4	Agility +3	Reason +2	Intuition +3	Presence +4
        <b>Houndblade</b> (Action) %E2%97%86 2d10 + 4%E2%97%86 Signature
        <b>Keywords</b> Charge, Melee, Ranged, Strike, Weapon
        <b>Distance</b> Melee 1 or Ranged 3<b>	Target</b> Two creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	11 damage
        %E2%98%85	<b>12-16</b>	16 damage; taunted (EoT)
        %E2%9C%B8	<b>17</b>	19 damage; taunted (EoT)
        <b>Effect</b> A creature taunted by this ability has a bane on strikes.
        <b>3 Malice</b> Each target loses 1d3 Recoveries.

        <b>"Get them, you dolts!" </b>(Maneuver) %E2%97%86 1 Malice per target
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10	<b>Target</b> Up to three creatures
        <b>Effect</b> The target shifts up to their speed and makes a free strike. The target deals an additional 4 damage if they strike a taunted enemy.

        <b>Sneering Disregard</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Triggering creature
        <b>Trigger</b> A non-taunted creature targets the tetrarch with a power roll.
        <b>Effect</b> The tetrarch imposes a double bane on the power roll. If the target gets a tier-1 result, the tetrarch ignores any additional effects of the ability, and the target is frightened of the tetrarch (save ends).

        <b>End Effect</b>
        At the end of their turn, the tetrarch can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Chosen of the Iron Saint</b>
        The Director gains 1 malice whenever an ally within 10 of the tetrarch gets a tier-3 result on an attack.

        <b>Enter the Fray</b> (Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area
        <b>Distance</b> 2 burst<b>Target</b> All enemies
        <b>Effect</b> The tetrarch leaps 7 squares before using this action.
        %E2%9C%A6	<b>%E2%89%A411</b>	push 2; I<2 frightened (save ends)
        %E2%98%85	<b>12-16</b>	push 4; I<3 frightened (save ends)
        %E2%9C%B8	<b>17</b>	push 5; I<4 frightened (save ends)

        <b>Lay Waste </b>(Villain Action 2) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> Five 2 cubes within 20<b>Target</b> All creatures and objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 fire damage; A<2 slowed (EoT)
        %E2%98%85	<b>12-16</b>	13 fire damage; A<3 slowed (save ends)
        %E2%9C%B8	<b>17</b>	16 fire damage; A<4 slowed (save ends)
        <b>Effect</b> The cubes are set ablaze. Until the end of the encounter, the affected area is considered difficult terrain, and a creature takes 2 fire damage for each affected square they enter.

        <b>"You Would Dare?!"</b> (Villain Action 3)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>Target</b> Self
        <b>Effect</b> Until the end of the encounter, the tetrarch rallies themself, gains damage immunity 2, and their signature action now targets three creatures or objects.


        War Dogs - 3rd Echelon
        The Body Banks are full of the remains of enemies of the state, conquered peoples, war dogs who have experienced a second death, and even scraps of monsters and animals that might prove useful. While the creation of new War Dogs is by no means an exact process, the flesh sculptors take great pride in crafting a highly destructive, single-mindedly fanatical army.
        Rank and File
        The vast majority of War Dogs are simple amalgams of humanoids, fused, stitched, and welded together with stolen Upper World technology and forbidden alchemy. Their unnatural origin is on clear display; patchwork skin, mismatched limbs, and unsettling proportions mark them as artificial revenants. As a War Dog proves their loyalty and rises in rank, they may be rewarded with special attention from the flesh sculptors, evening out their construction and supplying them with higher quality material. War Dogs who have risen through the ranks this way pride themselves on their nearly normal appearances.
        Happy Accidents
        Making War Dogs is more art than science, and happy little accidents can create War Dogs with unusual characteristics. These War Dogs are given great attention by the flesh sculptors, both to further improve the abilities of these deviants and to learn how to replicate their creation.
        Made to Order
        War Dogs are most often made by playing the odds: each new resurrection is assumed to create certain ratios of infantry, mages, specialists, and so on. However, by radically altering the processes and providing special materials, War Dogs can be made that bear little resemblance to any humanoid and with power beyond that of the usual conscript.
        These monstrous War Dogs are developed to fulfill very specific roles and combat niches, often fused with inorganic materials after their rebirth to become living war machines. Despite the War Dog tendency to value appearance, they are highly respected for having been chosen for greatness and consider their monstrous forms a badge of honor bestowed by Ajax.
