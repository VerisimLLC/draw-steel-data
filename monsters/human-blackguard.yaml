      data: |+
        Human Blackguard	Level 1 Leader
        Human, Humanoid	EV 12
        <b>Stamina</b> 80	<b>Immunity</b> Corruption 2, Psychic 2
        <b>Speed</b> 5	<b>Size</b> 1M / <b>Stability</b> 2
        	<b>Free Strike</b> 4
        Might +3	Agility +2	Reason +2	Intuition +0	Presence +2
        <b>Zweihander Swing</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Area, Melee, Weapon
        <b>Distance</b> 1 burst	<b>Target</b> All enemies in the burst
        %E2%9C%A6	%E2%89%A411	3 damage; M<1 slowed (save ends)
        %E2%98%85	12%E2%80%9316	6 damage; M<2 slowed (save ends)
        %E2%9C%B8	17+	8 damage; M<3 slowed (save ends)
        <b>Effect </b>An ally within 10 of the blackguard can make a free strike.
        <b>1 Malice </b>The ally can use their signature action instead.

        <b>You!</b> (Maneuver)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10	<b>Target</b> One enemy
        <b>Effect </b>The target is marked until the start of the blackguard's next turn. The blackguard and each of their allies gain an edge on abilities used against targets marked by the blackguard.

        <b>End Effect </b>
        At the end of their turn, the blackguard can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Supernatural Insight</b>
        The blackguard ignores concealment if it's granted by a supernatural effect, or the target is supernatural.

        <b>Parry!</b> (Triggered Action)
        <b>Keywords</b> -
        <b>	Distance </b>Melee 1	<b>Target </b>Self or one ally
        <b>	Trigger </b>A creature targets the blackguard or an ally adjacent to the blackguard with a strike.
        <b>Effect </b>The damage is halved.

        <b>Advance!</b> (Villain Action 1)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect </b>The blackguard shifts up to their speed. During or after this movement, they can use their Zweihander Swing twice.

        <b>Back!</b> (Villain Action 2)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst	<b>Target</b> All enemies in the burst
        <b>Effect </b>Slide 5.

        <b>I Can Throw My Blade and So Should You!</b> (Villain Action 3)
        <b>Keywords</b> Area, Magic, Ranged, Weapon
        <b>Distance</b> 3 cube within 5	<b>Target</b> Each enemy in the cube
        <b>Effect </b>The blackguard uses their Zweihander Swing against each target. Then, each ally within 5 of the area can make a free strike against a target (one target per ally).



