      data: |+
        Manticore	Level 4 Solo
        Beast, Manticore	EV 60
        <b>Stamina</b> 350
        <b>Speed</b> 10 (fly)	<b>Size</b> 2 /<b> Stability</b> 2
        <b>Free Strike</b> 6
        Might +4	Agility +3	Reason +0	Intuition +0	Presence -1
        <b>Solo Monster</b>
        <b>Solo Turns</b> The manticore takes up to two turns each round. They can't take turns consecutively.
        <b>End Effect</b> At the end of their turn, the manticore can take 10 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Agile Predator</b>
        When the manticore deals damage to a creature, they don't provoke opportunity attacks from that creature during that turn.

        <b>Carnivorous Bite</b> (Action) %E2%97%86 2d10 + 4 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1<b>	Target</b> One creature or object
        %E2%9C%A6	%E2%89%A411	12 damage; A<2 bleeding (save ends)
        %E2%98%85	12%E2%80%9316	17 damage; A<3 bleeding (save ends)
        %E2%9C%B8	17	21 damage; A<4 bleeding (save ends)
        <b>Effect</b> This ability has an edge against frightened targets.

        <b>Tail Spike</b> (Action) %E2%97%86 2d10 + 4
        <b>Keywords</b> Ranged, Weapon
        <b>Distance</b> Ranged 10<b>	Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	6 damage; M<2 4 poison damage
        %E2%98%85	12%E2%80%9316	11 damage; M<3 4 poison damage, weakened (save ends)
        %E2%9C%B8	17	14 damage; M<4 8 poison damage, weakened (save ends)
        <b>1 Malice</b> A target weakened from this ability takes 1d6 poison damage at the start of each of their turns until the condition ends.

        <b>Harrying Claws</b> (Maneuver)
        <b>Keywords</b> Melee
        <b>Distance</b> Melee 1	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	Slide 1; A<2 3 damage
        %E2%98%85	12%E2%80%9316	Slide 2; A<3 5 damage
        %E2%9C%B8	17	Slide 4; A<4 7 damage

        <b>Reflexive Instinct</b> (Triggered Action) %E2%97%86 2 Malice
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Triggering creature
        <b>Trigger</b> A creature deals damage to the manticore.
        <b>Effect</b> The manticore shifts up to 5 into the air, then uses their Tail Spike ability against the target.

        <b>Trumpeting Howl</b> (Villain Action 1) %E2%97%86 2d10 + 4
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>Target</b> All creatures
        %E2%9C%A6	%E2%89%A411	Frightened (EoT) or I<2 (save ends)
        %E2%98%85	12%E2%80%9316	Frightened (EoT) or I<3 (save ends)
        %E2%9C%B8	17	Frightened (save ends); I<4 dazed (save ends)

        <b>Cornered Predator </b>(Villain Action 2)
        <b>Keywords</b> Ranged, Weapon
        <b>Distance</b> Self<b>	Target</b> Self
        <b>Effect</b> The manticore shifts up to their speed, then uses their Tail Spike ability against each enemy within 10 squares.

        <b>Debilitating Poison</b> (Villain Action 3)
        <b>Keywords</b> -
        <b>Distance</b> Self<b>	Target</b> Special
        <b>Effect</b> The manticore sours their own poison with enmity. Until the end of the encounter, the manticore has a double edge on power rolls targeting weakened creatures. A creature weakened by the manticore's Tail Spike ability has their speed halved and takes an additional 1d3 poison damage at the start of each of their turns until the condition ends.



