    import:
      type: mcdm
      override: true
      data: |+
        War Dog Ground Commander	Level 3 Leader
        Humanoid, War Dog	EV 20
        <b>Stamina</b> 120
        <b>Speed</b> 5	<b>Size</b> 1M / <b>Stability</b> 2
        	<b>Free Strike</b> 5
        Might +3	Agility +2	Reason +3	Intuition +2	Presence +2
        <b>Conditioning Spear</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Ranged, Strike, Weapon
        <b>Distance</b> Melee 1 or Ranged 5	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	8 damage; pull 1
        %E2%98%85	12%E2%80%9316	12 damage; pull 2
        %E2%9C%B8	17+	15 damage; pull 3
        <b>Effect </b>One ally within 10 squares of the commander can make a free strike.
        <b>1 Malice </b>A target who is adjacent to the ground commander after this ability is resolved is <b>I<2</b> grabbed (save ends). This grab can't be escaped using the Escape Grab maneuver. The ground commander can grab up to two creatures at a time.

        <b>Highest Posthumous Promotion</b> (Maneuver)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 10 burst	<b>Target</b> Each war dog with a loyalty collar
        <b>Effect </b>The ground commander selects any number of targets' loyalty collars and detonates them, killing the target instantly.

        <b>Final Orders</b> (Triggered Action)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> One ally
        <b>Trigger </b>The target has a condition imposed on them, is force moved, or is killed.
        <b>Effect </b>The target can move up to their speed and make a free strike before the triggering effect happens.

        <b>End Effect </b>
        At the end of their turn, the ground commander can take 5 damage to end one save ends effect affecting them. This damage can't be reduced in any way.

        <b>Loyalty Collar</b>
        When the ground commander dies, they explode, dealing 2d6 damage to each adjacent enemy.

        <b>Combined Arms</b> (Villain Action 1)
        <b>Keywords</b> Area
        <b>Distance</b> 10 burst	<b>Target</b> Each ally
        <b>Effect </b>Each target can make a ranged free strike, then immediately use the Charge action.

        <b>Make an Example of Them</b> (Villain Action 2)
        <b>Keywords</b> Magic, Ranged
        <b>Distance</b> Ranged 10	<b>Target</b> One enemy
        <b>Effect </b>Each ally within 5 squares of the target can move up to their speed and make a free strike against the target. The target is then <b>I<2</b> frightened of the ground commander (save ends).

        <b>Claim Them for the Body Banks</b> (Villain Action 3)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 10 burst	<b>Target</b> Each ally
        <b>Effect </b>Each target can shift 2 and use the Grab maneuver. For the rest of the encounter, each enemy has a bane on escaping grabs.

