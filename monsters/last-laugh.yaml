    import:
      type: mcdm
      data: |
        Last Laugh	Level 2 Leader
        Abyssal, Gnoll	EV 30
        <b>Stamina</b> 70
        <b>Speed</b> 5	<b>Size</b> 1M /<b> Stability</b> 1
        <b>Free Strike</b> 4
        Might +3	Agility +3	Reason 0	Intuition 0	Presence +3
        <b>Shrapnel Whip</b> (Action) %E2%97%86 2d10 + 3 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 2<b>	Target</b> 2 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>	7 damage; A<1 bleeding (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	10 damage; A<2 bleeding (save ends)
        %E2%9C%B8	<b>17</b>	13 damage; A<3 bleeding and dazed (save ends)
        <b>Effect</b> An ally targeted by this ability makes a free strike instead of taking damage.

        <b>Cackletongue</b> (Maneuver) %E2%97%86 4 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self and 5 burst<b>	Target</b> Self and all allies
        <b>Effect</b> Each target deals an additional 3 damage with their strikes until the start of the last laugh's next turn. Targets who haven't used a cackletongue maneuver on this turn use it immediately at no cost.

        <b>Death Rampage</b>
        Whenever an ally within 5 is reduced to 0 Stamina, the last laugh moves up to their speed and either chooses to target 2 creatures with free strikes or one creature with their shrapnel whip.

        <b>Running Joke</b>
        If the last laugh is reduced to 0 Stamina while there are still gnolls on the battle map, one gnoll on the map is transformed into the last laugh, keeping the gnoll's Stamina.

        <b>Not the Best Time to Laugh </b>(Villain Action 1)
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 5 burst<b>	Target</b> All enemies
        <b>Effect</b> Each enemy target makes an <b>Intuition test.</b>
        %E2%9C%A6	<b>%E2%89%A411</b>	Frightened of the last laugh (save ends)
        %E2%98%85	<b>12%E2%80%9316</b>	Frightened of the last laugh (EoT)
        %E2%9C%B8	<b>17</b>	No effect
        <b>Effect</b> While frightened by this ability, targets laugh uncontrollably and cannot use triggered actions.

        <b>Call Up From The Abyss </b>(Villain Action 2)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 10<b>	Target</b> Special
        <b>Effect</b> The last laugh summons 5 <b>gnoll wildlings</b> and 5 <b>abyssal hyenas</b> into unoccupied spaces.

        <b>Edacity </b>(Villain Action 3)
        <b>Keywords</b> Area
        <b>Distance</b> Self and 10 burst<b>	Target</b> Self and all allies
        <b>Effect</b> Each target moves up to their speed and makes a free strike. A creature that takes damage from this villain action is also knocked prone.
        Retainer
        Gnoll Gnasher	Level 2 Harrier Retainer
        Fiend, Gnoll	EV 16
        <b>Stamina</b> 40
        <b>Speed</b> 7	<b>Size</b> 1M/<b>Stability</b> 1
        <b>Free Strike</b> 3
        Might +1	Agility +2	Reason 0	Intuition 0	Presence +1
        <b>Gnash</b> (Action) - 2d10 + highest characteristic - Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1 	<b>Target </b>One creature or object
        %E2%9C%A6	<b>%E2%89%A411</b>		4 damage
        %E2%98%85	<b>12%E2%80%9316</b>	7 damage
        %E2%9C%B8	<b>17</b>		10 damage; M (strong) bleeding (save ends)

        <b>Death Frenzy</b>
        Whenever an ally within 7 is reduced to 0 Stamina, the gnasher moves up to their speed and makes a free strike.

        Level 4 Retainer Advancement Ability
        <b>Frenzied Bite</b> (Triggered Action, Encounter)
        <b>Keywords</b> -
        <b>Distance</b> 5	<b>Target</b> one enemy
        <b>Trigger</b> A target is reduced to 0 Stamina.
        <b>Effect</b> The gnasher moves up to their speed and makes a Signature Attack.

        Level 7 Retainer Advancement Ability
        <b>Flurry of Fangs</b> (Action, Encounter) - 2d10 + highest characteristic
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> 3 creatures or objects
        %E2%9C%A6	<b>%E2%89%A411</b>		7 damage
        %E2%98%85	<b>12%E2%80%9316</b>	11 damage
        %E2%9C%B8	<b>17</b>		16 damage

        Level 10 Retainer Advancement Ability
        <b>Horrific Feast</b> (Action, Encounter)
        <b>Keywords</b> -
        <b>Distance</b> Ranged 5	<b>Target</b> Self
        <b>Trigger</b> The gnasher reduces a creature to 0 Stamina.
        <b>Effect</b> The gnasher consumes part of the target's body. The gnasher can spend a Recovery. Each enemy within range is I (medium) frightened (save ends).
