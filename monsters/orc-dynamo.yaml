        %E2%9C%B8	<b>17</b>	9 affinity damage; slide 6 or shift 6 away from target

        <b>Power Burst</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 3 Malice
        <b>Keywords</b> Area, Magic
        <b>Distance</b> 3 x 2 line within 1<b>	Target</b> All enemies in the line
