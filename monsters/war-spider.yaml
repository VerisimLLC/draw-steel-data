    import:
      type: mcdm
      override: true
      data: |+
        War Spider	Level 1 Elite Mount
        Animal, Goblin	EV 12
        <b>Stamina</b> 60
        <b>Speed</b> 7 (climb)	<b>Size</b> 3 / <b>Stability</b> 2
        <b>Free Strike</b> 4
        Might +2	Agility +1	Reason -4	Intuition +0	Presence -3
        <b>Bite</b> (Action) %E2%97%86 2d10 + 2 %E2%97%86 Signature
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> One creature or object
        %E2%9C%A6	%E2%89%A411	7 poison damage
        %E2%98%85	12%E2%80%9316	11 poison damage
        %E2%9C%B8	17+	14 poison damage; M<2 weakened (save ends)
        <b>2 MaliceM<3</b> weakened (save ends).

        <b>Leg Blade</b> (Action) %E2%97%86 2d10 + 2
        <b>Keywords</b> Melee, Strike, Weapon
        <b>Distance</b> Melee 1	<b>Target</b> Two creatures or objects
        %E2%9C%A6	%E2%89%A411	6 damage
        %E2%98%85	12%E2%80%9316	9 damage
        %E2%9C%B8	17+	12 damage

        <b>Trample</b> (Action) %E2%97%86 5 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Effect</b> The spider shifts up to their speed and makes a Leg Blade strike against each creature who comes within 1 of the spider during the move. The spider makes one power roll against all targets.

        <b>Web</b> (Maneuver)
        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 3 cube within 1	<b>Target</b> All creatures in the cube
        %E2%9C%A6	%E2%89%A411	A<0 restrained (save ends)
        %E2%98%85	12%E2%80%9316	A<1 restrained (save ends)
        %E2%9C%B8	17+	A<2 restrained (save ends)
        <b>Distance</b> The affected area is considered difficult terrain for enemies.

        <b>Skitter</b> (Triggered Action)
        <b>Keywords</b> -
        <b>Distance</b> Self	<b>Target</b> Self
        <b>Trigger</b> The spider or an ally riding the spider take damage.
        <b>Effect</b> The spider halves the damage, and then shifts 2 squares after the triggering effect resolves.

        <b>Ride Launcher</b>
        An ally who leaps off the back of the spider can jump up to 6 squares without a test, and takes no damage if they fall during the jump. After the jump, the first melee strike an ally makes on the same turn gains an edge.

        <b>Wide Back</b>
        Two of the spider's size 1 allies can occupy the same space while riding the spider.



