        <b>Effect</b> The Nameless must be winded to use this ability. Any living minions reduced to 0 Stamina by this ability regain all their Stamina and become corporeal undead under the Nameless's control until the end of the Nameless's next turn, after which time they are destroyed.
        %E2%98%92 Space for Dragon Prose
        Dragons
        We fear dragons above all else. Not only are they an expression of annihilation-our oldest and most basic dread-but they are a symbol of everything ancient, inscrutable, and unconquerable about our world.
        Where the Elements Meet Anguish
        As elementals are pure expressions of the Mundane World, their shapes can become hardened and bent by intense energies permeating their world. Over time, an elemental entangled in extreme concentrations of rancor or grief may crystallize into a terrifying beast known as a dragon.
        Dragons are both a provocateur and a consequence of people's anguish. A thorn dragon will overtake crops and forests in a fortress of bramble vines and threaten to starve the people living there, yet it was born out of decades of hunger and strife that came before them. Vanquishing a dragon may be necessary to save innocent lives, but until the underlying problems are addressed, another dragon will take their place in time.
        Draco Vulgaris
        Many regular dragons share a number of commonalities between them, such as powerful wings, whiplike tails, and reptilian faces adorned with horns. People categorize them more specifically based on where they're found and how those environments have shaped their forms, such as the gloom dragon's telltale mantle of fog. Some individual dragons retain a trait or two from their primordial forms, while more powerful dragons have been known to intentionally change their shapes to distinguish themselves even further.
        Across all dragons, the dragon's breath is their most violent form of self-expression. Whether they roar to ward off threats or charge their breath with elemental energy, no good comes from a dragon opening their mouth.
        Wyrmscale
        Most dragons are covered in wyrmscale, a hardy plate that both absorbs and emits elemental energy. They not only protect dragons but allow them to ignite their bodies and further shape their environment. The crucible dragon, for example, lights their tail on fire to decimate structures that their breath cannot melt alone.
        When a dragon feels threatened, their wyrmscale radiates massive amounts of energy and creates a barrier around them. This barrier buffers both incoming and outgoing force, allowing the dragon to become even more fearsome should their defenses break down.
        A Lord of their Domain
        It's said that a dragon's physical form includes the land they're found in. The longer a dragon spends time in a location, the more control they have over it. The land becomes barren in an omen dragon's domain as old souls become suspended in its thickened air and new life can't breach its soil.
        This impact is more than a passive consequence of a dragon's presence; dragons use their magic to set seals upon creatures and lands that they claim as their own. To be dragonsealed is to become an extension of the dragon's might and subject to their fury.
        Some cultures that have developed in close proximity to a dragon may give alms to the dragon as if they were a saint, and treat the dragon's seal as a blessing. There is some truth to this-few other predators are foolish enough to encroach on a dragon's territory.
        Dragon Hoards
        Legendary heroes protect the layperson from dragons. Foolhardy adventurers brave a dragon's lair to take their treasure.
        Mature dragons hoard vast amounts of treasure and wealth as a hunting technique. The more valuable their trove, the more prey they lure into their clutches. Desperate kings have sent armies to their deaths for the opportunity to expand their kingdoms' wealth. Their efforts only further these dragon hoards as they continue to pile with enchanted armors and magical trinkets that can't be ignored.
        Younger dragons still settling their domains have been known to scour ruins and old cities for treasures to start their hoard. It is not unheard of for a dragon to either repeatedly visit or settle near people who willingly give them their valuables and heirlooms.
        Draco Nobilis
        Regular dragons should not be confused for the elder dragons. They are known otherwise as true dragons, legendary beings that are said to devour entire worlds when they finally awaken. Even the most fearsome meteor dragon only possesses a modicum of a true dragon's power and wiles.
        No one has recognized a true dragon for thousands of years. However, rumor has it that a true dragon sleeps at the sun's core and is responsible for bringing light to the entire Mundane World.

        Thorn Dragon
        Thorn dragons take root in the destitution of nature and are cultivated by the suffering of those who struggle against the green's cruelty. Though a region's people may have long overcome past famine, the desperation of those who came before has already nurtured their future scourge.
        These dragons appear born of the wood, living thickets bedecked in torturous thorns. With twisting briar horns and wings shaped by tangled roots, thorn dragons embody the richness of nature they so readily constrict the life from.
        Conquerors of the Green
        Thorn dragons cultivate their lairs in lush farmlands or flourishing forests. They overtake these beautiful regions with massive briar thickets, choking out the existing flora until the only thing that can grow are their own brambles.
        In forests, this ravaging drives out the local fauna smart enough to flee rather than foolishly fight against the wood's new ruler. When a thorn dragon establishes their lair over a village's farmlands, the populace either wisely flees or starves for their pride.
        Natural Curators
        More intelligent dragons seek all forms of riches for their hoard, but thorn dragons have no eye for manmade treasures. Instead, they amass the wealth of the wild they represent. Thorn dragons stockpile food, even food they won't eat, alongside uncut gemstones, minerals and ore, wood, oils, and spices.
        Bestial Instincts
        Compared to more powerful dragons, thorn dragons are closer to beasts. They are incapable of speech and act primarily on instinct to expand their territory, defend their lair, and grow their hoard.
        Despite this, some villages manage to avoid being driven from their homes or starved within them-at the expense of being dependent on a thorn dragon's bestial ego. These villagers come to a tenuous understanding with the dragon, trading it the kinds of treasure it desires in exchange for meager foodstuffs from the dragon's hoard.
        Territorial Bloodletters
        Thorn dragons are highly territorial against unexpected threats to their lair. In order to defend their home, these dragons take advantage of the thicket-by dragonsealing intruders, pushing and pulling them across the briars and letting the thorns bleed them dry. When the brambles aren't enough, thorn dragons either imbue the barbs with poison or breathe the toxins directly, taking advantage of another way to slowly drain the life from their enemies.
