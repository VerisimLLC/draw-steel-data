        <b>Keywords</b> Area, Weapon
        <b>Distance</b> 10 x 3 line within 1<b>Target</b> all enemies
        %E2%9C%B8	<b>%E2%89%A411</b>	3 damage; push 1
        %E2%98%85	<b>12-16</b>	5 damage; push 3
        %E2%9C%A6	<b>17</b>	6 damage; push 5; A<3 slowed (save ends)
        <b>Effect</b> The doomthief cannot move on the same turn they use this ability.

        <b>Doom Magnet</b>
        The doomthief emits a 3 aura of warped fate, blocking line of effect for enemy abilities that don't include the doomthief as a target.

        <b>Expanding Doom</b> (Maneuver) %E2%97%86 4 Malice
        <b>Keywords</b> -
        <b>Distance</b> Self<b>Target</b> Self
        <b>Effect </b>The doomthief gains damage immunity 4 and their doom magnet aura increases by 3 until the start of their next turn.

        <b>Loyalty Collar</b>
        When the doomthief dies, they explode, dealing 2d6 damage to each adjacent enemy.

