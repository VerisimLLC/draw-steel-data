        <b>Keywords</b> Area, Psionic, Ranged
        <b>Distance</b> 4 x 2 line within 10	<b>Target</b> Special
        <b>Effect</b> The area becomes a psionically charged treadmill that pushes creatures and objects at high speed in one direction of the helix's choice. Any creature that moves into the area or starts their turn there immediately slides 3 squares toward the square at the end of the area in the chosen direction. Each enemy in the area when it first appears takes 3 damage before they are moved.
        <b>3 Malice</b> The helix creates a second kinetic lane.

        <b>Foresight </b>
        The helix doesn't have a bane on strikes against concealed creatures.

